<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AttentionOS — 60秒测出你的注意力类型</title>
<meta name="description" content="基于神经科学三大注意力网络的60秒测试。3关小游戏，实时评分，生成你的注意力画像。数据不出浏览器。">
<meta property="og:title" content="60秒，测出你的注意力类型">
<meta property="og:description" content="警觉 · 定向 · 执行 —— 3关小游戏，测出你的注意力画像。数据不出浏览器。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Archivo:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Noto+Serif+SC:wght@600;900&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: oklch(0.965 0.012 85);
    --paper-deep: oklch(0.93 0.02 85);
    --ink: oklch(0.25 0.02 60);
    --ink-soft: oklch(0.45 0.025 70);
    --ink-faint: oklch(0.62 0.02 75);
    --rule: oklch(0.82 0.02 80);
    --accent: oklch(0.58 0.22 33);
    --accent-deep: oklch(0.48 0.2 33);
    --good: oklch(0.55 0.13 150);
    --serif: "Instrument Serif", "Noto Serif SC", Georgia, serif;
    --sans: "Archivo", "Noto Sans SC", "Helvetica Neue", sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { background: var(--paper); }
  body {
    font-family: var(--sans);
    color: var(--ink);
    min-height: 100svh;
    -webkit-font-smoothing: antialiased;
    background:
      radial-gradient(1200px 600px at 80% -10%, oklch(0.95 0.025 75 / 0.6), transparent 60%),
      var(--paper);
    overscroll-behavior: none;
  }
  .screen { display: none; }
  .screen.active { display: block; }

  .sheet {
    max-width: 680px;
    margin: 0 auto;
    padding: clamp(1.2rem, 3.5vw, 2.5rem) clamp(1.1rem, 4vw, 2rem) 3.5rem;
  }
  .masthead {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-bottom: 2px solid var(--ink);
    padding-bottom: 0.55rem;
    gap: 1rem;
  }
  .masthead .brand {
    font-weight: 700;
    letter-spacing: 0.13em;
    font-size: 0.78rem;
  }
  .masthead .brand em { font-style: normal; color: var(--accent); }
  .lang-toggle {
    font-family: var(--sans);
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    background: none;
    border: 1px solid var(--rule);
    color: var(--ink-soft);
    padding: 0.25rem 0.6rem;
    cursor: pointer;
  }
  .lang-toggle:hover { border-color: var(--ink); color: var(--ink); }

  /* ---------- intro ---------- */
  .hero { margin-top: clamp(1.8rem, 5vw, 3rem); }
  .hero-kicker {
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 700;
  }
  h1 {
    font-family: var(--serif);
    font-weight: 400;
    font-size: clamp(2.1rem, 8vw, 3.6rem);
    line-height: 1.12;
    margin-top: 0.6rem;
    letter-spacing: 0.01em;
  }
  html[lang="zh"] h1 { font-weight: 900; font-family: "Noto Serif SC", var(--serif); }
  h1 .accent { color: var(--accent); font-style: italic; }
  html[lang="zh"] h1 .accent { font-style: normal; }
  .lede {
    margin-top: 1rem;
    font-size: 0.95rem;
    line-height: 1.7;
    color: var(--ink-soft);
    max-width: 44ch;
  }
  .lede strong { color: var(--ink); }

  .stages-preview { margin-top: 1.6rem; border-top: 2px solid var(--ink); }
  .stage-line {
    display: flex;
    align-items: baseline;
    gap: 0.8rem;
    padding: 0.7rem 0.2rem;
    border-bottom: 1px solid var(--rule);
  }
  .stage-line .no {
    font-family: var(--serif);
    font-style: italic;
    color: var(--accent);
    font-size: 1.15rem;
    min-width: 1.5rem;
  }
  .stage-line .nm { font-weight: 700; font-size: 0.92rem; min-width: 7.5em; }
  .stage-line .ds { color: var(--ink-faint); font-size: 0.82rem; flex: 1; }

  .start-row {
    margin-top: 1.8rem;
    display: flex;
    align-items: center;
    gap: 1.2rem;
    flex-wrap: wrap;
  }
  .btn {
    font-family: var(--sans);
    font-size: 0.98rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    border: 2px solid var(--ink);
    background: var(--ink);
    color: var(--paper);
    padding: 0.95rem 2.6rem;
    cursor: pointer;
    transition: background 0.18s cubic-bezier(0.22,1,0.36,1), border-color 0.18s, transform 0.18s;
    touch-action: manipulation;
  }
  .btn:hover { background: var(--accent-deep); border-color: var(--accent-deep); transform: translateY(-1px); }
  .btn.ghost { background: transparent; color: var(--ink); }
  .btn.ghost:hover { background: var(--paper-deep); color: var(--ink); }
  .fine { font-size: 0.75rem; color: var(--ink-faint); line-height: 1.55; max-width: 26ch; }

  /* ---------- game ---------- */
  #game {
    position: fixed;
    inset: 0;
    background: var(--paper);
    z-index: 10;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .game-hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 1rem 1.2rem 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }
  .dots { display: flex; gap: 0.4rem; }
  .dot { width: 8px; height: 8px; border: 1px solid var(--ink-faint); border-radius: 50%; }
  .dot.done { background: var(--accent); border-color: var(--accent); }
  .streak {
    font-weight: 700;
    color: var(--accent);
    font-size: 0.8rem;
    letter-spacing: 0.06em;
    opacity: 0;
    transform: scale(0.8);
    transition: all 0.2s cubic-bezier(0.22,1,0.36,1);
  }
  .streak.show { opacity: 1; transform: scale(1); }

  #arena {
    position: absolute;
    inset: 3.4rem 0 5.5rem;
    display: grid;
    place-items: center;
  }
  .feedback {
    position: absolute;
    left: 0; right: 0;
    bottom: 2.2rem;
    text-align: center;
    font-family: var(--serif);
    font-size: 1.5rem;
    color: var(--ink);
    opacity: 0;
    transform: translateY(6px) scale(0.9);
    pointer-events: none;
  }
  .feedback.pop {
    animation: fbpop 0.75s cubic-bezier(0.22,1,0.36,1);
  }
  @keyframes fbpop {
    0% { opacity: 0; transform: translateY(10px) scale(0.85); }
    18% { opacity: 1; transform: translateY(0) scale(1.05); }
    30% { transform: translateY(0) scale(1); }
    80% { opacity: 1; }
    100% { opacity: 0; }
  }
  .feedback .ms { color: var(--accent); font-feature-settings: "tnum"; }

  /* stage intro card */
  .stage-card {
    text-align: center;
    max-width: 30rem;
    padding: 0 1.5rem;
  }
  .stage-card .k {
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 700;
  }
  .stage-card h2 {
    font-family: var(--serif);
    font-size: clamp(2rem, 8vw, 3rem);
    font-weight: 400;
    margin: 0.5rem 0 0.6rem;
  }
  html[lang="zh"] .stage-card h2 { font-family: "Noto Serif SC", var(--serif); font-weight: 900; }
  .stage-card p { color: var(--ink-soft); font-size: 0.95rem; line-height: 1.65; }
  .stage-card .btn { margin-top: 1.5rem; }

  /* stage 1 */
  .signal-ring {
    width: min(38vw, 190px);
    height: min(38vw, 190px);
    border-radius: 50%;
    border: 3px dashed var(--rule);
    display: grid;
    place-items: center;
    font-family: var(--serif);
    font-style: italic;
    color: var(--ink-faint);
    font-size: 1rem;
    transition: transform 0.1s;
  }
  .signal-ring.go {
    background: var(--accent);
    border: 3px solid var(--accent-deep);
    color: var(--paper);
    font-style: normal;
    font-weight: 700;
    font-size: 2.2rem;
    animation: sigpop 0.18s cubic-bezier(0.22,1,0.36,1);
  }
  @keyframes sigpop { from { transform: scale(0.6); } to { transform: scale(1); } }
  .shake { animation: shake 0.35s; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-7px); } 50% { transform: translateX(7px); } 75% { transform: translateX(-4px); }
  }

  /* stage 2 */
  .search-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: clamp(0.5rem, 2.5vw, 1rem);
    padding: 1rem;
  }
  .search-cell {
    width: clamp(52px, 16vw, 78px);
    height: clamp(52px, 16vw, 78px);
    border: 1px solid var(--rule);
    background: oklch(0.98 0.008 85);
    display: grid;
    place-items: center;
    font-family: var(--sans);
    font-weight: 700;
    font-size: clamp(1.5rem, 6vw, 2.1rem);
    cursor: pointer;
    transition: transform 0.08s;
  }
  .search-cell:active { transform: scale(0.92); }
  .search-cell.wrong { background: oklch(0.9 0.05 33); animation: shake 0.3s; }

  /* stage 3 */
  .flanker-wrap { text-align: center; }
  .fixation { font-size: 2.2rem; color: var(--ink-faint); font-family: var(--serif); }
  .arrows {
    font-size: clamp(2.6rem, 11vw, 4rem);
    letter-spacing: 0;
    font-weight: 400;
    font-feature-settings: "tnum";
  }
  .lr-buttons {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 5.5rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    border-top: 2px solid var(--ink);
  }
  .lr-buttons button {
    font-family: var(--sans);
    font-size: 1.6rem;
    background: var(--paper);
    border: none;
    border-right: 1px solid var(--rule);
    cursor: pointer;
    color: var(--ink);
    touch-action: manipulation;
  }
  .lr-buttons button:last-child { border-right: none; }
  .lr-buttons button:active { background: var(--paper-deep); }
  .lr-hint {
    position: absolute;
    bottom: 5.8rem; left: 0; right: 0;
    text-align: center;
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    color: var(--ink-faint);
    text-transform: uppercase;
  }

  /* stage clear stamp */
  .stamp-overlay {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    background: oklch(0.965 0.012 85 / 0.92);
  }
  .stamp {
    border: 5px solid var(--accent);
    color: var(--accent);
    padding: 1.2rem 2rem;
    transform: rotate(-7deg);
    text-align: center;
    animation: stampin 0.4s cubic-bezier(0.22,1,0.36,1);
  }
  @keyframes stampin {
    from { transform: rotate(-7deg) scale(1.7); opacity: 0; }
    to { transform: rotate(-7deg) scale(1); opacity: 1; }
  }
  .stamp .s-title { font-weight: 700; letter-spacing: 0.15em; font-size: 0.8rem; text-transform: uppercase; }
  .stamp .s-score { font-family: var(--serif); font-size: 3.4rem; line-height: 1.1; }
  .stamp .s-line { font-size: 0.85rem; margin-top: 0.2rem; }

  /* ---------- results ---------- */
  .verdict-head { margin-top: clamp(1.6rem, 4vw, 2.5rem); }
  .verdict-label {
    font-size: 0.72rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .verdict {
    font-family: var(--serif);
    font-size: clamp(2.6rem, 10vw, 4.2rem);
    line-height: 1.05;
    color: var(--accent);
    margin-top: 0.3rem;
  }
  html[lang="zh"] .verdict { font-family: "Noto Serif SC", var(--serif); font-weight: 900; }
  html[lang="en"] .verdict { font-style: italic; }
  .verdict-tag {
    margin-top: 0.7rem;
    font-family: var(--serif);
    font-style: italic;
    font-size: 1.1rem;
    color: var(--ink-soft);
    max-width: 34ch;
    line-height: 1.5;
  }
  html[lang="zh"] .verdict-tag { font-style: normal; }

  .result-grid {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 1.5rem;
    align-items: start;
    margin-top: 1.6rem;
  }
  @media (max-width: 560px) { .result-grid { grid-template-columns: 1fr; } }

  .networks { border-top: 2px solid var(--ink); }
  .net-row { padding: 0.75rem 0; border-bottom: 1px solid var(--rule); }
  .net-top { display: flex; justify-content: space-between; align-items: baseline; }
  .net-top .nm { font-weight: 700; font-size: 0.9rem; }
  .net-top .nm small { color: var(--ink-faint); font-weight: 400; margin-left: 0.4rem; font-size: 0.72rem; letter-spacing: 0.08em; }
  .net-top .sc { font-family: var(--serif); font-size: 1.6rem; font-feature-settings: "tnum"; }
  .net-bar { height: 6px; background: var(--paper-deep); margin-top: 0.45rem; position: relative; }
  .net-bar i {
    position: absolute; left: 0; top: 0; bottom: 0;
    background: var(--accent);
    width: 0;
    transition: width 0.9s cubic-bezier(0.22,1,0.36,1);
  }
  .net-sub { font-size: 0.74rem; color: var(--ink-faint); margin-top: 0.4rem; }

  .radar-box { text-align: center; }
  .radar-box svg { width: min(46vw, 220px); height: auto; }

  .rx {
    margin-top: 1.8rem;
    border: 2px solid var(--ink);
    padding: 1.1rem 1.2rem 1.2rem;
    position: relative;
  }
  .rx-label {
    position: absolute;
    top: -0.7rem; left: 1rem;
    background: var(--paper);
    padding: 0 0.5rem;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .rx ul { list-style: none; }
  .rx li {
    padding: 0.55rem 0;
    border-bottom: 1px solid var(--rule);
    font-size: 0.88rem;
    line-height: 1.6;
    display: flex;
    gap: 0.6rem;
  }
  .rx li:last-child { border-bottom: none; }
  .rx li::before { content: "☐"; color: var(--accent); font-size: 1rem; }
  .rx li strong { color: var(--ink); }

  details.science {
    margin-top: 1.4rem;
    font-size: 0.78rem;
    color: var(--ink-faint);
    line-height: 1.6;
  }
  details.science summary { cursor: pointer; color: var(--ink-soft); font-weight: 500; }
  details.science a { color: var(--ink-soft); }

  .actions {
    margin-top: 1.8rem;
    display: flex;
    gap: 0.8rem;
    flex-wrap: wrap;
    align-items: center;
  }
  .copied-note { font-size: 0.78rem; color: var(--accent); opacity: 0; transition: opacity 0.25s; }
  .copied-note.show { opacity: 1; }
  .star-ask {
    margin-top: 1.6rem;
    font-size: 0.85rem;
    color: var(--ink-soft);
  }
  .star-ask a { color: var(--accent); font-weight: 700; }
  .footer-rule {
    margin-top: 2.8rem;
    padding-top: 0.8rem;
    border-top: 2px solid var(--ink);
    display: flex;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }
  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }
</style>
</head>
<body>

<!-- ============ INTRO ============ -->
<section id="intro" class="screen active">
  <div class="sheet">
    <header class="masthead">
      <div class="brand">Attention<em>OS</em></div>
      <button class="lang-toggle" id="langBtn">EN</button>
    </header>
    <div class="hero">
      <div class="hero-kicker" data-i18n="kicker"></div>
      <h1 id="heroTitle"></h1>
      <p class="lede" id="heroLede"></p>
    </div>
    <div class="stages-preview" id="stagesPreview"></div>
    <div class="start-row">
      <button class="btn" id="startBtn"></button>
      <p class="fine" data-i18n="privacy"></p>
    </div>
    <div class="footer-rule">
      <span>AttentionOS · open source</span>
      <span data-i18n="footProto"></span>
    </div>
    <p style="margin-top:1rem;text-align:center;font-size:0.7rem;letter-spacing:0.1em;color:var(--ink-faint)">
      <a href="index.html" style="color:var(--ink-soft)">editorial</a> ·
      <a href="modern.html" style="color:var(--ink-soft)">modern</a> ·
      <a href="pixel.html" style="color:var(--ink-soft)">gameboy</a> ·
      <a href="terminal.html" style="color:var(--ink-soft)">terminal</a> ·
      <a href="gbc.html" style="color:var(--ink-soft)">handheld</a>
    </p>
  </div>
</section>

<!-- ============ GAME ============ -->
<section id="game" class="screen">
  <div class="game-hud">
    <span id="hudStage"></span>
    <span class="streak" id="streak"></span>
    <span class="dots" id="dots"></span>
  </div>
  <div id="arena"></div>
  <div class="feedback" id="feedback"></div>
</section>

<!-- ============ RESULTS ============ -->
<section id="results" class="screen">
  <div class="sheet">
    <header class="masthead">
      <div class="brand">Attention<em>OS</em></div>
      <span style="font-size:0.72rem;letter-spacing:0.12em;color:var(--ink-soft)" data-i18n="findings"></span>
    </header>

    <div class="verdict-head">
      <div class="verdict-label" data-i18n="yourType"></div>
      <div class="verdict" id="archetype"></div>
      <p class="verdict-tag" id="archetypeTag"></p>
    </div>

    <div class="result-grid">
      <div class="networks" id="networks"></div>
      <div class="radar-box" id="radarBox"></div>
    </div>

    <div class="rx">
      <div class="rx-label" data-i18n="rxTitle"></div>
      <ul id="rxList"></ul>
    </div>

    <details class="science">
      <summary data-i18n="sciSummary"></summary>
      <p id="sciBody" style="margin-top:0.5rem"></p>
    </details>

    <div class="actions">
      <button class="btn" id="downloadBtn"></button>
      <button class="btn ghost" id="copyBtn"></button>
      <button class="btn ghost" id="retryBtn"></button>
      <span class="copied-note" id="copiedNote"></span>
    </div>

    <p class="star-ask" id="starAsk"></p>

    <div class="footer-rule">
      <span>AttentionOS · the attention audit</span>
      <span>github.com/zhonghaozhan/AttentionOS</span>
    </div>
  </div>
</section>

<canvas id="cardCanvas" width="1080" height="1440" style="display:none"></canvas>

<script>
(() => {
  const qs = new URLSearchParams(location.search);
  const REPO = 'github.com/zhonghaozhan/AttentionOS';

  /* ================= i18n ================= */
  const STR = {
    zh: {
      kicker: '注意力体检 · 60 秒 · 3 关',

      stages: [

  let lang = qs.get('lang') || ((navigator.language || 'en').startsWith('zh') ? 'zh' : 'en');
  const t = key => STR[lang][key];

  const $ = id => document.getElementById(id);
  const screens = { intro: $('intro'), game: $('game'), results: $('results') };
  const show = name => {
    Object.values(screens).forEach(s => s.classList.remove('active'));
    screens[name].classList.add('active');
  };
  const sleep = ms => new Promise(r => setTimeout(r, ms));
  const buzz = ms => { try { navigator.vibrate && navigator.vibrate(ms); } catch {} };

  function applyLang() {
    document.documentElement.lang = lang;
    document.title = lang === 'zh' ? 'AttentionOS — 60秒测出你的注意力类型' : 'AttentionOS — What’s your attention type?';

  }

  /* ================= game engine ================= */
  const arena = $('arena');
  const fb = $('feedback');
  let streakN = 0;
  const data = { s1: [], s1false: 0, s2: [], s2wrong: 0, s3: [] };
  let analysis = null;

  function hud(stageIdx, done, total) {
    $('hudStage').textContent = `${stageIdx + 1}/3 · ${t('stageNames')[stageIdx]}`;
    $('dots').innerHTML = Array.from({ length: total },
      (_, i) => `<span class="dot${i < done ? ' done' : ''}"></span>`).join('');
  }
  function feedback(html, good) {
    fb.innerHTML = html;
    fb.classList.remove('pop');
    void fb.offsetWidth;
    fb.classList.add('pop');
    if (good) buzz(12);
  }
  function bumpStreak(good) {
    streakN = good ? streakN + 1 : 0;
    const el = $('streak');
    if (streakN >= 2) {
      el.textContent = `🔥 ×${streakN} ${t('streakWord')}`;
      el.classList.remove('show'); void el.offsetWidth; el.classList.add('show');
    } else el.classList.remove('show');
  }
  function gradeOf(table, rt) {
    for (const [max, label] of table) if (rt < max) return label;
  }
  function stageCard(idx) {
    return new Promise(res => {
      const [k, h, p] = t('stageIntro')[idx];
      arena.innerHTML = `<div class="stage-card">
        <div class="k">${k}</div><h2>${h}</h2><p>${p}</p>
        <button class="btn" id="stageGo">GO</button></div>`;
      $('stageGo').addEventListener('click', () => res(), { once: true });
    });
  }
  async function stamp(idx, score) {
    const lines = t('stampLines')[idx];
    const line = score >= 75 ? lines[0] : score >= 55 ? lines[1] : lines[2];
    const el = document.createElement('div');
    el.className = 'stamp-overlay';
    el.innerHTML = `<div class="stamp">
      <div class="s-title">${t('stageNames')[idx]} · ${t('clear')}</div>
      <div class="s-score">${score}</div>
      <div class="s-line">${line}</div></div>`;
    $('game').appendChild(el);
    buzz([20, 40, 20]);
    await sleep(1500);
    el.remove();
  }

  /* ---------- stage 1: alerting ---------- */
  async function stage1() {
    const TRIALS = 5;
    data.s1 = []; data.s1false = 0; streakN = 0;
    hud(0, 0, TRIALS);
    await stageCard(0);
    for (let i = 0; i < TRIALS; i++) {
      hud(0, i, TRIALS);
      arena.innerHTML = `<div class="signal-ring" id="ring">${t('waiting')}</div>`;
      const ring = $('ring');
      let fired = false, t0 = 0;
      const rt = await new Promise(res => {
        let timer = setTimeout(fire, 900 + Math.random() * 1600);
        function fire() {
          fired = true;
          ring.classList.add('go');
          ring.textContent = t('go');
          t0 = performance.now();
        }
        function onTap(e) {
          if (e.type === 'keydown' && e.code !== 'Space') return;
          e.preventDefault();
          if (!fired) {                       // false start
            data.s1false++;
            clearTimeout(timer);
            ring.classList.add('shake');
            feedback(t('falseStart'), false);
            bumpStreak(false);
            setTimeout(() => {
              ring.classList.remove('shake');
              timer = setTimeout(fire, 1200 + Math.random() * 1600);
            }, 500);
            return;
          }
          cleanup();
          res(performance.now() - t0);
        }
        function cleanup() {
          arena.removeEventListener('pointerdown', onTap);
          document.removeEventListener('keydown', onTap);
        }
        arena.addEventListener('pointerdown', onTap);
        document.addEventListener('keydown', onTap);
      });
      data.s1.push(rt);
      const good = rt < 450;
      bumpStreak(good);
      feedback(`<span class="ms">${Math.round(rt)} ms</span> · ${gradeOf(t('s1grades'), rt)}`, good);
      hud(0, i + 1, TRIALS);
      await sleep(750);
    }
    const s = scoreAlerting();
    await stamp(0, s);
  }

  /* ---------- stage 2: orienting ---------- */
  async function stage2() {
    const TRIALS = 5, CELLS = 12;
    data.s2 = []; data.s2wrong = 0; streakN = 0;
    hud(1, 0, TRIALS);
    await stageCard(1);
    for (let i = 0; i < TRIALS; i++) {
      hud(1, i, TRIALS);
      const target = Math.floor(Math.random() * CELLS);
      arena.innerHTML = `<div class="search-grid">` +
        Array.from({ length: CELLS }, (_, k) => {
          const rot = [0, 90, 180, 270][Math.floor(Math.random() * 4)];
          const ch = k === target ? 'L' : 'T';
          return `<div class="search-cell" data-k="${k}">
            <span style="transform:rotate(${rot}deg)">${ch}</span></div>`;
        }).join('') + `</div>`;
      const t0 = performance.now();
      let wrongThis = 0;
      const rt = await new Promise(res => {
        arena.querySelectorAll('.search-cell').forEach(cell => {
          cell.addEventListener('pointerdown', () => {
            if (+cell.dataset.k === target) res(performance.now() - t0);
            else {
              wrongThis++; data.s2wrong++;
              cell.classList.add('wrong');
              buzz(30);
            }
          });
        });
      });
      data.s2.push(rt + wrongThis * 300);   // wrong taps cost
      const good = rt < 2400 && wrongThis === 0;
      bumpStreak(good);
      feedback(`<span class="ms">${(rt / 1000).toFixed(2)} s</span> · ${gradeOf(t('s2grades'), rt)}`, good);
      hud(1, i + 1, TRIALS);
      await sleep(750);
    }
    const s = scoreOrienting();
    await stamp(1, s);
  }

  /* ---------- stage 3: executive (flanker) ---------- */
  async function stage3() {
    const TRIALS = 8;
    data.s3 = []; streakN = 0;
    hud(2, 0, TRIALS);
    await stageCard(2);
    const conds = [1, 1, 1, 1, 0, 0, 0, 0].sort(() => Math.random() - 0.5); // 1=incongruent
    const lr = document.createElement('div');
    lr.className = 'lr-buttons';
    lr.innerHTML = `<button data-d="L">←</button><button data-d="R">→</button>`;
    const hint = document.createElement('div');
    hint.className = 'lr-hint';
    hint.textContent = t('lrHint');
    $('game').append(hint, lr);
    for (let i = 0; i < TRIALS; i++) {
      hud(2, i, TRIALS);
      const incong = conds[i];
      const dir = Math.random() < 0.5 ? 'L' : 'R';
      const c = dir === 'L' ? '←' : '→';
      const f = incong ? (dir === 'L' ? '→' : '←') : c;
      arena.innerHTML = `<div class="flanker-wrap"><div class="fixation">+</div></div>`;
      await sleep(400 + Math.random() * 300);
      arena.innerHTML = `<div class="flanker-wrap"><div class="arrows">${f}${f}<span class="c">${c}</span>${f}${f}</div></div>`;
      const t0 = performance.now();
      const ans = await new Promise(res => {
        const to = setTimeout(() => { cleanup(); res(null); }, 1600);
        function onKey(e) {
          if (e.key === 'ArrowLeft') done('L');
          else if (e.key === 'ArrowRight') done('R');
        }
        function onBtn(e) {
          const b = e.target.closest('button[data-d]');
          if (b) done(b.dataset.d);
        }
        function done(d) { clearTimeout(to); cleanup(); res(d); }
        function cleanup() {
          document.removeEventListener('keydown', onKey);
          lr.removeEventListener('pointerdown', onBtn);
        }
        document.addEventListener('keydown', onKey);
        lr.addEventListener('pointerdown', onBtn);
      });
      const rt = performance.now() - t0;
      const correct = ans === dir;
      data.s3.push({ incong, rt: ans ? rt : 1600, correct });
      bumpStreak(correct);
      if (!ans) feedback(t('s3miss'), false);
      else if (!correct) feedback(t('s3bad'), false);
      else feedback(`<span class="ms">${Math.round(rt)} ms</span> · ${incong ? t('s3okHard') : t('s3ok')}`, true);
      hud(2, i + 1, TRIALS);
      await sleep(700);
    }
    hint.remove(); lr.remove();
    const s = scoreExecutive();
    await stamp(2, s);
  }

  /* ================= scoring (docs/SCIENCE.md) ================= */
  const median = a => {
    const s = [...a].sort((x, y) => x - y);
    return s.length ? (s[s.length >> 1] + s[(s.length - 1) >> 1]) / 2 : 0;
  };
  const logistic = (x, mid, k) => Math.round(100 / (1 + Math.exp((x - mid) / k)));
  const clamp100 = v => Math.max(1, Math.min(99, v));

  function scoreAlerting() {
    const rt = median(data.s1);
    return clamp100(logistic(rt, 350, 55) - data.s1false * 6);
  }
  function scoreOrienting() {
    const rt = median(data.s2);
    return clamp100(logistic(rt, 1500, 380));
  }
  function scoreExecutive() {
    const cong = data.s3.filter(x => !x.incong && x.correct).map(x => x.rt);
    const inc = data.s3.filter(x => x.incong && x.correct).map(x => x.rt);
    const cost = (inc.length && cong.length) ? Math.max(0, median(inc) - median(cong)) : 250;
    const errors = data.s3.filter(x => !x.correct).length;
    return clamp100(Math.round(logistic(cost, 115, 42) * Math.max(0.3, 1 - errors * 0.13)));
  }

  function analyze() {
    const a = scoreAlerting(), o = scoreOrienting(), e = scoreExecutive();
    const scores = [a, o, e];
    const overall = Math.round(a * 0.3 + o * 0.3 + e * 0.4);
    const mx = Math.max(...scores), mn = Math.min(...scores);
    let type;
    if (mn >= 75) type = 'commander';
    else if ((mx + mn) / 2 < 50 && mx < 60) type = 'wanderer';
    else if (mx - mn <= 12) type = 'balanced';
    else type = ['cheetah', 'hawkeye', 'fortress'][scores.indexOf(mx)];
    const cong = data.s3.filter(x => !x.incong && x.correct).map(x => x.rt);
    const inc = data.s3.filter(x => x.incong && x.correct).map(x => x.rt);
    return {
      scores, overall, type,
      weakest: scores.indexOf(mn),
      strongest: scores.indexOf(mx),
      s1rt: Math.round(median(data.s1)) || 0,
      s2rt: Math.round(median(data.s2)) || 0,
      s3cost: (inc.length && cong.length) ? Math.round(Math.max(0, median(inc) - median(cong))) : 0,
      s3acc: Math.round(100 * data.s3.filter(x => x.correct).length / Math.max(1, data.s3.length)),
    };
  }

  /* ================= results ================= */
  function radarSVG(scores, size = 220) {
    const cx = size / 2, cy = size / 2 + 8, R = size / 2 - 34;
    const ang = [-90, 150, 30].map(d => d * Math.PI / 180);
    const pt = (i, r) => `${cx + Math.cos(ang[i]) * r},${cy + Math.sin(ang[i]) * r}`;
    const ring = f => `<polygon points="${[0, 1, 2].map(i => pt(i, R * f)).join(' ')}"
      fill="none" stroke="var(--rule)" stroke-width="1"/>`;
    const poly = `<polygon points="${scores.map((s, i) => pt(i, R * s / 100)).join(' ')}"
      fill="oklch(0.58 0.22 33 / 0.18)" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round"/>`;
    const names = t('stageNames');
    const lbl = [0, 1, 2].map(i => {
      const x = cx + Math.cos(ang[i]) * (R + 16), y = cy + Math.sin(ang[i]) * (R + 16);
      return `<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="middle"
        font-size="11" font-weight="700" fill="var(--ink-soft)">${names[i]}</text>`;
    }).join('');
    return `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">
      ${ring(1)}${ring(2 / 3)}${ring(1 / 3)}
      ${[0, 1, 2].map(i => `<line x1="${cx}" y1="${cy}" x2="${pt(i, R).split(',')[0]}"
        y2="${pt(i, R).split(',')[1]}" stroke="var(--rule)" stroke-width="1"/>`).join('')}
      ${poly}${lbl}</svg>`;
  }

  function renderResults(an) {
    const [aName, aTag] = t('archetypes')[an.type];
    $('archetype').textContent = aName;
    $('archetypeTag').textContent = aTag;
    const subs = t('netSub');
    const subVals = [subs[0](an.s1rt), subs[1](an.s2rt), subs[2](an.s3cost, an.s3acc)];
    $('networks').innerHTML = an.scores.map((s, i) => `
      <div class="net-row">
        <div class="net-top">
          <span class="nm">${t('stageNames')[i]}${lang === 'zh' ? `<small>${STR[lang].stageEn[i].toUpperCase()}</small>` : ''}</span>
          <span class="sc">${s}</span>
        </div>
        <div class="net-bar"><i data-w="${s}"></i></div>
        <div class="net-sub">${subVals[i]} · ${t('beat')(s)}</div>
      </div>`).join('');
    requestAnimationFrame(() => requestAnimationFrame(() =>
      document.querySelectorAll('.net-bar i').forEach(el => el.style.width = el.dataset.w + '%')));
    $('radarBox').innerHTML = radarSVG(an.scores);

    const rx = t('rx');
    const weakKey = ['alerting', 'orienting', 'executive'][an.weakest];
    $('rxList').innerHTML = [
      rx[weakKey],
      rx.strength(t('stageNames')[an.strongest]),
      rx.universal,
    ].map(x => `<li><span>${x}</span></li>`).join('');
    applyLangStatics();
  }
  function applyLangStatics() {
    document.querySelectorAll('[data-i18n]').forEach(el => { el.innerHTML = t(el.dataset.i18n); });
    $('downloadBtn').textContent = t('dl');
    $('copyBtn').textContent = t('copy');
    $('retryBtn').textContent = t('retry');
    $('copiedNote').textContent = t('copied');
    $('sciBody').textContent = t('sci');
    $('starAsk').innerHTML = t('starAsk') + `<a href="https://${REPO}" target="_blank" rel="noopener">${REPO}</a>`;
  }

  /* ================= share card ================= */
  async function drawCard(an) {
    const fam = lang === 'zh' ? '"Noto Serif SC"' : '"Instrument Serif"';
    await document.fonts.load(`900 100px ${fam}`).catch(() => {});
    await document.fonts.load('italic 100px "Instrument Serif"').catch(() => {});
    await document.fonts.load('700 40px Archivo').catch(() => {});
    const c = $('cardCanvas'), x = c.getContext('2d');
    const W = c.width, H = c.height;
    const PAPER = '#f3efe6', INK = '#332e26', SOFT = '#6e6557', ACCENT = '#c23f1d', RULE = '#cfc7b6';
    x.fillStyle = PAPER; x.fillRect(0, 0, W, H);
    x.strokeStyle = INK; x.lineWidth = 6; x.strokeRect(40, 40, W - 80, H - 80);
    const M = 110;
    x.fillStyle = INK; x.font = '700 34px Archivo'; x.letterSpacing = '6px';
    x.fillText('ATTENTION', M, 150);
    const w1 = x.measureText('ATTENTION').width;
    x.fillStyle = ACCENT; x.fillText('OS', M + w1, 150);
    x.fillStyle = SOFT; x.font = '500 26px Archivo'; x.letterSpacing = '4px';
    x.fillText(t('cardKicker'), M, 196);
    x.letterSpacing = '0px';
    x.strokeStyle = INK; x.lineWidth = 4;
    x.beginPath(); x.moveTo(M, 230); x.lineTo(W - M, 230); x.stroke();

    const [aName, aTag] = t('archetypes')[an.type];
    x.fillStyle = ACCENT;
    x.font = (lang === 'zh' ? '900 128px "Noto Serif SC"' : 'italic 400 128px "Instrument Serif"');
    x.fillText(aName, M, 400);
    x.fillStyle = SOFT; x.font = `${lang === 'zh' ? '500' : '400'} 34px ${lang === 'zh' ? '"Noto Sans SC"' : 'Archivo'}`;
    x.fillText(t('cardBeat')(an.overall), M, 465);

    // the quotable line — wrap to width
    x.fillStyle = INK;
    x.font = (lang === 'zh' ? '600 46px "Noto Serif SC"' : 'italic 400 46px "Instrument Serif"');
    const words = lang === 'zh' ? [...aTag] : aTag.split(' ');
    const joiner = lang === 'zh' ? '' : ' ';
    let line = '', ty = 560;
    for (const w of words) {
      const test = line ? line + joiner + w : w;
      if (x.measureText(test).width > W - 2 * M && line && !'。，！？；、）”'.includes(w)) {
        x.fillText(line, M, ty); ty += 62; line = w;
      } else line = test;
    }
    if (line) { x.fillText(line, M, ty); ty += 62; }

    // radar
    const cx0 = W - 300, cy0 = 940, R = 150;
    const ang = [-90, 150, 30].map(d => d * Math.PI / 180);
    const P = (i, r) => [cx0 + Math.cos(ang[i]) * r, cy0 + Math.sin(ang[i]) * r];
    const tri = (r, style, width, fill) => {
      x.beginPath();
      [0, 1, 2].forEach((i, k) => { const [px, py] = P(i, r); k ? x.lineTo(px, py) : x.moveTo(px, py); });
      x.closePath();
      if (fill) { x.fillStyle = fill; x.fill(); }
      if (style) { x.strokeStyle = style; x.lineWidth = width; x.stroke(); }
    };
    tri(R, RULE, 2); tri(R * 2 / 3, RULE, 2); tri(R / 3, RULE, 2);
    x.beginPath();
    an.scores.forEach((s, i) => { const [px, py] = P(i, R * s / 100); i ? x.lineTo(px, py) : x.moveTo(px, py); });
    x.closePath();
    x.fillStyle = 'rgba(194,63,29,0.18)'; x.fill();
    x.strokeStyle = ACCENT; x.lineWidth = 5; x.lineJoin = 'round'; x.stroke();
    x.fillStyle = SOFT; x.font = `700 26px ${lang === 'zh' ? '"Noto Sans SC"' : 'Archivo'}`;
    x.textAlign = 'center';
    t('stageNames').forEach((nm, i) => {
      const [px, py] = P(i, R + 34);
      x.fillText(nm, px, py + 9);
    });
    x.textAlign = 'left';

    // score rows
    const rows = t('stageNames').map((nm, i) => [nm, an.scores[i]]);
    let y = 800;
    const sansF = lang === 'zh' ? '"Noto Sans SC"' : 'Archivo';
    for (const [k, v] of rows) {
      x.strokeStyle = RULE; x.lineWidth = 2;
      x.beginPath(); x.moveTo(M, y); x.lineTo(M + 380, y); x.stroke();
      x.fillStyle = SOFT; x.font = `500 34px ${sansF}`;
      x.fillText(k, M, y + 56);
      x.fillStyle = INK; x.font = '400 62px "Instrument Serif"';
      x.fillText(String(v), M + 290, y + 60);
      x.fillStyle = RULE; x.fillRect(M, y + 82, 380, 7);
      x.fillStyle = ACCENT; x.fillRect(M, y + 82, 380 * v / 100, 7);
      y += 118;
    }

    x.strokeStyle = INK; x.lineWidth = 4;
    x.beginPath(); x.moveTo(M, H - 190); x.lineTo(W - M, H - 190); x.stroke();
    x.fillStyle = INK;
    x.font = (lang === 'zh' ? '900 44px "Noto Serif SC"' : 'italic 400 44px "Instrument Serif"');
    x.fillText(t('cardFooter'), M, H - 125);
    x.fillStyle = SOFT; x.font = '500 28px Archivo'; x.letterSpacing = '2px';
    x.fillText(REPO, M, H - 78);
    x.letterSpacing = '0px';
    return c;
  }

  $('downloadBtn').addEventListener('click', async () => {
    const c = await drawCard(analysis);
    const a = document.createElement('a');
    a.download = `attention-type-${analysis.overall}.png`;
    a.href = c.toDataURL('image/png');
    a.click();
  });
  $('copyBtn').addEventListener('click', async () => {
    const [aName] = t('archetypes')[analysis.type];
    try { await navigator.clipboard.writeText(t('share')(aName, analysis.scores, analysis.overall)); } catch {}
    $('copiedNote').classList.add('show');
    setTimeout(() => $('copiedNote').classList.remove('show'), 2200);
  });

  /* ================= flow ================= */
  async function run() {
    show('game');
    await stage1();
    await stage2();
    await stage3();
    analysis = analyze();
    renderResults(analysis);
    show('results');
  }
  $('startBtn').addEventListener('click', run);
  $('retryBtn').addEventListener('click', run);
  document.addEventListener('keydown', e => {
    if (e.code === 'Space' && screens.game.classList.contains('active')) e.preventDefault();
  });

  applyLang();

  /* debug hooks: ?debug&mock jumps to results; ?debug&pose=1|2|3 shows a frozen stage */
  if (qs.has('debug')) {
    window.__mock = (over = {}) => {
      analysis = Object.assign({
        scores: [78, 64, 88], overall: 78, type: 'fortress',
        weakest: 1, strongest: 2, s1rt: 287, s2rt: 1340, s3cost: 62, s3acc: 100,
      }, over);
      renderResults(analysis); show('results');
    };
    if (qs.has('mock')) window.__mock();
    const pose = +qs.get('pose');
    if (pose) {
      show('game');
      if (pose === 1) {
        hud(0, 2, 5);
        arena.innerHTML = `<div class="signal-ring go">${t('go')}</div>`;
        feedback(`<span class="ms">243 ms</span> · ${gradeOf(t('s1grades'), 243)}`, false);
        fb.style.opacity = 1; fb.classList.remove('pop');
      } else if (pose === 2) {
        hud(1, 1, 5);
        arena.innerHTML = `<div class="search-grid">` +
          Array.from({ length: 12 }, (_, k) => {
            const rot = [0, 90, 180, 270][k % 4];
            return `<div class="search-cell"><span style="transform:rotate(${rot}deg)">${k === 7 ? 'L' : 'T'}</span></div>`;
          }).join('') + `</div>`;
      } else if (pose === 3) {
        hud(2, 3, 8);
        arena.innerHTML = `<div class="flanker-wrap"><div class="arrows">→→<span class="c">←</span>→→</div></div>`;
        const lr = document.createElement('div');
        lr.className = 'lr-buttons';
        lr.innerHTML = `<button>←</button><button>→</button>`;
        const hint = document.createElement('div');
        hint.className = 'lr-hint'; hint.textContent = t('lrHint');
        $('game').append(hint, lr);
      }
    }
  }
})();
</script>
</body>
</html>
