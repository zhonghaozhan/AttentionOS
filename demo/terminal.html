<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Attention Span Test in Your Terminal Style — 60s | AttentionOS 注意力测试</title>
<meta name="description" content="$ attn check-up — a free 60-second attention span test styled as a dark arcade terminal. Three micro-games map your alerting, orienting and executive networks (ANT paradigm). No login, nothing leaves your browser. 60秒终端风注意力测试。">
<meta name="keywords" content="attention span test,attention test,focus test,terminal,注意力测试,专注力测试,ANT">
<link rel="canonical" href="https://zhonghaozhan.github.io/AttentionOS/demo/terminal.html">
<meta property="og:title" content="$ attn check-up — a 60s attention test for terminal people">
<meta property="og:description" content="Alerting · Orienting · Executive — three micro-games, an archetype, a prescription. Nothing leaves your browser.">
<meta property="og:url" content="https://zhonghaozhan.github.io/AttentionOS/demo/terminal.html">
<meta property="og:type" content="website">
<meta property="og:image" content="https://zhonghaozhan.github.io/AttentionOS/assets/og.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://zhonghaozhan.github.io/AttentionOS/assets/og.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Press+Start+2P&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #101116;     /* near-black, slightly warm */
    --panel: #191b22;
    --line: #2a2d36;
    --dk: #3a3d46;     /* dark fill (sprites, empty bar blocks) */
    --text: #e8e6e1;   /* warm off-white */
    --dim: #6e7079;
    --acc: #ff8c42;    /* Claude-coral orange, primary accent */
    --ok: #7ee787;
    --err: #ff6b6b;
    --cyn: #56c8d8;    /* sparse: links / secondary */
    --fs-xs: 10px;
    --fs-s: 11px;
    --fs-m: 13px;
    --fs-l: 17px;
    --fs-xl: 24px;
    --mono: "JetBrains Mono", "Noto Sans SC", ui-monospace, Menlo, Consolas, monospace;
    --px: "Press Start 2P", "Noto Sans SC", monospace;
  }
  html[lang="zh"] {
    --fs-xs: 11px;
    --fs-s: 12px;
    --fs-m: 14px;
    --fs-l: 19px;
    --fs-xl: 26px;
  }
  @media (min-width: 900px) {
    :root { --fs-xs: 11px; --fs-s: 12px; --fs-m: 14px; --fs-l: 19px; --fs-xl: 28px; }
    html[lang="zh"] { --fs-xs: 12px; --fs-s: 13px; --fs-m: 15px; --fs-l: 21px; --fs-xl: 30px; }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { background: var(--bg); }
  body {
    font-family: var(--mono);
    font-size: var(--fs-m);
    line-height: 1.75;
    color: var(--text);
    min-height: 100svh;
    background: var(--bg);
    overscroll-behavior: none;
  }
  /* CRT scanlines — very light phosphor grain */
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 999;
    background: repeating-linear-gradient(
      0deg,
      rgba(255, 255, 255, 0.025) 0px,
      rgba(255, 255, 255, 0.025) 1px,
      transparent 1px,
      transparent 3px
    );
  }
  ::selection { background: var(--acc); color: var(--bg); }
  a { color: var(--cyn); text-decoration-color: var(--line); }
  canvas { image-rendering: pixelated; }
  .screen { display: none; }
  .screen.active { display: block; }

  .sheet {
    max-width: 660px;
    margin: 0 auto;
    padding: 18px 16px 56px;
  }
  @media (min-width: 900px) { .sheet { padding-top: 40px; } }

  /* ---- pixel window: notched 4px border via box-shadow + hard slab shadow ----
     (technique inherited from the retired pixel.html) */
  .win {
    position: relative;
    background: var(--panel);
    margin: 24px 14px 28px 6px;
    box-shadow:
      0 -4px 0 0 var(--line),
      0 4px 0 0 var(--line),
      -4px 0 0 0 var(--line),
      4px 0 0 0 var(--line),
      8px 8px 0 0 #000;
  }
  .tab {
    position: absolute;
    top: -0.8em;
    left: 10px;
    background: var(--bg);
    color: var(--dim);
    padding: 0 7px;
    font-size: var(--fs-xs);
    letter-spacing: 1px;
    line-height: 1.5;
    text-transform: uppercase;
  }

  .masthead {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--panel);
    padding: 8px 12px;
    margin: 6px 14px 26px 6px;
    font-size: var(--fs-s);
    box-shadow:
      0 -4px 0 0 var(--line),
      0 4px 0 0 var(--line),
      -4px 0 0 0 var(--line),
      4px 0 0 0 var(--line),
      6px 6px 0 0 #000;
  }
  .masthead .brand { letter-spacing: 1px; }
  .masthead .brand .p { color: var(--ok); }
  .masthead .brand .v { color: var(--dim); }
  .lang-toggle {
    font-family: inherit;
    font-size: var(--fs-xs);
    background: none;
    border: none;
    color: var(--cyn);
    padding: 4px 2px;
    cursor: pointer;
    letter-spacing: 1px;
  }
  .lang-toggle::before { content: "[ "; color: var(--dim); }
  .lang-toggle::after { content: " ]"; color: var(--dim); }
  .lang-toggle:hover, .lang-toggle:active { color: var(--acc); }

  /* blinking block cursor */
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  .cur::after, h1::after {
    content: "▊";
    color: var(--acc);
    margin-left: 6px;
    animation: blink 1.1s steps(1, end) infinite;
  }

  /* fake prompt line, typed out */
  .prompt-line {
    font-size: clamp(10px, 2.7vw, 13px);
    color: var(--ok);
    margin-bottom: 12px;
    letter-spacing: 0;
  }
  .typed {
    display: inline-block;
    overflow: hidden;
    white-space: nowrap;
    max-width: 100%;
    vertical-align: bottom;
    width: 55ch;
    animation: typing 2.2s steps(55, end) backwards;
  }
  .typed::after {
    content: "▊";
    color: var(--acc);
    margin-left: 2px;
    animation: blink 1.1s steps(1, end) infinite;
  }
  @keyframes typing { from { width: 0; } to { width: 55ch; } }

  /* ---------- intro ---------- */
  .hero { padding: 18px 16px 20px; }
  .hero-kicker {
    color: var(--dim);
    font-size: var(--fs-xs);
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .hero-kicker::before { content: "// "; }
  h1 {
    font-family: var(--px);
    font-size: clamp(15px, 4.6vw, 21px);
    font-weight: 400;
    line-height: 1.9;
    margin-top: 12px;
    text-transform: uppercase;
  }
  h1 .accent { color: var(--acc); }
  .lede { margin-top: 12px; font-size: var(--fs-s); line-height: 1.95; color: var(--dim); }
  .lede strong { color: var(--text); font-weight: 400; }

  .stages-preview { padding: 16px 16px 8px; }
  .stage-line {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 9px 0;
    border-bottom: 1px dashed var(--line);
    font-size: var(--fs-s);
  }
  .stage-line:last-child { border-bottom: none; }
  .stage-line .no { color: var(--acc); font-size: var(--fs-xs); flex: none; }
  .stage-line .nm { min-width: 8em; text-transform: uppercase; }
  .stage-line .nm small { color: var(--dim); font-size: var(--fs-xs); margin-left: 4px; }
  .stage-line .ds { color: var(--dim); font-size: var(--fs-xs); flex: 1; }

  .start-row {
    margin-top: 26px;
    display: flex;
    align-items: center;
    gap: 18px;
    flex-wrap: wrap;
  }
  .btn {
    font-family: var(--px);
    font-size: 10px;
    line-height: 1.7;
    text-transform: uppercase;
    letter-spacing: 1px;
    background: var(--panel);
    color: var(--acc);
    border: 1px solid var(--acc);
    padding: 12px 16px;
    cursor: pointer;
    touch-action: manipulation;
    box-shadow: 4px 4px 0 0 #000;
  }
  .btn::before { content: "[ "; opacity: 0.55; }
  .btn::after { content: " ]"; opacity: 0.55; }
  .btn:hover, .btn:active { background: var(--acc); color: var(--bg); }  /* inverse video */
  .btn:active { transform: translate(3px, 3px); box-shadow: 1px 1px 0 0 #000; }
  .btn.ghost { color: var(--text); border-color: var(--line); }
  .btn.ghost:hover, .btn.ghost:active { background: var(--text); color: var(--bg); }
  .fine { font-size: var(--fs-xs); color: var(--dim); line-height: 1.9; max-width: 34ch; }

  .footer-rule {
    margin-top: 44px;
    padding-top: 12px;
    border-top: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    font-size: var(--fs-xs);
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--dim);
  }

  /* ---------- game ---------- */
  #game {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 10;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .game-hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 44px;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    color: var(--dim);
    padding: 0 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: var(--fs-xs);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  #hudStage { color: var(--text); font-family: var(--px); font-size: 9px; }
  .dots { display: flex; gap: 6px; }
  .dot { width: 9px; height: 9px; border: 1px solid var(--dk); }
  .dot.done { background: var(--acc); border-color: var(--acc); }
  .streak {
    color: var(--acc);
    font-family: var(--px);
    font-size: 9px;
    display: inline-block;
    transform-origin: center;
    opacity: 0;
    transition: opacity 0.2s steps(2, end), transform 0.15s steps(2, end);
  }
  .streak.show { opacity: 1; }
  .snd {
    font-family: var(--px);
    font-size: 8px;
    background: none;
    border: 1px solid var(--line);
    color: var(--dim);
    padding: 4px 6px;
    cursor: pointer;
    letter-spacing: 1px;
    touch-action: manipulation;
  }
  .snd.on { color: var(--acc); border-color: var(--acc); }
  /* arcade screen shake: transform-only, on the game root */
  .shake-s { animation: shakegood 0.08s steps(2, end); }
  @keyframes shakegood {
    0% { transform: translate(2px, -2px); }
    50% { transform: translate(-2px, 2px); }
    100% { transform: translate(0, 0); }
  }
  .shake-c { animation: shakecrit 0.12s steps(3, end); }
  @keyframes shakecrit {
    0% { transform: translate(4px, -4px); }
    33% { transform: translate(-4px, 4px); }
    66% { transform: translate(4px, 2px); }
    100% { transform: translate(0, 0); }
  }

  #arena {
    position: absolute;
    inset: 44px 0 96px;
    display: grid;
    place-items: center;
  }
  /* per-trial feedback = one log line */
  .feedback {
    position: absolute;
    left: 0; right: 0;
    bottom: 30px;
    width: fit-content;
    margin: 0 auto;
    background: var(--panel);
    box-shadow:
      0 -4px 0 0 var(--line),
      0 4px 0 0 var(--line),
      -4px 0 0 0 var(--line),
      4px 0 0 0 var(--line),
      5px 5px 0 0 #000;
    color: var(--text);
    padding: 9px 14px;
    font-size: var(--fs-s);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    opacity: 0;
    pointer-events: none;
  }
  .feedback .ok { color: var(--ok); font-weight: 400; }
  .feedback .warn { color: var(--acc); font-weight: 400; }
  .feedback .err { color: var(--err); font-weight: 400; }
  .feedback .ms { color: var(--dim); }
  .feedback.pop { animation: fbpop 0.8s steps(6, end); }
  @keyframes fbpop {
    0% { opacity: 0; transform: translateY(8px); }
    15% { opacity: 1; transform: translateY(0); }
    80% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* stage intro = dialogue window */
  .stage-card {
    max-width: 360px;
    padding: 20px 18px;
    text-align: left;
  }
  .stage-card .k {
    color: var(--acc);
    font-size: var(--fs-xs);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .stage-card h2 {
    font-family: var(--px);
    font-size: 13px;
    font-weight: 400;
    line-height: 1.9;
    margin: 12px 0 8px;
    text-transform: uppercase;
  }
  .stage-card h2::after { content: none; }
  .stage-card p { color: var(--dim); font-size: var(--fs-s); line-height: 1.9; }
  .stage-card .btn { margin-top: 18px; }

  /* stage 1: signal target */
  .signal-ring {
    width: min(56vw, 230px);
    aspect-ratio: 1;
    background: var(--panel);
    box-shadow:
      0 -4px 0 0 var(--line),
      0 4px 0 0 var(--line),
      -4px 0 0 0 var(--line),
      4px 0 0 0 var(--line),
      8px 8px 0 0 #000;
    display: grid;
    place-items: center;
    font-size: var(--fs-m);
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .signal-ring.go {
    background: var(--acc);
    box-shadow:
      0 -4px 0 0 var(--acc),
      0 4px 0 0 var(--acc),
      -4px 0 0 0 var(--acc),
      4px 0 0 0 var(--acc),
      8px 8px 0 0 #000;
    color: var(--bg);
    font-family: var(--px);
    font-size: var(--fs-xl);
    animation: sigpop 0.15s steps(2, end);
  }
  @keyframes sigpop { from { transform: scale(0.6); } to { transform: scale(1); } }
  .shake { animation: shake 0.35s steps(4, end); }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); } 50% { transform: translateX(8px); } 75% { transform: translateX(-4px); }
  }

  /* stage 2: search grid */
  .search-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: clamp(10px, 3vw, 16px);
    padding: 16px;
  }
  .search-cell {
    width: clamp(54px, 16vw, 80px);
    aspect-ratio: 1;
    background: var(--panel);
    box-shadow: inset 0 0 0 3px var(--line);
    color: var(--text);
    display: grid;
    place-items: center;
    font-size: clamp(18px, 6vw, 26px);
    cursor: pointer;
  }
  .search-cell:active { box-shadow: inset 0 0 0 3px var(--acc); color: var(--acc); }
  .search-cell.wrong {
    box-shadow: inset 0 0 0 3px var(--err);
    color: var(--err);
    animation: shake 0.3s steps(4, end);
  }

  /* stage 3: flanker */
  .flanker-wrap { text-align: center; }
  .fixation { font-size: 26px; color: var(--dim); }
  .arrows {
    font-family: var(--mono);
    font-weight: 700;
    font-size: clamp(30px, 11vw, 48px);
    letter-spacing: 0;
    color: var(--text);
  }
  .lr-buttons {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 96px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    border-top: 4px solid var(--line);
  }
  .lr-buttons button {
    font-family: var(--mono);
    font-size: 34px;
    background: var(--panel);
    border: none;
    border-right: 4px solid var(--line);
    cursor: pointer;
    color: var(--text);
    touch-action: manipulation;
  }
  .lr-buttons button:last-child { border-right: none; }
  .lr-buttons button:active { background: var(--acc); color: var(--bg); }
  .lr-hint {
    position: absolute;
    bottom: 104px; left: 12px; right: 12px;
    text-align: center;
    font-size: var(--fs-xs);
    letter-spacing: 1px;
    color: var(--dim);
    text-transform: uppercase;
  }

  /* stage clear window */
  .stamp-overlay {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    background: rgba(16, 17, 22, 0.92);
  }
  .stamp {
    background: var(--panel);
    box-shadow:
      0 -4px 0 0 var(--line),
      0 4px 0 0 var(--line),
      -4px 0 0 0 var(--line),
      4px 0 0 0 var(--line),
      8px 8px 0 0 #000;
    padding: 24px 34px 26px;
    text-align: center;
    margin: 0;
    animation: stampin 0.3s steps(3, end);
  }
  @keyframes stampin {
    from { transform: scale(1.4); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .stamp .s-title { font-size: var(--fs-xs); letter-spacing: 1px; text-transform: uppercase; color: var(--dim); }
  .stamp .s-clear { font-family: var(--px); font-size: 12px; line-height: 1.8; margin-top: 10px; letter-spacing: 2px; text-transform: uppercase; }
  /* the one sanctioned glow: big accent score */
  .stamp .s-score {
    font-family: var(--px);
    font-size: 32px;
    line-height: 1.5;
    margin-top: 14px;
    color: var(--acc);
    text-shadow: 0 0 8px rgba(255, 140, 66, 0.35);
  }
  .stamp .s-line { font-size: var(--fs-s); color: var(--dim); margin-top: 8px; }

  /* ---------- results ---------- */
  .status-win {
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 20px 16px 16px;
  }
  #spriteCanvas { width: clamp(96px, 28vw, 144px); height: auto; flex: none; }
  .verdict-label {
    color: var(--dim);
    font-size: var(--fs-xs);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .verdict-label::before { content: "// "; }
  .verdict {
    font-family: var(--px);
    font-size: clamp(14px, 4.2vw, 18px);
    font-weight: 400;
    line-height: 1.8;
    margin-top: 8px;
    color: var(--acc);
    text-transform: uppercase;
  }
  .verdict-tag { margin-top: 8px; font-size: var(--fs-s); line-height: 1.85; color: var(--dim); }

  /* bracket-bars panel */
  .bars-win { padding: 18px 14px 12px; }
  .hp-row { display: flex; align-items: center; gap: 10px; padding: 5px 0; font-size: var(--fs-s); }
  .hp-label { font-size: var(--fs-xs); width: 7ch; flex: none; color: var(--dim); text-transform: uppercase; }
  .bbar { flex: 1; color: var(--dk); overflow: hidden; white-space: nowrap; letter-spacing: 0; }
  .bbar b { font-weight: 400; }
  .hp-num { font-family: var(--px); font-size: 12px; min-width: 3ch; text-align: right; }
  .n0 b, .hp-num.n0 { color: var(--acc); }   /* alerting */
  .n1 b, .hp-num.n1 { color: var(--cyn); }   /* orienting */
  .n2 b, .hp-num.n2 { color: var(--ok); }    /* executive */

  .networks { margin: 6px 2px 10px; }
  .net-row { padding: 13px 2px; border-bottom: 1px dashed var(--line); }
  .net-row:last-child { border-bottom: none; }
  .net-top { display: flex; justify-content: space-between; align-items: baseline; }
  .net-top .nm { font-family: var(--px); font-size: 10px; text-transform: uppercase; }
  .net-top .nm small { color: var(--dim); font-size: var(--fs-xs); margin-left: 6px; }
  .net-top .sc { font-family: var(--px); font-size: 18px; }
  .sc.n0 { color: var(--acc); text-shadow: 0 0 8px rgba(255, 140, 66, 0.35); }
  .sc.n1 { color: var(--cyn); text-shadow: 0 0 8px rgba(86, 200, 216, 0.35); }
  .sc.n2 { color: var(--ok); text-shadow: 0 0 8px rgba(126, 231, 135, 0.35); }
  .net-sub { font-size: var(--fs-xs); color: var(--dim); margin-top: 6px; }
  .net-rank {
    display: inline-block;
    color: var(--cyn);
    font-size: var(--fs-xs);
    margin-top: 6px;
    letter-spacing: 0.5px;
  }

  .rx { padding: 20px 16px 12px; margin-top: 24px; }
  .rx-label {
    position: absolute;
    top: -0.8em;
    left: 10px;
    background: var(--bg);
    color: var(--dim);
    padding: 0 7px;
    font-size: var(--fs-xs);
    letter-spacing: 1px;
    line-height: 1.5;
    text-transform: uppercase;
  }
  .rx ul { list-style: none; }
  .rx li {
    padding: 10px 0;
    border-bottom: 1px dashed var(--line);
    font-size: var(--fs-s);
    line-height: 1.95;
    color: var(--dim);
    display: flex;
    gap: 10px;
  }
  .rx li:last-child { border-bottom: none; }
  .rx li::before { content: "-"; color: var(--acc); flex: none; }
  .rx li strong { font-weight: 700; color: var(--acc); }

  details.science {
    margin-top: 18px;
    font-size: var(--fs-xs);
    color: var(--dim);
    line-height: 1.95;
  }
  details.science summary { cursor: pointer; color: var(--cyn); text-transform: uppercase; letter-spacing: 1px; }
  details.science a { color: var(--dim); }

  .actions {
    margin-top: 26px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  .copied-note { font-size: var(--fs-xs); color: var(--ok); text-transform: uppercase; opacity: 0; transition: opacity 0.2s steps(2, end); }
  .copied-note.show { opacity: 1; }
  .star-ask { margin-top: 22px; font-size: var(--fs-s); color: var(--dim); line-height: 1.9; }
  .star-ask a { color: var(--cyn); }

  .style-nav {
    text-align: center;
    padding: 18px 0 26px;

  let sndOn = true;

  let AC = null;

    if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch {} }
    if (AC && AC.state === 'suspended') AC.resume().catch(() => {});
    return AC;
  }
  /* square-wave blip with exponential-decay envelope; `when` = start offset (s) */
  function beep(freq, dur = 0.06, type = 'square', vol = 0.05, when = 0) {
    if (!sndOn) return;
    const ctx = ac();
    if (!ctx) return;
    try {
      const t0 = ctx.currentTime + when;
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = type;
      o.frequency.setValueAtTime(freq, t0);
      g.gain.setValueAtTime(vol, t0);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
      o.connect(g); g.connect(ctx.destination);
      o.start(t0); o.stop(t0 + dur + 0.02);
    } catch {}
  }

  const fxLayer = document.createElement('div');

  const FX_CAP = 30;
  let fxLive = 0;
  function burst(el) {
    if (REDUCED_MOTION || !CAN_ANIMATE || !el) return;
    const r = el.getBoundingClientRect();
    const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
    const n = 10 + Math.floor(Math.random() * 5);   // 10-14 particles
    for (let i = 0; i < n; i++) {
      if (fxLive >= FX_CAP) break;
      const s = document.createElement('span');
      s.textContent = FX_CHARS[Math.floor(Math.random() * FX_CHARS.length)];
      s.style.cssText = `position:absolute;left:${cx}px;top:${cy}px;` +
        `font-family:var(--mono);font-size:${10 + Math.floor(Math.random() * 5)}px;line-height:1;` +
        `color:${FX_COLORS[Math.floor(Math.random() * FX_COLORS.length)]};`;
      fxLayer.appendChild(s);
      fxLive++;
      const ang = Math.random() * Math.PI * 2;
      const dist = 50 + Math.random() * 80;          // 50-130px travel
      const dx = Math.cos(ang) * dist, dy = Math.sin(ang) * dist;
      const grav = 16 + Math.random() * 20;          // slight gravity
      const anim = s.animate([
        { transform: 'translate(-50%, -50%)', opacity: 1 },
        { transform: `translate(calc(-50% + ${(dx * 0.7).toFixed(1)}px), calc(-50% + ${(dy * 0.7).toFixed(1)}px))`, opacity: 0.9, offset: 0.6 },
        { transform: `translate(calc(-50% + ${dx.toFixed(1)}px), calc(-50% + ${(dy + grav).toFixed(1)}px))`, opacity: 0 },
      ], { duration: 350 + Math.random() * 200, easing: 'cubic-bezier(0.2, 0.7, 0.4, 1)' });
      const kill = () => { s.remove(); fxLive = Math.max(0, fxLive - 1); };
      anim.onfinish = kill;
      anim.oncancel = kill;
    }
  }
  /* top-tier hit: brief phosphor glow pulse on the feedback log line */
  function critPulse() {
    if (REDUCED_MOTION || !CAN_ANIMATE) return;

  const hitStop = () => sleep(REDUCED_MOTION ? 0 : 50);
  /* screen shake on the game root: 2px on good hits, 4px on crits */
  function screenShake(crit) {

    if (REDUCED_MOTION || !CAN_ANIMATE || !el || fxLive >= FX_CAP) return;

    fxLayer.appendChild(s);
    fxLive++;
    const anim = s.animate([
      { transform: 'translate(-50%, 0)', opacity: 1 },
      { transform: 'translate(-50%, -36px)', opacity: 0 },
    ], { duration: 500, easing: 'cubic-bezier(0.2, 0.7, 0.4, 1)' });
    const kill = () => { s.remove(); fxLive = Math.max(0, fxLive - 1); };
    anim.onfinish = kill;
    anim.oncancel = kill;

    const edge = document.createElement('div');

  const PAL = ['', '#e8e6e1', '#ff8c42', '#3a3d46', '#c07890', '#ffffff', '#2e3138', '#565a64'];
  function drawSprite(ctx, grid, scale, ox = 0, oy = 0) {
    const n = grid.length;
    for (let y = 0; y < n; y++) for (let x = 0; x < n; x++) {
      const v = grid[y][x];
      if (v === '0') continue;
      ctx.fillStyle = PAL[+v] || PAL[1];
      ctx.fillRect(ox + x * scale, oy + y * scale, scale, scale);
    }
  }
  function spriteScale(grid, base16) {
    return Math.max(1, Math.round(base16 * 16 / grid.length));
  }

    cv.width = cv.height = grid.length * scale;
    const g = cv.getContext('2d');
    g.clearRect(0, 0, cv.width, cv.height);
    drawSprite(g, grid, scale);
  }

  /* log-line helpers: ✔ 231ms :: CRITICAL */

    `<b class="${good ? 'ok' : 'warn'}">${good ? '✔' : '✘'}</b> <span class="ms">${ms}</span> :: ${grade}`;
  const errLine = msg => `<b class="err">✘</b> ${msg}`;
  function bumpStreak(good) {
    streakN = good ? streakN + 1 : 0;

      el.classList.remove('show'); void el.offsetWidth; el.classList.add('show');
      if (streakN === 3 || streakN === 5 || streakN === 8) {
        SND.combo();
        comboPulse();
      }
    } else {
      el.classList.remove('show');
      el.style.transform = '';

  }
  function gradeOf(table, rt) {
    for (const [max, label] of table) if (rt < max) return label;

  function stageCard(idx) {
    return new Promise(res => {

  /* ---------- stage 1: alerting ---------- */
  async function stage1() {
    const TRIALS = 5;
    data.s1 = []; data.s1false = 0; streakN = 0;
    hud(0, 0, TRIALS);
    await stageCard(0);
    for (let i = 0; i < TRIALS; i++) {
      hud(0, i, TRIALS);
      arena.innerHTML = `<div class="signal-ring" id="ring">${t('waiting')}</div>`;
      const ring = $('ring');
      let fired = false, t0 = 0;
      const rt = await new Promise(res => {
        let timer = setTimeout(fire, 900 + Math.random() * 1600);
        function fire() {
          fired = true;
          ring.classList.add('go');
          ring.textContent = t('go');
          t0 = performance.now();
        }
        function onTap(e) {
          if (e.type === 'keydown' && (e.code !== 'Space' || e.repeat)) return;
          e.preventDefault();
          if (!fired) {                       // false start
            data.s1false++;
            clearTimeout(timer);
            ring.classList.add('shake');
            SND.falseStart();
            feedback(errLine(t('falseStart')), false);
            bumpStreak(false);
            setTimeout(() => {
              ring.classList.remove('shake');
              timer = setTimeout(fire, 1200 + Math.random() * 1600);
            }, 500);
            return;
          }
          cleanup();
          res(performance.now() - t0);
        }
        function cleanup() {
          arena.removeEventListener('pointerdown', onTap);
          document.removeEventListener('keydown', onTap);
        }
        arena.addEventListener('pointerdown', onTap);
        document.addEventListener('keydown', onTap);
      });
      data.s1.push(rt);
      const good = rt < 450;
      const crit = rt < 250;                   // CRITICAL grade
      if (good) await hitStop();
      bumpStreak(good);
      if (good) {
        burst(ring);
        screenShake(crit);
        damageNum(ring, `${Math.round(rt)}ms`, crit);
        (crit ? SND.crit : SND.good)();
      } else SND.bad();
      feedback(logLine(good, `${Math.round(rt)}ms`, gradeOf(t('s1grades'), rt)), good);
      if (crit) critPulse();
      hud(0, i + 1, TRIALS);
      await sleep(750);
    }
    const s = scoreAlerting();
    await stamp(0, s);
  }

  /* ---------- stage 2: orienting ---------- */
  async function stage2() {
    const TRIALS = 5, CELLS = 12;
    data.s2 = []; data.s2wrong = 0; streakN = 0;
    hud(1, 0, TRIALS);
    await stageCard(1);
    for (let i = 0; i < TRIALS; i++) {

            <span style="transform:rotate(${rot}deg)">${ch}</span></div>`;
        }).join('') + `</div>`;
      const t0 = performance.now();
      let wrongThis = 0;
      const rt = await new Promise(res => {
        arena.querySelectorAll('.search-cell').forEach(cell => {
          cell.addEventListener('pointerdown', () => {
            if (+cell.dataset.k === target) res(performance.now() - t0);
            else {
              wrongThis++; data.s2wrong++;
              cell.classList.add('wrong');
              SND.bad();
              buzz(30);
            }
          });
        });
      });
      data.s2.push(rt + wrongThis * 300);   // wrong taps cost
      const good = rt < 2400 && wrongThis === 0;
      const crit = good && rt < 1000;       // CRITICAL grade
      if (good) await hitStop();
      bumpStreak(good);
      if (good) {
        const cell = arena.querySelector(`.search-cell[data-k="${target}"]`);
        burst(cell);
        screenShake(crit);
        damageNum(cell, `${(rt / 1000).toFixed(2)}s`, crit);

      } else SND.bad();
      feedback(logLine(good, `${(rt / 1000).toFixed(2)}s`, gradeOf(t('s2grades'), rt)), good);
      if (crit) critPulse();
      hud(1, i + 1, TRIALS);
      await sleep(750);
    }
    const s = scoreOrienting();
    await stamp(1, s);
  }

  /* ---------- stage 3: executive (flanker) ---------- */
  async function stage3() {
    const TRIALS = 8;
    data.s3 = []; streakN = 0;
    hud(2, 0, TRIALS);
    await stageCard(2);
    const conds = [1, 1, 1, 1, 0, 0, 0, 0].sort(() => Math.random() - 0.5); // 1=incongruent
    const lr = document.createElement('div');
    lr.className = 'lr-buttons';
    lr.innerHTML = `<button data-d="L">←</button><button data-d="R">→</button>`;
    const hint = document.createElement('div');
    hint.className = 'lr-hint';
    hint.textContent = t('lrHint');
    $('game').append(hint, lr);
    for (let i = 0; i < TRIALS; i++) {
      hud(2, i, TRIALS);
      const incong = conds[i];
      const dir = Math.random() < 0.5 ? 'L' : 'R';
      const c = dir === 'L' ? '←' : '→';
      const f = incong ? (dir === 'L' ? '→' : '←') : c;
      arena.innerHTML = `<div class="flanker-wrap"><div class="fixation">+</div></div>`;
      await sleep(400 + Math.random() * 300);
      arena.innerHTML = `<div class="flanker-wrap"><div class="arrows">${f}${f}${c}${f}${f}</div></div>`;
      const t0 = performance.now();
      const ans = await new Promise(res => {
        const to = setTimeout(() => { cleanup(); res(null); }, 1600);
        function onKey(e) {
          if (e.key === 'ArrowLeft') done('L');
          else if (e.key === 'ArrowRight') done('R');
        }
        function onBtn(e) {
          const b = e.target.closest('button[data-d]');
          if (b) done(b.dataset.d);
        }
        function done(d) { clearTimeout(to); cleanup(); res(d); }
        function cleanup() {
          document.removeEventListener('keydown', onKey);
          lr.removeEventListener('pointerdown', onBtn);
        }
        document.addEventListener('keydown', onKey);
        lr.addEventListener('pointerdown', onBtn);
      });
      const rt = performance.now() - t0;
      const correct = ans === dir;
      data.s3.push({ incong, rt: ans ? rt : 1600, correct });
      if (correct) await hitStop();
      bumpStreak(correct);
      if (!ans) { SND.bad(); feedback(errLine(t('s3miss')), false); }
      else if (!correct) { SND.bad(); feedback(errLine(t('s3bad')), false); }
      else {
        const arrows = arena.querySelector('.arrows');
        burst(arrows);
        screenShake(incong);
        damageNum(arrows, `${Math.round(rt)}ms`, incong);
        (incong ? SND.crit : SND.good)();
        feedback(logLine(true, `${Math.round(rt)}ms`, incong ? t('s3okHard') : t('s3ok')), true);
        if (incong) critPulse();              // incongruent-correct = top tier
      }
      hud(2, i + 1, TRIALS);
      await sleep(700);
    }
    hint.remove(); lr.remove();
    const s = scoreExecutive();
    await stamp(2, s);
  }

  /* ================= scoring (docs/SCIENCE.md) ================= */
  const median = a => {
    const s = [...a].sort((x, y) => x - y);
    return s.length ? (s[s.length >> 1] + s[(s.length - 1) >> 1]) / 2 : 0;
  };
  const logistic = (x, mid, k) => Math.round(100 / (1 + Math.exp((x - mid) / k)));
  const clamp100 = v => Math.max(1, Math.min(99, v));

  function scoreAlerting() {
    const rt = median(data.s1);
    return clamp100(logistic(rt, 350, 55) - data.s1false * 6);
  }
  function scoreOrienting() {
    const rt = median(data.s2);
    return clamp100(logistic(rt, 1500, 380));
  }
  function scoreExecutive() {
    const cong = data.s3.filter(x => !x.incong && x.correct).map(x => x.rt);
    const inc = data.s3.filter(x => x.incong && x.correct).map(x => x.rt);
    const cost = (inc.length && cong.length) ? Math.max(0, median(inc) - median(cong)) : 250;
    const errors = data.s3.filter(x => !x.correct).length;
    return clamp100(Math.round(logistic(cost, 115, 42) * Math.max(0.3, 1 - errors * 0.13)));
  }

  function analyze() {
    const a = scoreAlerting(), o = scoreOrienting(), e = scoreExecutive();
    const scores = [a, o, e];
    const overall = Math.round(a * 0.3 + o * 0.3 + e * 0.4);
    const mx = Math.max(...scores), mn = Math.min(...scores);
    let type;
    if (mn >= 75) type = 'commander';
    else if ((mx + mn) / 2 < 50 && mx < 60) type = 'wanderer';
    else if (mx - mn <= 12) type = 'balanced';
    else type = ['cheetah', 'hawkeye', 'fortress'][scores.indexOf(mx)];
    const cong = data.s3.filter(x => !x.incong && x.correct).map(x => x.rt);
    const inc = data.s3.filter(x => x.incong && x.correct).map(x => x.rt);
    return {
      scores, overall, type,
      weakest: scores.indexOf(mn),
      strongest: scores.indexOf(mx),
      s1rt: Math.round(median(data.s1)) || 0,
      s2rt: Math.round(median(data.s2)) || 0,
      s3cost: (inc.length && cong.length) ? Math.round(Math.max(0, median(inc) - median(cong))) : 0,
      s3acc: Math.round(100 * data.s3.filter(x => x.correct).length / Math.max(1, data.s3.length)),
    };
  }

  /* ================= results ================= */

  /* orchestrated results reveal: sprite pop -> bars fill (staggered ticks)
     -> rank stamps -> archetype name + fanfare. Total ~2.2s. Mock/lang-toggle
     re-renders skip this and stay instant. */
  function revealResults() {
    if (REDUCED_MOTION || !CAN_ANIMATE) { setTimeout(SND.fanfare, 100); return; }
    const pop = (el, delay, frames, opts = {}) => {
      if (el) el.animate(frames, Object.assign({ duration: 300, delay, easing: 'steps(4, end)', fill: 'backwards' }, opts));
    };
    // 1) sprite pops in
    pop($('spriteCanvas'), 0, [
      { transform: 'scale(0)', opacity: 0 },
      { transform: 'scale(1)', opacity: 1 },
    ]);
    setTimeout(SND.good, 30);
    // 2) bracket-bars fill sequentially, one tick each
    document.querySelectorAll('#radarBox .bbar b').forEach((b, i) => {
      pop(b, 350 + i * 250, [
        { clipPath: 'inset(0 100% 0 0)' },
        { clipPath: 'inset(0 0 0 0)' },
      ], { duration: 350, easing: 'steps(10, end)' });
      setTimeout(SND.tick, 350 + i * 250);
    });
    // 3) RANK lines stamp in
    document.querySelectorAll('#networks .net-rank').forEach((el, i) => {
      pop(el, 1350 + i * 100, [
        { transform: 'scale(1.4)', opacity: 0 },
        { transform: 'scale(1)', opacity: 1 },
      ], { duration: 200, easing: 'steps(3, end)' });
    });
    // 4) archetype name lands last
    pop($('archetype'), 1800, [
      { transform: 'scale(1.3)', opacity: 0 },
      { transform: 'scale(1)', opacity: 1 },
    ], { duration: 250, easing: 'steps(3, end)' });
    pop($('archetypeTag'), 2000, [{ opacity: 0 }, { opacity: 1 }], { duration: 250 });
    setTimeout(SND.fanfare, 1800);
  }

    $('sciBody').textContent = t('sci');
    $('starAsk').innerHTML = t('starAsk') + `<a href="https://${REPO}" target="_blank" rel="noopener">${REPO}</a>`;
  }

  /* ================= share card: a beautiful terminal screenshot ================= */
  async function drawCard(an) {
    await document.fonts.load('20px "Press Start 2P"').catch(() => {});
    await document.fonts.load('20px "JetBrains Mono"').catch(() => {});
    await document.fonts.load('700 20px "JetBrains Mono"').catch(() => {});
    if (lang === 'zh') await document.fonts.load('700 20px "Noto Sans SC"').catch(() => {});
    const c = $('cardCanvas'), x = c.getContext('2d');
    const W = c.width, H = c.height;
    const BG = '#101116', LINE = '#2a2d36', TXT = '#e8e6e1', DIM = '#6e7079', ACC = '#ff8c42';
    const NETC = ['#ff8c42', '#56c8d8', '#7ee787'];
    const MONO = (s, w = 400) => `${w} ${s}px "JetBrains Mono","Noto Sans SC",monospace`;
    const PXF = s => `${s}px "Press Start 2P","Noto Sans SC",monospace`;

    x.fillStyle = BG; x.fillRect(0, 0, W, H);
    // thin double frame: outer dim, inner accent
    x.strokeStyle = LINE; x.lineWidth = 3;
    x.strokeRect(25.5, 25.5, W - 51, H - 51);
    x.strokeStyle = ACC; x.lineWidth = 1.5;
    x.strokeRect(42, 42, W - 84, H - 84);

    x.textAlign = 'center';
    // header wordmark + prompt line
    x.fillStyle = TXT; x.font = PXF(38);
    x.fillText('ATTENTION-OS', W / 2, 150);
    x.fillStyle = DIM; x.font = MONO(lang === 'zh' ? 30 : 26);
    x.fillText(t('cardKicker'), W / 2, 210);
    x.fillStyle = LINE; x.fillRect(120, 246, W - 240, 2);

    // sprite, big
    const grid = SPRITES[an.type];
    const S = spriteScale(grid, 14), sw = grid.length * S;
    drawSprite(x, grid, S, (W - sw) / 2, 296 + (224 - sw) / 2);

    // archetype name (orange, faint phosphor glow) + rank
    const [aName, aTag] = t('archetypes')[an.type];
    x.fillStyle = ACC;
    x.font = lang === 'zh' ? '700 84px "Noto Sans SC"' : PXF(46);
    x.shadowColor = 'rgba(255, 140, 66, 0.45)'; x.shadowBlur = 18;
    x.fillText(aName, W / 2, 622);
    x.shadowBlur = 0;
    x.fillStyle = DIM; x.font = MONO(lang === 'zh' ? 32 : 26);
    x.fillText(t('cardBeat')(an.overall), W / 2, 684);

    // tagline — wrap to width
    x.fillStyle = TXT;
    x.font = lang === 'zh' ? '400 40px "Noto Sans SC"' : MONO(26);
    const lh = lang === 'zh' ? 56 : 42;
    const maxW = W - 260;
    const words = lang === 'zh' ? [...aTag] : aTag.split(' ');
    const joiner = lang === 'zh' ? '' : ' ';
    let line = '', ty = 758;
    for (const w of words) {
      const test = line ? line + joiner + w : w;
      if (x.measureText(test).width > maxW && line && !'。，！？；、）”'.includes(w)) {
        x.fillText(line, W / 2, ty); ty += lh; line = w;
      } else line = test;
    }
    if (line) { x.fillText(line, W / 2, ty); ty += lh; }

    // bracket-bars, per-network colors
    const labels = STR[lang].stageEn;
    const bx = 140;
    let y = 930;
    for (let i = 0; i < 3; i++) {
      const s = an.scores[i];
      const filled = Math.round(s / 5);
      x.fillStyle = TXT; x.font = MONO(26, 700); x.textAlign = 'left';
      x.fillText(labels[i], bx, y);
      x.textAlign = 'right';
      x.fillStyle = NETC[i]; x.font = PXF(28);
      x.shadowColor = NETC[i] + '59'; x.shadowBlur = 12;   // faint glow on the number
      x.fillText(String(s), W - bx, y + 2);
      x.shadowBlur = 0;
      // bracket caps
      const barY = y + 22, barH = 40;
      x.fillStyle = DIM;
      x.fillRect(bx, barY, 3, barH); x.fillRect(bx, barY, 12, 3); x.fillRect(bx, barY + barH - 3, 12, 3);
      x.fillRect(W - bx - 3, barY, 3, barH); x.fillRect(W - bx - 12, barY, 12, 3); x.fillRect(W - bx - 12, barY + barH - 3, 12, 3);
      // 20 blocks
      const innerX = bx + 22, innerW = (W - bx - 22) - innerX;
      const gap = 6, cellW = Math.floor((innerW - 19 * gap) / 20);
      for (let k = 0; k < 20; k++) {
        x.fillStyle = k < filled ? NETC[i] : LINE;
        x.fillRect(innerX + k * (cellW + gap), barY + 6, cellW, barH - 12);
      }
      y += 112;
    }
    x.textAlign = 'center';

    // footer
    x.fillStyle = LINE; x.fillRect(120, H - 186, W - 240, 2);
    x.fillStyle = TXT; x.font = MONO(lang === 'zh' ? 32 : 28);
    x.fillText(t('cardFooter'), W / 2, H - 124);
    x.fillStyle = DIM; x.font = MONO(22);
    x.fillText(REPO, W / 2, H - 76);
    x.textAlign = 'left';
    return c;
  }

  $('downloadBtn').addEventListener('click', async () => {
    const c = await drawCard(analysis);
    const a = document.createElement('a');
    a.download = `attention-type-${analysis.overall}.png`;
    a.href = c.toDataURL('image/png');
    a.click();
  });
  $('copyBtn').addEventListener('click', async () => {
    const [aName] = t('archetypes')[analysis.type];
    try { await navigator.clipboard.writeText(t('share')(aName, analysis.scores, analysis.overall)); } catch {}
    $('copiedNote').classList.add('show');
    setTimeout(() => $('copiedNote').classList.remove('show'), 2200);
  });
  // Attention Profile v1 save code (docs/TIERS.md) — the desktop pet imports this
  function makeSaveCode(an) {
    const p = { v: 1, ts: new Date().toISOString(), type: an.type,
      scores: { alerting: an.scores[0], orienting: an.scores[1], executive: an.scores[2] },
      raw: { s1rt: an.s1rt, s2rt: an.s2rt, s3cost: an.s3cost, s3acc: an.s3acc }, lang };
    return 'attn1.' + btoa(JSON.stringify(p)).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  }
  $('saveCodeBtn').addEventListener('click', async () => {
    try { await navigator.clipboard.writeText(makeSaveCode(analysis)); } catch {}
    $('copiedNote').classList.add('show');
    setTimeout(() => $('copiedNote').classList.remove('show'), 2200);
  });

  /* ================= flow ================= */
  async function run() {
    show('game');
    await stage1();
    await stage2();
    await stage3();
    analysis = analyze();
    renderResults(analysis);
    show('results');
    revealResults();
  }
  $('startBtn').addEventListener('click', run);
  $('retryBtn').addEventListener('click', run);
  document.addEventListener('keydown', e => {
    if (e.code === 'Space' && screens.game.classList.contains('active')) e.preventDefault();
  });

  applyLang();

  /* debug hooks: ?debug&mock jumps to results; ?debug&pose=1|2|3 shows a frozen stage */
  if (qs.has('debug')) {
    window.__mock = (over = {}) => {
      analysis = Object.assign({
        scores: [78, 64, 88], overall: 78, type: 'fortress',
        weakest: 1, strongest: 2, s1rt: 287, s2rt: 1340, s3cost: 62, s3acc: 100,
      }, over);
      renderResults(analysis); show('results');
    };
    if (qs.has('mock')) window.__mock();
    const pose = +qs.get('pose');
    if (pose) {
      show('game');
      if (pose === 1) {
        hud(0, 2, 5);
        arena.innerHTML = `<div class="signal-ring go">${t('go')}</div>`;
        feedback(logLine(true, '243ms', gradeOf(t('s1grades'), 243)), false);
        fb.style.opacity = 1; fb.classList.remove('pop');
      } else if (pose === 2) {
        hud(1, 1, 5);
        arena.innerHTML = `<div class="search-grid">` +
          Array.from({ length: 12 }, (_, k) => {
            const rot = [0, 90, 180, 270][k % 4];
            return `<div class="search-cell"><span style="transform:rotate(${rot}deg)">${k === 7 ? 'L' : 'T'}</span></div>`;
          }).join('') + `</div>`;
      } else if (pose === 3) {
        hud(2, 3, 8);
        arena.innerHTML = `<div class="flanker-wrap"><div class="arrows">→→←→→</div></div>`;
        const lr = document.createElement('div');
        lr.className = 'lr-buttons';
        lr.innerHTML = `<button>←</button><button>→</button>`;
        const hint = document.createElement('div');
        hint.className = 'lr-hint'; hint.textContent = t('lrHint');
        $('game').append(hint, lr);
      }
    }
  }
})();
</script>
</body>
</html>
