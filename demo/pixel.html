<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ATTENTION-OS — 60秒注意力体检 · PIXEL</title>
<meta name="description" content="基于神经科学三大注意力网络的60秒测试。3关小游戏，实时判定，生成你的注意力角色卡。数据不出浏览器。">
<meta property="og:title" content="60秒，测出你的注意力属性">
<meta property="og:description" content="警觉 · 定向 · 执行 —— 3关小游戏，通关生成你的注意力角色卡。数据不出浏览器。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DotGothic16&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gb0: #0f380f; /* darkest */
    --gb1: #306230;
    --gb2: #8bac0f;
    --gb3: #9bbc0f; /* lightest */
    --fs-xs: 8px;
    --fs-s: 9px;
    --fs-m: 10px;
    --fs-l: 14px;
    --fs-xl: 18px;
  }
  html[lang="zh"] {
    --fs-xs: 10px;
    --fs-s: 12px;
    --fs-m: 13px;
    --fs-l: 18px;
    --fs-xl: 22px;
  }
  @media (min-width: 900px) {
    :root { --fs-xs: 9px; --fs-s: 10px; --fs-m: 11px; --fs-l: 16px; --fs-xl: 22px; }
    html[lang="zh"] { --fs-xs: 11px; --fs-s: 13px; --fs-m: 14px; --fs-l: 20px; --fs-xl: 26px; }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { background: var(--gb3); }
  body {
    font-family: "Press Start 2P", "DotGothic16", "Noto Sans SC", sans-serif;
    font-size: var(--fs-m);
    line-height: 1.8;
    color: var(--gb0);
    min-height: 100svh;
    background: var(--gb3);
    overscroll-behavior: none;
    -webkit-font-smoothing: none;
  }
  /* CRT scanlines — the one sanctioned gradient */
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 999;
    background: repeating-linear-gradient(
      0deg,
      rgba(15, 56, 15, 0.04) 0px,
      rgba(15, 56, 15, 0.04) 2px,
      transparent 2px,
      transparent 4px
    );
  }
  canvas { image-rendering: pixelated; }
  .screen { display: none; }
  .screen.active { display: block; }

  .sheet {
    max-width: 620px;
    margin: 0 auto;
    padding: 18px 16px 56px;
  }
  @media (min-width: 900px) { .sheet { padding-top: 36px; } }

  /* ---- pixel window: notched 4px border via box-shadow, hard offset shadow ---- */
  .win {
    position: relative;
    background: var(--gb3);
    margin: 6px 12px 14px 6px;
    box-shadow:
      0 -4px 0 0 var(--gb0),
      0 4px 0 0 var(--gb0),
      -4px 0 0 0 var(--gb0),
      4px 0 0 0 var(--gb0),
      8px 8px 0 0 var(--gb1);
  }
  .win.inv { background: var(--gb0); color: var(--gb3); }

  .masthead {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--gb0);
    color: var(--gb3);
    padding: 10px 12px;
    box-shadow: 4px 4px 0 0 var(--gb1);
    margin-bottom: 22px;
  }
  .masthead .brand { font-size: var(--fs-m); letter-spacing: 1px; text-transform: uppercase; }
  .lang-toggle {
    font-family: inherit;
    font-size: var(--fs-xs);
    background: var(--gb3);
    color: var(--gb0);
    border: none;
    padding: 6px 10px;
    cursor: pointer;
    text-transform: uppercase;
  }
  .lang-toggle:active { background: var(--gb2); }

  /* ---------- intro ---------- */
  .hero { padding: 16px 14px 18px; }
  .hero-kicker {
    display: inline-block;
    background: var(--gb0);
    color: var(--gb3);
    font-size: var(--fs-xs);
    padding: 3px 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  h1 {
    font-size: var(--fs-xl);
    line-height: 1.6;
    margin-top: 14px;
    text-transform: uppercase;
    font-weight: 400;
  }
  h1 .accent { background: var(--gb0); color: var(--gb3); padding: 0 5px; }
  .lede { margin-top: 12px; font-size: var(--fs-s); line-height: 2; color: var(--gb1); }
  .lede strong { color: var(--gb0); font-weight: 400; }

  .stages-preview { padding: 6px 14px; }
  .stage-line {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 2px solid var(--gb2);
    font-size: var(--fs-s);
  }
  .stage-line:last-child { border-bottom: none; }
  .stage-line .no {
    background: var(--gb0);
    color: var(--gb3);
    font-size: var(--fs-xs);
    padding: 2px 6px;
    flex: none;
  }
  .stage-line .nm { min-width: 8em; text-transform: uppercase; }
  .stage-line .nm small { color: var(--gb1); font-size: var(--fs-xs); margin-left: 4px; }
  .stage-line .ds { color: var(--gb1); font-size: var(--fs-xs); flex: 1; }

  .start-row {
    margin-top: 24px;
    display: flex;
    align-items: center;
    gap: 18px;
    flex-wrap: wrap;
  }
  .btn {
    font-family: inherit;
    font-size: var(--fs-m);
    text-transform: uppercase;
    letter-spacing: 1px;
    background: var(--gb0);
    color: var(--gb3);
    border: none;
    padding: 15px 22px;
    cursor: pointer;
    box-shadow: 4px 4px 0 0 var(--gb1);
    touch-action: manipulation;
  }
  .btn:active { transform: translate(4px, 4px); box-shadow: none; }
  .btn.ghost {
    background: var(--gb3);
    color: var(--gb0);
    box-shadow: inset 0 0 0 4px var(--gb0), 4px 4px 0 0 var(--gb1);
  }
  .btn.ghost:active { box-shadow: inset 0 0 0 4px var(--gb0); }
  .btn.start::before {
    content: "▶ ";
    animation: blink 1s steps(1, end) infinite;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  .fine { font-size: var(--fs-xs); color: var(--gb1); line-height: 2; max-width: 30ch; }

  .footer-rule {
    margin-top: 44px;
    padding-top: 12px;
    border-top: 4px solid var(--gb0);
    display: flex;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    font-size: var(--fs-xs);
    text-transform: uppercase;
    color: var(--gb1);
  }

  /* ---------- game ---------- */
  #game {
    position: fixed;
    inset: 0;
    background: var(--gb3);
    z-index: 10;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .game-hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 44px;
    background: var(--gb0);
    color: var(--gb3);
    padding: 0 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: var(--fs-xs);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .dots { display: flex; gap: 6px; }
  .dot { width: 10px; height: 10px; border: 2px solid var(--gb2); }
  .dot.done { background: var(--gb3); border-color: var(--gb3); }
  .streak {
    color: var(--gb3);
    opacity: 0;
    transition: opacity 0.2s steps(2, end);
  }
  .streak.show { opacity: 1; }

  #arena {
    position: absolute;
    inset: 44px 0 96px;
    display: grid;
    place-items: center;
  }
  .feedback {
    position: absolute;
    left: 0; right: 0;
    bottom: 30px;
    width: fit-content;
    margin: 0 auto;
    background: var(--gb0);
    color: var(--gb3);
    padding: 10px 16px;
    font-size: var(--fs-s);
    text-transform: uppercase;
    box-shadow: 4px 4px 0 0 var(--gb1);
    opacity: 0;
    pointer-events: none;
  }
  .feedback.pop { animation: fbpop 0.8s steps(6, end); }
  @keyframes fbpop {
    0% { opacity: 0; transform: translateY(8px); }
    15% { opacity: 1; transform: translateY(0); }
    80% { opacity: 1; }
    100% { opacity: 0; }
  }
  .feedback .ms { color: var(--gb2); }

  /* stage intro = dialogue window */
  .stage-card {
    max-width: 340px;
    padding: 18px 18px 20px;
    text-align: left;
  }
  .stage-card .k {
    display: inline-block;
    background: var(--gb0);
    color: var(--gb3);
    font-size: var(--fs-xs);
    padding: 3px 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .stage-card h2 {
    font-size: var(--fs-l);
    font-weight: 400;
    line-height: 1.7;
    margin: 14px 0 8px;
    text-transform: uppercase;
  }
  .stage-card p { color: var(--gb1); font-size: var(--fs-s); line-height: 2; }
  .stage-card .btn { margin-top: 18px; }

  /* stage 1: signal target */
  .signal-ring {
    width: min(56vw, 230px);
    aspect-ratio: 1;
    background: var(--gb3);
    box-shadow:
      0 -4px 0 0 var(--gb0),
      0 4px 0 0 var(--gb0),
      -4px 0 0 0 var(--gb0),
      4px 0 0 0 var(--gb0),
      8px 8px 0 0 var(--gb1);
    display: grid;
    place-items: center;
    font-size: var(--fs-m);
    color: var(--gb1);
    text-transform: uppercase;
  }
  .signal-ring.go {
    background: var(--gb0);
    color: var(--gb3);
    font-size: calc(var(--fs-xl) + 4px);
    animation: sigpop 0.15s steps(2, end);
  }
  @keyframes sigpop { from { transform: scale(0.6); } to { transform: scale(1); } }
  .shake { animation: shake 0.35s steps(4, end); }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); } 50% { transform: translateX(8px); } 75% { transform: translateX(-4px); }
  }

  /* stage 2: search grid */
  .search-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: clamp(10px, 3vw, 16px);
    padding: 16px;
  }
  .search-cell {
    width: clamp(54px, 16vw, 80px);
    aspect-ratio: 1;
    background: var(--gb3);
    box-shadow: inset 0 0 0 4px var(--gb0);
    display: grid;
    place-items: center;
    font-size: clamp(18px, 6vw, 26px);
    cursor: pointer;
  }
  .search-cell:active { background: var(--gb2); }
  .search-cell.wrong {
    background: var(--gb0);
    color: var(--gb3);
    animation: shake 0.3s steps(4, end);
  }

  /* stage 3: flanker */
  .flanker-wrap { text-align: center; }
  .fixation { font-size: 26px; color: var(--gb1); }
  .arrows {
    font-family: "DotGothic16", "Noto Sans SC", sans-serif;
    font-size: clamp(30px, 11vw, 48px);
    letter-spacing: 10px;
  }
  .arrows .c { background: var(--gb0); color: var(--gb3); padding: 0 6px; }
  .lr-buttons {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 96px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    border-top: 4px solid var(--gb0);
  }
  .lr-buttons button {
    font-family: "DotGothic16", "Noto Sans SC", sans-serif;
    font-size: 34px;
    background: var(--gb3);
    border: none;
    border-right: 4px solid var(--gb0);
    cursor: pointer;
    color: var(--gb0);
    touch-action: manipulation;
  }
  .lr-buttons button:last-child { border-right: none; }
  .lr-buttons button:active { background: var(--gb0); color: var(--gb3); }
  .lr-hint {
    position: absolute;
    bottom: 104px; left: 12px; right: 12px;
    text-align: center;
    font-size: var(--fs-xs);
    letter-spacing: 1px;
    color: var(--gb1);
    text-transform: uppercase;
  }

  /* stage clear window */
  .stamp-overlay {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    background: var(--gb2);
  }
  .stamp {
    background: var(--gb3);
    padding: 22px 30px 24px;
    text-align: center;
    animation: stampin 0.3s steps(3, end);
  }
  @keyframes stampin {
    from { transform: scale(1.4); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .stamp .s-title { font-size: var(--fs-xs); letter-spacing: 1px; text-transform: uppercase; color: var(--gb1); }
  .stamp .s-clear { font-size: var(--fs-l); margin-top: 10px; text-transform: uppercase; }
  .stamp .s-score { font-size: 32px; line-height: 1.6; margin-top: 8px; }
  .stamp .s-line { font-size: var(--fs-s); color: var(--gb1); margin-top: 4px; }

  /* ---------- results ---------- */
  .status-win {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 14px;
  }
  #spriteCanvas { width: clamp(96px, 28vw, 144px); height: auto; flex: none; }
  .verdict-label {
    display: inline-block;
    background: var(--gb0);
    color: var(--gb3);
    font-size: var(--fs-xs);
    padding: 2px 6px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .verdict { font-size: var(--fs-xl); line-height: 1.5; margin-top: 8px; text-transform: uppercase; }
  .verdict-tag { margin-top: 8px; font-size: var(--fs-s); line-height: 1.9; color: var(--gb1); }

  .bars-win {
    position: relative;
    background: var(--gb3);
    margin: 6px 12px 14px 6px;
    padding: 14px 14px 12px;
    box-shadow:
      0 -4px 0 0 var(--gb0),
      0 4px 0 0 var(--gb0),
      -4px 0 0 0 var(--gb0),
      4px 0 0 0 var(--gb0),
      8px 8px 0 0 var(--gb1);
  }
  .hp-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; }
  .hp-label { font-size: var(--fs-xs); width: 7ch; flex: none; text-transform: uppercase; }
  .hp-blocks { display: flex; gap: 3px; flex: 1; }
  .hp-blocks i { flex: 1; height: 16px; background: var(--gb2); }
  .hp-blocks i.on { background: var(--gb0); }
  .hp-num { font-size: var(--fs-m); min-width: 3ch; text-align: right; }

  .networks { margin: 4px 6px 10px; }
  .net-row { padding: 12px 2px; border-bottom: 4px solid var(--gb2); }
  .net-row:last-child { border-bottom: none; }
  .net-top { display: flex; justify-content: space-between; align-items: baseline; }
  .net-top .nm { font-size: var(--fs-m); text-transform: uppercase; }
  .net-top .nm small { color: var(--gb1); font-size: var(--fs-xs); margin-left: 6px; }
  .net-top .sc { font-size: var(--fs-l); }
  .net-sub { font-size: var(--fs-xs); color: var(--gb1); margin-top: 6px; }
  .net-rank {
    display: inline-block;
    background: var(--gb0);
    color: var(--gb3);
    font-size: var(--fs-xs);
    padding: 2px 6px;
    margin-top: 8px;
    text-transform: uppercase;
  }

  .rx { padding: 20px 14px 12px; margin-top: 18px; }
  .rx-label {
    position: absolute;
    top: -12px; left: 12px;
    background: var(--gb0);
    color: var(--gb3);
    padding: 3px 8px;
    font-size: var(--fs-xs);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .rx ul { list-style: none; }
  .rx li {
    padding: 10px 0;
    border-bottom: 2px solid var(--gb2);
    font-size: var(--fs-s);
    line-height: 2;
    display: flex;
    gap: 8px;
  }
  .rx li:last-child { border-bottom: none; }
  .rx li::before { content: "►"; flex: none; }
  .rx li strong { font-weight: 400; background: var(--gb2); padding: 0 3px; }

  details.science {
    margin-top: 18px;
    font-size: var(--fs-xs);
    color: var(--gb1);
    line-height: 2;
  }
  details.science summary { cursor: pointer; color: var(--gb0); text-transform: uppercase; }
  details.science a { color: var(--gb1); }

  .actions {
    margin-top: 24px;
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    align-items: center;
  }
  .copied-note { font-size: var(--fs-xs); text-transform: uppercase; opacity: 0; transition: opacity 0.2s steps(2, end); }
  .copied-note.show { opacity: 1; }
  .star-ask { margin-top: 20px; font-size: var(--fs-s); color: var(--gb1); line-height: 2; }
  .star-ask a { color: var(--gb0); }

  .style-nav {
    text-align: center;
    padding: 18px 0 26px;
    font-size: var(--fs-xs);
    color: var(--gb1);
    text-transform: uppercase;
  }
  .style-nav a { color: var(--gb1); }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }
</style>
</head>
<body>

<!-- ============ INTRO ============ -->
<section id="intro" class="screen active">
  <div class="sheet">
    <header class="masthead">
      <div class="brand">Attention-OS</div>
      <button class="lang-toggle" id="langBtn">EN</button>
    </header>
    <div class="hero win">
      <div class="hero-kicker" data-i18n="kicker"></div>
      <h1 id="heroTitle"></h1>
      <p class="lede" id="heroLede"></p>
    </div>
    <div class="stages-preview win" id="stagesPreview"></div>
    <div class="start-row">
      <button class="btn start" id="startBtn"></button>
      <p class="fine" data-i18n="privacy"></p>
    </div>
    <div class="footer-rule">
      <span>ATTENTION-OS · OPEN SOURCE</span>
      <span data-i18n="footProto"></span>
    </div>
  </div>
</section>

<!-- ============ GAME ============ -->
<section id="game" class="screen">
  <div class="game-hud">
    <span id="hudStage"></span>
    <span class="streak" id="streak"></span>
    <span class="dots" id="dots"></span>
  </div>
  <div id="arena"></div>
  <div class="feedback" id="feedback"></div>
</section>

<!-- ============ RESULTS ============ -->
<section id="results" class="screen">
  <div class="sheet">
    <header class="masthead">
      <div class="brand">Attention-OS</div>
      <span style="font-size:var(--fs-xs);text-transform:uppercase" data-i18n="findings"></span>
    </header>

    <div class="status-win win">
      <canvas id="spriteCanvas" width="144" height="144"></canvas>
      <div class="status-txt">
        <div class="verdict-label" data-i18n="yourType"></div>
        <div class="verdict" id="archetype"></div>
        <p class="verdict-tag" id="archetypeTag"></p>
      </div>
    </div>

    <div class="radar-box" id="radarBox"></div>
    <div class="networks" id="networks"></div>

    <div class="rx win">
      <div class="rx-label" data-i18n="rxTitle"></div>
      <ul id="rxList"></ul>
    </div>

    <details class="science">
      <summary data-i18n="sciSummary"></summary>
      <p id="sciBody" style="margin-top:8px"></p>
    </details>

    <div class="actions">
      <button class="btn" id="downloadBtn"></button>
      <button class="btn ghost" id="copyBtn"></button>
      <button class="btn ghost" id="retryBtn"></button>
      <span class="copied-note" id="copiedNote"></span>
    </div>

    <p class="star-ask" id="starAsk"></p>

    <div class="footer-rule">
      <span>ATTENTION-OS · 60S CHECK-UP</span>
      <span>github.com/attentionos</span>
    </div>
  </div>
</section>

<canvas id="cardCanvas" width="1080" height="1440" style="display:none"></canvas>

<div class="style-nav">
  <a href="index.html">editorial</a> · <a href="modern.html">modern</a> · <a href="pixel.html">pixel</a>
</div>

<script>
(() => {
  const qs = new URLSearchParams(location.search);
  const REPO = 'github.com/attentionos';

  /* ================= i18n ================= */
  const STR = {
    zh: {
      kicker: '注意力体检 · 60秒 · 3关',
      title: '60秒 测出你的<span class="accent">注意力属性</span>',
      lede: '神经科学把注意力拆成三条属性槽：<strong>警觉 / 定向 / 执行</strong>。三个小关卡，每一下都实时判定，通关后生成你的注意力角色卡。<strong>数据不出浏览器。</strong>',
      stages: [
        ['警觉网络', '信号一亮 立刻出手'],
        ['定向网络', '干扰堆里找到目标'],
        ['执行网络', '顶住干扰 不被带偏'],
      ],
      start: 'START 开始体检',
      privacy: '纯浏览器运行。无账号 无埋点 无网络请求。',
      footProto: 'ANT范式 · 约60秒',
      findings: '体检报告',
      yourType: '你的注意力属性',
      rxTitle: '任务清单',
      sciSummary: '科学依据：这个测试在测什么？',
      sci: '三关分别对应 Posner & Petersen (1990) 提出的三大注意力网络：警觉（简单反应时）、定向（视觉搜索）、执行控制（Eriksen 侧翼干扰任务的冲突代价）。范式改编自注意力网络测试 ANT (Fan et al., 2002)。评分把你的成绩映射到文献常模的近似百分位——这是趣味版体检，不是临床诊断。',
      stageNames: ['警觉', '定向', '执行'],

  const GBHEX = ['', '#0f380f', '#306230', '#8bac0f'];
  function drawSprite(ctx, grid, scale, ox = 0, oy = 0) {
    grid.forEach((row, y) => {
      for (let x = 0; x < 16; x++) {
        const v = row[x];
        if (v === '0') continue;
        ctx.fillStyle = GBHEX[+v];
        ctx.fillRect(ox + x * scale, oy + y * scale, scale, scale);
      }
    });
  }
  function paintSprite(cv, grid, scale) {
    cv.width = cv.height = 16 * scale;
    const g = cv.getContext('2d');
    g.clearRect(0, 0, cv.width, cv.height);
    drawSprite(g, grid, scale);
  }

  /* ================= game engine ================= */
  const arena = $('arena');
  const fb = $('feedback');
  let streakN = 0;
  const data = { s1: [], s1false: 0, s2: [], s2wrong: 0, s3: [] };
  let analysis = null;

  function hud(stageIdx, done, total) {
    $('hudStage').textContent = `${stageIdx + 1}/3 · ${t('stageNames')[stageIdx]}`;
    $('dots').innerHTML = Array.from({ length: total },
      (_, i) => `<span class="dot${i < done ? ' done' : ''}"></span>`).join('');
  }
  function feedback(html, good) {
    fb.innerHTML = html;
    fb.classList.remove('pop');
    void fb.offsetWidth;
    fb.classList.add('pop');
    if (good) buzz(12);
  }
  function bumpStreak(good) {
    streakN = good ? streakN + 1 : 0;
    const el = $('streak');
    if (streakN >= 2) {
      el.textContent = `${t('streakWord')} ×${streakN}`;
      el.classList.remove('show'); void el.offsetWidth; el.classList.add('show');
    } else el.classList.remove('show');
  }
  function gradeOf(table, rt) {
    for (const [max, label] of table) if (rt < max) return label;
  }
  function stageCard(idx) {
    return new Promise(res => {
      const [k, h, p] = t('stageIntro')[idx];
      arena.innerHTML = `<div class="stage-card win">
        <div class="k">${k}</div><h2>${h}</h2><p>${p}</p>
        <button class="btn" id="stageGo">▶ PRESS A</button></div>`;
      const onA = e => { if (e.code === 'KeyA') { e.preventDefault(); $('stageGo').click(); } };
      document.addEventListener('keydown', onA);
      $('stageGo').addEventListener('click', () => {
        document.removeEventListener('keydown', onA);
        res();
      }, { once: true });
    });
  }
  async function stamp(idx, score) {
    const lines = t('stampLines')[idx];
    const line = score >= 75 ? lines[0] : score >= 55 ? lines[1] : lines[2];
    const el = document.createElement('div');
    el.className = 'stamp-overlay';
    el.innerHTML = `<div class="stamp win">
      <div class="s-title">STAGE ${idx + 1} · ${t('stageNames')[idx]}</div>
      <div class="s-clear">${t('clear')}</div>
      <div class="s-score">${score}</div>
      <div class="s-line">${line}</div></div>`;
    $('game').appendChild(el);
    buzz([20, 40, 20]);
    await sleep(1500);
    el.remove();

  /* ---------- stage 1: alerting ---------- */
  async function stage1() {
    const TRIALS = 5;
    data.s1 = []; data.s1false = 0; streakN = 0;
    hud(0, 0, TRIALS);
    await stageCard(0);
    for (let i = 0; i < TRIALS; i++) {
      hud(0, i, TRIALS);
      arena.innerHTML = `<div class="signal-ring" id="ring">${t('waiting')}</div>`;
      const ring = $('ring');
      let fired = false, t0 = 0;
      const rt = await new Promise(res => {
        let timer = setTimeout(fire, 900 + Math.random() * 1600);
        function fire() {
          fired = true;
          ring.classList.add('go');
          ring.textContent = t('go');
          t0 = performance.now();
        }
        function onTap(e) {
          if (e.type === 'keydown' && e.code !== 'Space') return;
          e.preventDefault();
          if (!fired) {                       // false start
            data.s1false++;
            clearTimeout(timer);
            ring.classList.add('shake');
            feedback(t('falseStart'), false);
            bumpStreak(false);
            setTimeout(() => {
              ring.classList.remove('shake');
              timer = setTimeout(fire, 1200 + Math.random() * 1600);
            }, 500);
            return;
          }
          cleanup();
          res(performance.now() - t0);
        }
        function cleanup() {
          arena.removeEventListener('pointerdown', onTap);
          document.removeEventListener('keydown', onTap);
        }
        arena.addEventListener('pointerdown', onTap);
        document.addEventListener('keydown', onTap);
      });
      data.s1.push(rt);
      const good = rt < 450;
      bumpStreak(good);
      feedback(`<span class="ms">${Math.round(rt)}ms</span> ${gradeOf(t('s1grades'), rt)}`, good);
      hud(0, i + 1, TRIALS);
      await sleep(750);
    }
    const s = scoreAlerting();
    await stamp(0, s);
  }

  /* ---------- stage 2: orienting ---------- */
  async function stage2() {
    const TRIALS = 5, CELLS = 12;
    data.s2 = []; data.s2wrong = 0; streakN = 0;
    hud(1, 0, TRIALS);
    await stageCard(1);
    for (let i = 0; i < TRIALS; i++) {
      hud(1, i, TRIALS);
      const target = Math.floor(Math.random() * CELLS);
      arena.innerHTML = `<div class="search-grid">` +
        Array.from({ length: CELLS }, (_, k) => {
          const rot = [0, 90, 180, 270][Math.floor(Math.random() * 4)];
          const ch = k === target ? 'L' : 'T';
          return `<div class="search-cell" data-k="${k}">
            <span style="transform:rotate(${rot}deg)">${ch}</span></div>`;
        }).join('') + `</div>`;
      const t0 = performance.now();
      let wrongThis = 0;
      const rt = await new Promise(res => {
        arena.querySelectorAll('.search-cell').forEach(cell => {
          cell.addEventListener('pointerdown', () => {
            if (+cell.dataset.k === target) res(performance.now() - t0);
            else {
              wrongThis++; data.s2wrong++;
              cell.classList.add('wrong');
              buzz(30);
            }
          });
        });
      });
      data.s2.push(rt + wrongThis * 300);   // wrong taps cost
      const good = rt < 2400 && wrongThis === 0;
      bumpStreak(good);
      feedback(`<span class="ms">${(rt / 1000).toFixed(2)}s</span> ${gradeOf(t('s2grades'), rt)}`, good);
      hud(1, i + 1, TRIALS);
      await sleep(750);
    }
    const s = scoreOrienting();
    await stamp(1, s);
  }

  /* ---------- stage 3: executive (flanker) ---------- */
  async function stage3() {
    const TRIALS = 8;
    data.s3 = []; streakN = 0;
    hud(2, 0, TRIALS);
    await stageCard(2);
    const conds = [1, 1, 1, 1, 0, 0, 0, 0].sort(() => Math.random() - 0.5); // 1=incongruent
    const lr = document.createElement('div');
    lr.className = 'lr-buttons';
    lr.innerHTML = `<button data-d="L">←</button><button data-d="R">→</button>`;
    const hint = document.createElement('div');
    hint.className = 'lr-hint';
    hint.textContent = t('lrHint');
    $('game').append(hint, lr);
    for (let i = 0; i < TRIALS; i++) {
      hud(2, i, TRIALS);
      const incong = conds[i];
      const dir = Math.random() < 0.5 ? 'L' : 'R';
      const c = dir === 'L' ? '←' : '→';
      const f = incong ? (dir === 'L' ? '→' : '←') : c;
      arena.innerHTML = `<div class="flanker-wrap"><div class="fixation">+</div></div>`;
      await sleep(400 + Math.random() * 300);
      arena.innerHTML = `<div class="flanker-wrap"><div class="arrows">${f}${f}<span class="c">${c}</span>${f}${f}</div></div>`;
      const t0 = performance.now();
      const ans = await new Promise(res => {
        const to = setTimeout(() => { cleanup(); res(null); }, 2000);
        function onKey(e) {
          if (e.key === 'ArrowLeft') done('L');
          else if (e.key === 'ArrowRight') done('R');
        }
        function onBtn(e) {
          const b = e.target.closest('button[data-d]');
          if (b) done(b.dataset.d);
        }
        function done(d) { clearTimeout(to); cleanup(); res(d); }
        function cleanup() {
          document.removeEventListener('keydown', onKey);
          lr.removeEventListener('pointerdown', onBtn);
        }
        document.addEventListener('keydown', onKey);
        lr.addEventListener('pointerdown', onBtn);
      });
      const rt = performance.now() - t0;
      const correct = ans === dir;
      data.s3.push({ incong, rt: ans ? rt : 2000, correct });
      bumpStreak(correct);
      if (!ans) feedback(t('s3miss'), false);
      else if (!correct) feedback(t('s3bad'), false);
      else feedback(`<span class="ms">${Math.round(rt)}ms</span> ${incong ? t('s3okHard') : t('s3ok')}`, true);
      hud(2, i + 1, TRIALS);
      await sleep(700);
    }
    hint.remove(); lr.remove();
    const s = scoreExecutive();
    await stamp(2, s);
  }

  /* ================= scoring (docs/SCIENCE.md) ================= */
  const median = a => {
    const s = [...a].sort((x, y) => x - y);
    return s.length ? (s[s.length >> 1] + s[(s.length - 1) >> 1]) / 2 : 0;
  };
  const logistic = (x, mid, k) => Math.round(100 / (1 + Math.exp((x - mid) / k)));
  const clamp100 = v => Math.max(1, Math.min(99, v));

  function scoreAlerting() {
    const rt = median(data.s1);
    return clamp100(logistic(rt, 350, 55) - data.s1false * 6);
  }
  function scoreOrienting() {
    const rt = median(data.s2);
    return clamp100(logistic(rt, 1500, 380));
  }
  function scoreExecutive() {
    const cong = data.s3.filter(x => !x.incong && x.correct).map(x => x.rt);
    const inc = data.s3.filter(x => x.incong && x.correct).map(x => x.rt);
    const cost = (inc.length && cong.length) ? Math.max(0, median(inc) - median(cong)) : 250;
    const errors = data.s3.filter(x => !x.correct).length;
    return clamp100(Math.round(logistic(cost, 115, 42) * Math.max(0.3, 1 - errors * 0.13)));
  }

  function analyze() {
    const a = scoreAlerting(), o = scoreOrienting(), e = scoreExecutive();
    const scores = [a, o, e];
    const overall = Math.round(a * 0.3 + o * 0.3 + e * 0.4);
    const mx = Math.max(...scores), mn = Math.min(...scores);
    let type;
    if (mn >= 75) type = 'commander';
    else if ((mx + mn) / 2 < 50 && mx < 60) type = 'wanderer';
    else if (mx - mn <= 12) type = 'balanced';
    else type = ['cheetah', 'hawkeye', 'fortress'][scores.indexOf(mx)];
    const cong = data.s3.filter(x => !x.incong && x.correct).map(x => x.rt);
    const inc = data.s3.filter(x => x.incong && x.correct).map(x => x.rt);
    return {
      scores, overall, type,
      weakest: scores.indexOf(mn),
      strongest: scores.indexOf(mx),
      s1rt: Math.round(median(data.s1)) || 0,
      s2rt: Math.round(median(data.s2)) || 0,
      s3cost: (inc.length && cong.length) ? Math.round(Math.max(0, median(inc) - median(cong))) : 0,
      s3acc: Math.round(100 * data.s3.filter(x => x.correct).length / Math.max(1, data.s3.length)),
    };
  }

  /* ================= results ================= */
  /* RPG status window: segmented HP bars replace the old radar chart
     (name kept so call sites stay identical) */
  function radarSVG(scores, size = 220) {
    const labels = STR[lang].stageEn;
    return `<div class="bars-win">` + scores.map((s, i) => {
      const filled = Math.round(s / 5);
      return `<div class="hp-row">
        <span class="hp-label">${labels[i]}</span>
        <span class="hp-blocks">${Array.from({ length: 20 },
          (_, k) => `<i${k < filled ? ' class="on"' : ''}></i>`).join('')}</span>
        <span class="hp-num">${s}</span>
      </div>`;
    }).join('') + `</div>`;
  }

  function renderResults(an) {
    const [aName, aTag] = t('archetypes')[an.type];
    $('archetype').textContent = aName;
    $('archetypeTag').textContent = aTag;
    paintSprite($('spriteCanvas'), SPRITES[an.type], 9);
    const subs = t('netSub');
    const subVals = [subs[0](an.s1rt), subs[1](an.s2rt), subs[2](an.s3cost, an.s3acc)];
    $('networks').innerHTML = an.scores.map((s, i) => `
      <div class="net-row">
        <div class="net-top">
          <span class="nm">${t('stageNames')[i]}${lang === 'zh' ? `<small>${STR[lang].stageEn[i]}</small>` : ''}</span>
          <span class="sc">${s}</span>
        </div>
        <div class="net-sub">${subVals[i]}</div>
        <div class="net-rank">${t('beat')(s)}</div>
      </div>`).join('');
    $('radarBox').innerHTML = radarSVG(an.scores);

    const rx = t('rx');
    const weakKey = ['alerting', 'orienting', 'executive'][an.weakest];
    $('rxList').innerHTML = [
      rx[weakKey],
      rx.strength(t('stageNames')[an.strongest]),
      rx.universal,
    ].map(x => `<li><span>${x}</span></li>`).join('');
    applyLangStatics();
  }
  function applyLangStatics() {
    document.querySelectorAll('[data-i18n]').forEach(el => { el.innerHTML = t(el.dataset.i18n); });
    $('downloadBtn').textContent = t('dl');
    $('copyBtn').textContent = t('copy');
    $('retryBtn').textContent = t('retry');
    $('copiedNote').textContent = t('copied');
    $('sciBody').textContent = t('sci');
    $('starAsk').innerHTML = t('starAsk') + `<a href="https://${REPO}" target="_blank" rel="noopener">${REPO}</a>`;
  }

  /* ================= share card ================= */
  async function drawCard(an) {
    await document.fonts.load('20px "Press Start 2P"').catch(() => {});
    await document.fonts.load('20px "DotGothic16"').catch(() => {});
    if (lang === 'zh') await document.fonts.load('700 20px "Noto Sans SC"').catch(() => {});
    const c = $('cardCanvas'), x = c.getContext('2d');
    const W = c.width, H = c.height;
    const GB0 = '#0f380f', GB1 = '#306230', GB2 = '#8bac0f', GB3 = '#9bbc0f';
    const LATIN = s => `${s}px "Press Start 2P"`;
    const PX = s => lang === 'zh' ? `${s}px "DotGothic16","Noto Sans SC","Press Start 2P"` : LATIN(s);

    x.fillStyle = GB3; x.fillRect(0, 0, W, H);
    // nested pixel frame
    x.fillStyle = GB0; x.fillRect(20, 20, W - 40, H - 40);
    x.fillStyle = GB3; x.fillRect(44, 44, W - 88, H - 88);
    x.fillStyle = GB1; x.fillRect(56, 56, W - 112, H - 112);
    x.fillStyle = GB3; x.fillRect(64, 64, W - 128, H - 128);

    x.textAlign = 'center';
    // header
    x.fillStyle = GB0; x.font = LATIN(40);
    x.fillText('ATTENTION-OS', W / 2, 160);
    x.fillStyle = GB1; x.font = PX(lang === 'zh' ? 34 : 24);
    x.fillText(t('cardKicker'), W / 2, 216);
    x.fillStyle = GB0; x.fillRect(120, 252, W - 240, 8);

    // sprite, big
    const S = 14, sw = 16 * S;
    drawSprite(x, SPRITES[an.type], S, (W - sw) / 2, 296);

    // archetype name + rank
    const [aName, aTag] = t('archetypes')[an.type];
    x.fillStyle = GB0;
    x.font = lang === 'zh' ? '88px "DotGothic16","Noto Sans SC"' : LATIN(52);
    x.fillText(aName, W / 2, 620);
    x.fillStyle = GB1; x.font = PX(lang === 'zh' ? 32 : 24);
    x.fillText(t('cardBeat')(an.overall), W / 2, 678);

    // tagline — wrap to width
    x.fillStyle = GB0;
    x.font = lang === 'zh' ? '42px "DotGothic16","Noto Sans SC"' : LATIN(22);
    const lh = lang === 'zh' ? 58 : 44;
    const maxW = W - 260;
    const words = lang === 'zh' ? [...aTag] : aTag.split(' ');
    const joiner = lang === 'zh' ? '' : ' ';
    let line = '', ty = 756;
    for (const w of words) {
      const test = line ? line + joiner + w : w;
      if (x.measureText(test).width > maxW && line && !'。，！？；、）”'.includes(w)) {
        x.fillText(line, W / 2, ty); ty += lh; line = w;
      } else line = test;
    }
    if (line) { x.fillText(line, W / 2, ty); ty += lh; }

    // segmented bars
    const labels = STR[lang].stageEn;
    const bx = 130, bw = W - 260;
    const cellW = 33, cellGap = Math.floor((bw - 20 * cellW) / 19); // 20 blocks
    let y = 950;
    for (let i = 0; i < 3; i++) {
      const s = an.scores[i];
      const filled = Math.round(s / 5);
      x.fillStyle = GB0; x.font = LATIN(26); x.textAlign = 'left';
      x.fillText(labels[i], bx, y);
      x.textAlign = 'right';
      x.fillText(String(s), W - bx, y);
      for (let k = 0; k < 20; k++) {
        x.fillStyle = k < filled ? GB0 : GB2;
        x.fillRect(bx + k * (cellW + cellGap), y + 22, cellW, 38);
      }
      y += 120;
    }
    x.textAlign = 'center';

    // footer
    x.fillStyle = GB0; x.fillRect(120, H - 200, W - 240, 8);
    x.font = PX(lang === 'zh' ? 36 : 26); x.fillStyle = GB0;
    x.fillText(t('cardFooter'), W / 2, H - 130);
    x.font = LATIN(20); x.fillStyle = GB1;
    x.fillText(REPO, W / 2, H - 82);
    x.textAlign = 'left';
    return c;
  }

  $('downloadBtn').addEventListener('click', async () => {
    const c = await drawCard(analysis);
    const a = document.createElement('a');
    a.download = `attention-type-${analysis.overall}.png`;
    a.href = c.toDataURL('image/png');
    a.click();
  });
  $('copyBtn').addEventListener('click', async () => {
    const [aName] = t('archetypes')[analysis.type];
    try { await navigator.clipboard.writeText(t('share')(aName, analysis.scores, analysis.overall)); } catch {}
    $('copiedNote').classList.add('show');
    setTimeout(() => $('copiedNote').classList.remove('show'), 2200);
  });

  /* ================= flow ================= */
  async function run() {
    show('game');
    await stage1();
    await stage2();
    await stage3();
    analysis = analyze();
    renderResults(analysis);
    show('results');
  }
  $('startBtn').addEventListener('click', run);
  $('retryBtn').addEventListener('click', run);
  document.addEventListener('keydown', e => {
    if (e.code === 'Space' && screens.game.classList.contains('active')) e.preventDefault();
  });

  applyLang();

  /* debug hooks: ?debug&mock jumps to results; ?debug&pose=1|2|3 shows a frozen stage */
  if (qs.has('debug')) {
    window.__mock = (over = {}) => {
      analysis = Object.assign({
        scores: [78, 64, 88], overall: 78, type: 'fortress',
        weakest: 1, strongest: 2, s1rt: 287, s2rt: 1340, s3cost: 62, s3acc: 100,
      }, over);
      renderResults(analysis); show('results');
    };
    if (qs.has('mock')) window.__mock();
    const pose = +qs.get('pose');
    if (pose) {
      show('game');
      if (pose === 1) {
        hud(0, 2, 5);
        arena.innerHTML = `<div class="signal-ring go">${t('go')}</div>`;
        feedback(`<span class="ms">243ms</span> ${gradeOf(t('s1grades'), 243)}`, false);
        fb.style.opacity = 1; fb.classList.remove('pop');
      } else if (pose === 2) {
        hud(1, 1, 5);
        arena.innerHTML = `<div class="search-grid">` +
          Array.from({ length: 12 }, (_, k) => {
            const rot = [0, 90, 180, 270][k % 4];
            return `<div class="search-cell"><span style="transform:rotate(${rot}deg)">${k === 7 ? 'L' : 'T'}</span></div>`;
          }).join('') + `</div>`;
      } else if (pose === 3) {
        hud(2, 3, 8);
        arena.innerHTML = `<div class="flanker-wrap"><div class="arrows">→→<span class="c">←</span>→→</div></div>`;
        const lr = document.createElement('div');
        lr.className = 'lr-buttons';
        lr.innerHTML = `<button>←</button><button>→</button>`;
        const hint = document.createElement('div');
        hint.className = 'lr-hint'; hint.textContent = t('lrHint');
        $('game').append(hint, lr);
      }
    }
  }
})();
</script>
