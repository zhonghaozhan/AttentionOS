<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AttentionOS — 60秒测出你的注意力类型</title>
<meta name="description" content="基于神经科学三大注意力网络的60秒测试。3关小游戏，实时评分，生成你的注意力画像。数据不出浏览器。">
<meta property="og:title" content="60秒，测出你的注意力类型">
<meta property="og:description" content="警觉 · 定向 · 执行 —— 3关小游戏，测出你的注意力画像。数据不出浏览器。">
<meta name="theme-color" content="#F7F7FB">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F7FB;
    --ink: #232043;
    --ink-soft: #5B5876;
    --ink-faint: #8B88A3;
    --brand: #564A96;
    --cta: #2AA8A8;
    --cta-deep: #218C8C;
    --coral: #E8734A;
    --teal: #2AA8A8;
    --purp: #7C6BD6;
    --line: #E7E6F0;
    --shadow: 0 4px 20px rgba(35,32,67,0.08);
    --sans: "Plus Jakarta Sans", "Noto Sans SC", "Helvetica Neue", sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { background: var(--bg); }
  body {
    font-family: var(--sans);
    color: var(--ink);
    min-height: 100svh;
    -webkit-font-smoothing: antialiased;
    background: var(--bg);
    overscroll-behavior: none;
  }
  .screen { display: none; }
  .screen.active { display: block; }
  a { color: var(--cta); }
  svg { display: block; }

  .sheet {
    max-width: 720px;
    margin: 0 auto;
    padding: clamp(1rem, 3.5vw, 2.2rem) clamp(1rem, 4vw, 2rem) 3rem;
  }
  .masthead {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
  }
  .masthead .brand {
    font-weight: 800;
    letter-spacing: 0.02em;
    font-size: 1.05rem;
  }
  .masthead .brand em { font-style: normal; color: var(--brand); }
  .masthead-note {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }
  .lang-toggle {
    font-family: var(--sans);
    font-size: 0.75rem;
    font-weight: 700;
    background: #fff;
    border: 2px solid var(--line);
    border-radius: 999px;
    color: var(--ink-soft);
    padding: 0.35rem 0.9rem;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .lang-toggle:hover { border-color: var(--ink-faint); color: var(--ink); }

  /* ---------- intro ---------- */
  .hero { margin-top: clamp(1.8rem, 5vw, 3rem); text-align: center; }
  .hero-kicker {
    display: inline-block;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--brand);
    background: #564A961A;
    border-radius: 999px;
    padding: 0.4rem 1rem;
  }
  h1 {
    font-weight: 800;
    font-size: clamp(1.95rem, 7.5vw, 3.1rem);
    line-height: 1.16;
    margin: 0.9rem auto 0;
    max-width: 18em;
    letter-spacing: -0.01em;
  }
  html[lang="zh"] h1 { font-weight: 700; letter-spacing: 0; }
  h1 .accent { color: var(--brand); }
  .lede {
    margin: 1rem auto 0;
    font-size: 0.95rem;
    line-height: 1.75;
    color: var(--ink-soft);
    max-width: 36rem;
  }
  .lede strong { color: var(--ink); }

  .stages-preview {
    margin-top: 1.8rem;
    display: grid;
    gap: 0.7rem;
  }
  .stage-line {
    display: flex;
    align-items: center;
    gap: 0.9rem;
    background: #fff;
    border-radius: 16px;
    box-shadow: var(--shadow);
    padding: 0.9rem 1.1rem;
    text-align: left;
  }
  .s-ic {
    flex: none;
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--ncbg);
    color: var(--nc);
    display: grid;
    place-items: center;
  }
  .s-ic svg { width: 22px; height: 22px; }
  .s-tx { display: flex; flex-direction: column; gap: 0.15rem; min-width: 0; }
  .stage-line .nm { font-weight: 700; font-size: 0.92rem; }
  .stage-line .nm small {
    color: var(--ink-faint);
    font-weight: 600;
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-left: 0.35rem;
  }
  .stage-line .ds { color: var(--ink-faint); font-size: 0.82rem; }

  .start-row {
    margin-top: 1.9rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.9rem;
  }
  .btn {
    font-family: var(--sans);
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    border: none;
    background: var(--cta);
    color: #fff;
    padding: 1rem 2.8rem;
    border-radius: 999px;
    cursor: pointer;
    box-shadow: 0 6px 18px rgba(42,168,168,0.35);
    transition: background 0.18s cubic-bezier(0.22,1,0.36,1), transform 0.18s, box-shadow 0.18s;
    touch-action: manipulation;
  }
  .btn:hover { background: var(--cta-deep); transform: translateY(-1px); }
  .btn:focus-visible { outline: 3px solid #2AA8A855; outline-offset: 2px; }
  .btn.ghost {
    background: #fff;
    color: var(--ink);
    border: 2px solid var(--line);
    box-shadow: none;
    padding: calc(1rem - 2px) 2rem;
  }
  .btn.ghost:hover { background: #fff; border-color: var(--ink-faint); transform: translateY(-1px); }
  .fine { font-size: 0.75rem; color: var(--ink-faint); line-height: 1.55; max-width: 32ch; text-align: center; }

  .footer-rule {
    margin-top: 3rem;
    padding-top: 1rem;
    border-top: 2px solid var(--line);
    display: flex;
    justify-content: space-between;
    gap: 0.5rem 1rem;
    flex-wrap: wrap;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--ink-faint);
  }
  .style-switch {
    margin-top: 0.9rem;
    text-align: center;
    font-size: 0.68rem;
    color: var(--ink-faint);
  }
  .style-switch a { color: var(--ink-faint); text-decoration: none; }
  .style-switch a:hover { color: var(--ink); text-decoration: underline; }

  /* ---------- game ---------- */
  #game {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 10;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .prog {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 10px;
    background: var(--line);
  }
  .prog i {
    display: block;
    height: 100%;
    width: 0;
    background: var(--coral);
    border-radius: 0 999px 999px 0;
    transition: width 0.35s cubic-bezier(0.22,1,0.36,1), background 0.3s;
  }
  .game-hud {
    position: absolute;
    top: 1.5rem; left: 1rem; right: 1rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .hud-pill {
    background: #fff;
    border: 2px solid var(--line);
    border-radius: 999px;
    padding: 0.35rem 0.9rem;
    font-weight: 700;
    font-size: 0.75rem;
    color: var(--stagec, var(--coral));
  }
  .streak {
    font-weight: 800;
    font-size: 0.78rem;
    color: #fff;
    background: var(--stagec, var(--cta));
    border-radius: 999px;
    padding: 0.35rem 0.85rem;
    opacity: 0;
    transform: scale(0.8);
    transition: all 0.2s cubic-bezier(0.22,1,0.36,1);
  }
  .streak.show { opacity: 1; transform: scale(1); }

  .arena-shell {
    position: absolute;
    inset: 5rem 1rem 7.8rem;
    display: grid;
  }
  #arena {
    background: #fff;
    border-radius: 24px;
    box-shadow: var(--shadow);
    display: grid;
    place-items: center;
    width: 100%;
    max-width: 620px;
    margin: 0 auto;
    overflow: hidden;
  }
  .feedback {
    position: absolute;
    left: 0; right: 0;
    bottom: 8.6rem;
    text-align: center;
    opacity: 0;
    transform: translateY(6px) scale(0.9);
    pointer-events: none;
    z-index: 6;
  }
  .feedback.pop {
    animation: fbpop 0.75s cubic-bezier(0.22,1,0.36,1);
  }
  @keyframes fbpop {
    0% { opacity: 0; transform: translateY(10px) scale(0.85); }
    18% { opacity: 1; transform: translateY(0) scale(1.05); }
    30% { transform: translateY(0) scale(1); }
    80% { opacity: 1; }
    100% { opacity: 0; }
  }
  .fpill {
    display: inline-block;
    padding: 0.55rem 1.25rem;
    border-radius: 999px;
    color: #fff;
    font-weight: 700;
    font-size: 0.98rem;
    box-shadow: 0 6px 20px rgba(35,32,67,0.18);
  }
  .fpill.good { background: var(--stagec, var(--teal)); }
  .fpill.bad { background: #9A97AD; }
  .fpill .ms { font-weight: 800; font-feature-settings: "tnum"; }

  /* stage intro card */
  .stage-card {
    text-align: center;
    max-width: 26rem;
    padding: 1.5rem;
  }
  .stage-ic {
    width: 64px; height: 64px;
    border-radius: 50%;
    background: var(--ncbg);
    color: var(--nc);
    display: inline-grid;
    place-items: center;
  }
  .stage-ic svg { width: 30px; height: 30px; }
  .stage-card .k {
    margin-top: 0.9rem;
    font-size: 0.7rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--nc);
    font-weight: 700;
  }
  .stage-card h2 {
    font-weight: 800;
    font-size: clamp(1.5rem, 6vw, 2rem);
    line-height: 1.25;
    margin: 0.45rem 0 0.55rem;
  }
  html[lang="zh"] .stage-card h2 { font-weight: 700; }
  .stage-card p { color: var(--ink-soft); font-size: 0.92rem; line-height: 1.65; }
  .stage-card .btn { margin-top: 1.4rem; }
  .stage-card .btn.stage-go {
    background: var(--nc);
    box-shadow: 0 6px 18px var(--ncbg);
  }
  .stage-card .btn.stage-go:hover { filter: brightness(0.92); }

  /* stage 1 */
  .signal-ring {
    width: min(52vw, 210px);
    height: min(52vw, 210px);
    border-radius: 50%;
    border: 4px dashed var(--line);
    display: grid;
    place-items: center;
    color: var(--ink-faint);
    font-weight: 600;
    font-size: 0.95rem;
    transition: transform 0.1s;
  }
  .signal-ring.go {
    background: var(--coral);
    border: 4px solid var(--coral);
    color: #fff;
    font-weight: 800;
    font-size: 2rem;
    box-shadow: 0 10px 34px rgba(232,115,74,0.45);
    animation: sigpop 0.18s cubic-bezier(0.22,1,0.36,1);
  }
  @keyframes sigpop { from { transform: scale(0.6); } to { transform: scale(1); } }
  .shake { animation: shake 0.35s; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-7px); } 50% { transform: translateX(7px); } 75% { transform: translateX(-4px); }
  }

  /* stage 2 */
  .search-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: clamp(0.5rem, 2.5vw, 0.9rem);
    padding: 1rem;
  }
  .search-cell {
    width: clamp(52px, 15vw, 76px);
    height: clamp(52px, 15vw, 76px);
    border: 2px solid var(--line);
    border-radius: 14px;
    background: var(--bg);
    display: grid;
    place-items: center;
    font-weight: 700;
    font-size: clamp(1.4rem, 5.5vw, 1.9rem);
    color: var(--ink);
    cursor: pointer;
    transition: transform 0.08s;
  }
  .search-cell:active { transform: scale(0.92); }
  .search-cell.wrong { background: #E8734A26; border-color: var(--coral); animation: shake 0.3s; }

  /* stage 3 */
  .flanker-wrap { text-align: center; }
  .fixation { font-size: 2.2rem; color: var(--ink-faint); font-weight: 600; }
  .arrows {
    font-size: clamp(2.4rem, 10vw, 3.6rem);
    letter-spacing: 0.08em;
    font-weight: 800;
    color: var(--ink-faint);
    font-feature-settings: "tnum";
  }
  .arrows .c { color: var(--purp); }
  .lr-buttons {
    position: absolute;
    bottom: 1rem; left: 1rem; right: 1rem;
    height: 5rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.8rem;
    max-width: 620px;
    margin: 0 auto;
  }
  .lr-buttons button {
    font-family: var(--sans);
    font-size: 1.7rem;
    font-weight: 800;
    background: #fff;
    border: 2px solid var(--line);
    border-radius: 18px;
    box-shadow: var(--shadow);
    cursor: pointer;
    color: var(--purp);
    touch-action: manipulation;
  }
  .lr-buttons button:active { background: #7C6BD61F; border-color: var(--purp); }
  .lr-hint {
    position: absolute;
    bottom: 6.4rem; left: 1rem; right: 1rem;
    text-align: center;
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--ink-faint);
  }

  /* stage clear card */
  .clear-overlay {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    background: rgba(247,247,251,0.9);
    z-index: 7;
  }
  .clear-card {
    background: #fff;
    border-radius: 24px;
    box-shadow: 0 12px 44px rgba(35,32,67,0.16);
    padding: 1.9rem 3rem 2.1rem;
    text-align: center;
    animation: cardin 0.4s cubic-bezier(0.22,1,0.36,1);
  }
  @keyframes cardin {
    from { transform: scale(1.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .clear-ic {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: var(--ncbg);
    color: var(--nc);
    display: inline-grid;
    place-items: center;
  }
  .clear-ic svg { width: 26px; height: 26px; }
  .clear-title {
    margin-top: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    font-size: 0.72rem;
    text-transform: uppercase;
    color: var(--ink-faint);
  }
  .clear-score {
    font-weight: 800;
    font-size: 3.2rem;
    line-height: 1.1;
    color: var(--nc);
    font-feature-settings: "tnum";
  }
  .clear-line { font-size: 0.85rem; color: var(--ink-soft); margin-top: 0.25rem; }

  /* ---------- results ---------- */
  .hero-banner {
    margin-top: 1.4rem;
    border-radius: 24px;
    padding: 2.1rem 1.5rem 2.3rem;
    background: var(--brand);
    color: #fff;
    text-align: center;
    box-shadow: var(--shadow);
  }
  .hero-badge { display: inline-block; color: #fff; }
  .hero-badge svg { width: 56px; height: 56px; }
  .verdict-label {
    margin-top: 0.9rem;
    font-size: 0.72rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-weight: 700;
    opacity: 0.8;
  }
  .verdict {
    font-weight: 800;
    font-size: clamp(2.2rem, 9vw, 3.4rem);
    line-height: 1.12;
    margin-top: 0.25rem;
  }
  html[lang="zh"] .verdict { font-weight: 700; }
  .verdict-tag {
    margin: 0.8rem auto 0;
    max-width: 38ch;
    opacity: 0.92;
    font-size: 0.98rem;
    line-height: 1.6;
  }

  .card {
    background: #fff;
    border-radius: 20px;
    box-shadow: var(--shadow);
    padding: 1.3rem 1.3rem 1.2rem;
  }
  .result-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1rem;
    margin-top: 1rem;
  }
  @media (min-width: 640px) {
    .result-grid { grid-template-columns: 1.45fr 1fr; align-items: stretch; }
  }

  .net-row {
    display: flex;
    gap: 0.9rem;
    padding: 0.9rem 0;
    border-bottom: 1px solid var(--line);
  }
  .net-row:first-child { padding-top: 0.2rem; }
  .net-row:last-child { border-bottom: none; padding-bottom: 0.2rem; }
  .net-ic {
    flex: none;
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--ncbg);
    color: var(--nc);
    display: grid;
    place-items: center;
    margin-top: 0.1rem;
  }
  .net-ic svg { width: 19px; height: 19px; }
  .net-main { flex: 1; min-width: 0; }
  .net-top { display: flex; justify-content: space-between; align-items: baseline; }
  .net-top .nm { font-weight: 700; font-size: 0.9rem; }
  .net-top .nm small {
    color: var(--ink-faint);
    font-weight: 600;
    margin-left: 0.4rem;
    font-size: 0.66rem;
    letter-spacing: 0.08em;
  }
  .net-top .sc {
    font-weight: 800;
    font-size: 1.35rem;
    color: var(--nc);
    font-feature-settings: "tnum";
  }
  .net-bar {
    height: 10px;
    background: var(--line);
    border-radius: 999px;
    margin-top: 0.45rem;
    position: relative;
    overflow: hidden;
  }
  .net-bar i {
    position: absolute; left: 0; top: 0; bottom: 0;
    background: var(--nc);
    border-radius: 999px;
    width: 0;
    transition: width 0.9s cubic-bezier(0.22,1,0.36,1);
  }
  .net-sub { font-size: 0.74rem; color: var(--ink-faint); margin-top: 0.4rem; }

  .radar-box {
    display: grid;
    place-items: center;
  }
  .radar-box svg { width: min(60vw, 230px); height: auto; }

  .rx { margin-top: 1rem; }
  .rx-label {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--brand);
    margin-bottom: 0.4rem;
  }
  .rx ul { list-style: none; }
  .rx li {
    padding: 0.6rem 0;
    border-bottom: 1px solid var(--line);
    font-size: 0.88rem;
    line-height: 1.65;
    color: var(--ink-soft);
    display: flex;
    gap: 0.7rem;
  }
  .rx li:last-child { border-bottom: none; padding-bottom: 0.1rem; }
  .rx li::before {
    content: "";
    flex: none;
    width: 15px; height: 15px;
    margin-top: 0.28rem;
    border: 2px solid var(--brand);
    border-radius: 5px;
  }
  .rx li strong { color: var(--ink); }

  details.science {
    margin-top: 1rem;
    font-size: 0.78rem;
    color: var(--ink-faint);
    line-height: 1.65;
    background: #fff;
    border-radius: 16px;
    box-shadow: var(--shadow);
    padding: 0.9rem 1.2rem;
  }
  details.science summary { cursor: pointer; color: var(--ink-soft); font-weight: 600; }
  details.science p { margin-top: 0.5rem; }
  details.science a { color: var(--ink-soft); }

  .actions {
    margin-top: 1.5rem;
    display: flex;
    gap: 0.7rem;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
  }
  .copied-note { font-size: 0.78rem; font-weight: 600; color: var(--cta); opacity: 0; transition: opacity 0.25s; width: 100%; text-align: center; }
  .copied-note.show { opacity: 1; }
  .star-ask {
    margin-top: 1.4rem;
    font-size: 0.85rem;
    color: var(--ink-soft);
    text-align: center;
  }
  .star-ask a { color: var(--cta); font-weight: 700; }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }
</style>
</head>
<body>

<!-- ============ INTRO ============ -->
<section id="intro" class="screen active">
  <div class="sheet">
    <header class="masthead">
      <div class="brand">Attention<em>OS</em></div>
      <button class="lang-toggle" id="langBtn">EN</button>
    </header>
    <div class="hero">
      <div class="hero-kicker" data-i18n="kicker"></div>
      <h1 id="heroTitle"></h1>
      <p class="lede" id="heroLede"></p>
    </div>
    <div class="stages-preview" id="stagesPreview"></div>
    <div class="start-row">
      <button class="btn" id="startBtn"></button>
      <p class="fine" data-i18n="privacy"></p>
    </div>
    <div class="footer-rule">
      <span>AttentionOS · open source</span>
      <span data-i18n="footProto"></span>
    </div>
    <div class="style-switch"><a href="index.html">editorial</a> · <a href="modern.html">modern</a> · <a href="pixel.html">pixel</a></div>
  </div>
</section>

<!-- ============ GAME ============ -->
<section id="game" class="screen">
  <div class="prog"><i id="progFill"></i></div>
  <div class="game-hud">
    <span class="hud-pill" id="hudStage"></span>
    <span class="streak" id="streak"></span>
  </div>
  <div class="arena-shell"><div id="arena"></div></div>
  <div class="feedback" id="feedback"></div>
</section>

  let lang = qs.get('lang') || ((navigator.language || 'en').startsWith('zh') ? 'zh' : 'en');

  /* ================= game engine ================= */
  const arena = $('arena');
  const fb = $('feedback');
  let streakN = 0;

  const STAGE_OFFSET = [0, 5, 10];   // trials completed before each stage
  const TOTAL_TRIALS = 18;           // 5 + 5 + 8
  function hud(stageIdx, done, total) {
    const col = NET_COLORS[stageIdx];
    const pill = $('hudStage');
    pill.textContent = `${stageIdx + 1}/3 · ${t('stageNames')[stageIdx]}`;
    pill.style.color = col;
    const fill = $('progFill');
    fill.style.width = (100 * Math.min(TOTAL_TRIALS, STAGE_OFFSET[stageIdx] + done) / TOTAL_TRIALS) + '%';
    fill.style.background = col;
    $('game').style.setProperty('--stagec', col);
  }
  function feedback(html, good) {
    fb.innerHTML = `<span class="fpill ${good ? 'good' : 'bad'}">${html}</span>`;
    fb.classList.remove('pop');
    void fb.offsetWidth;
    fb.classList.add('pop');
    if (good) buzz(12);
  }
  function bumpStreak(good) {
    streakN = good ? streakN + 1 : 0;
    const el = $('streak');
    if (streakN >= 2) {
      el.textContent = `×${streakN} ${t('streakWord')}`;
      el.classList.remove('show'); void el.offsetWidth; el.classList.add('show');
    } else el.classList.remove('show');
  }
  function gradeOf(table, rt) {
    for (const [max, label] of table) if (rt < max) return label;
  }
  function stageCard(idx) {
    return new Promise(res => {
      const [k, h, p] = t('stageIntro')[idx];
      arena.innerHTML = `<div class="stage-card" style="--nc:${NET_COLORS[idx]};--ncbg:${NET_COLORS[idx]}1F">

        <div class="k">${k}</div><h2>${h}</h2><p>${p}</p>
        <button class="btn stage-go" id="stageGo">GO</button></div>`;
      $('stageGo').addEventListener('click', () => res(), { once: true });
    });
  }
  async function stamp(idx, score) {
    const lines = t('stampLines')[idx];
    const line = score >= 75 ? lines[0] : score >= 55 ? lines[1] : lines[2];
    const el = document.createElement('div');
    el.className = 'clear-overlay';
    el.innerHTML = `<div class="clear-card" style="--nc:${NET_COLORS[idx]};--ncbg:${NET_COLORS[idx]}1F">

      <div class="clear-title">${t('stageNames')[idx]} · ${t('clear')}</div>
      <div class="clear-score">${score}</div>
      <div class="clear-line">${line}</div></div>`;
    $('game').appendChild(el);
    buzz([20, 40, 20]);
    await sleep(1500);
    el.remove();
  }

  /* ---------- stage 1: alerting ---------- */
  async function stage1() {
    const TRIALS = 5;
    data.s1 = []; data.s1false = 0; streakN = 0;
    hud(0, 0, TRIALS);
    await stageCard(0);
    for (let i = 0; i < TRIALS; i++) {
      hud(0, i, TRIALS);
      arena.innerHTML = `<div class="signal-ring" id="ring">${t('waiting')}</div>`;
      const ring = $('ring');
      let fired = false, t0 = 0;
      const rt = await new Promise(res => {
        let timer = setTimeout(fire, 900 + Math.random() * 1600);
        function fire() {
          fired = true;
          ring.classList.add('go');
          ring.textContent = t('go');
          t0 = performance.now();
        }
        function onTap(e) {
          if (e.type === 'keydown' && e.code !== 'Space') return;
          e.preventDefault();
          if (!fired) {                       // false start
            data.s1false++;
            clearTimeout(timer);
            ring.classList.add('shake');
            feedback(t('falseStart'), false);
            bumpStreak(false);
            setTimeout(() => {
              ring.classList.remove('shake');
              timer = setTimeout(fire, 1200 + Math.random() * 1600);
            }, 500);
            return;
          }
          cleanup();
          res(performance.now() - t0);
        }
        function cleanup() {
          arena.removeEventListener('pointerdown', onTap);
          document.removeEventListener('keydown', onTap);
        }
        arena.addEventListener('pointerdown', onTap);
        document.addEventListener('keydown', onTap);
      });
      data.s1.push(rt);
      const good = rt < 450;
      bumpStreak(good);
      feedback(`<span class="ms">${Math.round(rt)} ms</span> · ${gradeOf(t('s1grades'), rt)}`, good);
      hud(0, i + 1, TRIALS);
      await sleep(750);
    }
    const s = scoreAlerting();
    await stamp(0, s);
  }

  /* ---------- stage 2: orienting ---------- */
  async function stage2() {
    const TRIALS = 5, CELLS = 12;
    data.s2 = []; data.s2wrong = 0; streakN = 0;
    hud(1, 0, TRIALS);
    await stageCard(1);
    for (let i = 0; i < TRIALS; i++) {
      hud(1, i, TRIALS);
      const target = Math.floor(Math.random() * CELLS);
      arena.innerHTML = `<div class="search-grid">` +
        Array.from({ length: CELLS }, (_, k) => {
          const rot = [0, 90, 180, 270][Math.floor(Math.random() * 4)];
          const ch = k === target ? 'L' : 'T';
          return `<div class="search-cell" data-k="${k}">
            <span style="transform:rotate(${rot}deg)">${ch}</span></div>`;
        }).join('') + `</div>`;
      const t0 = performance.now();
      let wrongThis = 0;
      const rt = await new Promise(res => {
        arena.querySelectorAll('.search-cell').forEach(cell => {
          cell.addEventListener('pointerdown', () => {
            if (+cell.dataset.k === target) res(performance.now() - t0);
            else {
              wrongThis++; data.s2wrong++;
              cell.classList.add('wrong');
              buzz(30);
            }
          });
        });
      });
      data.s2.push(rt + wrongThis * 300);   // wrong taps cost
      const good = rt < 2400 && wrongThis === 0;
      bumpStreak(good);
      feedback(`<span class="ms">${(rt / 1000).toFixed(2)} s</span> · ${gradeOf(t('s2grades'), rt)}`, good);
      hud(1, i + 1, TRIALS);
      await sleep(750);
    }
    const s = scoreOrienting();
    await stamp(1, s);
  }

  /* ---------- stage 3: executive (flanker) ---------- */
  async function stage3() {
    const TRIALS = 8;
    data.s3 = []; streakN = 0;
    hud(2, 0, TRIALS);
    await stageCard(2);
    const conds = [1, 1, 1, 1, 0, 0, 0, 0].sort(() => Math.random() - 0.5); // 1=incongruent
    const lr = document.createElement('div');
    lr.className = 'lr-buttons';
    lr.innerHTML = `<button data-d="L">←</button><button data-d="R">→</button>`;
    const hint = document.createElement('div');
    hint.className = 'lr-hint';
    hint.textContent = t('lrHint');
    $('game').append(hint, lr);
    for (let i = 0; i < TRIALS; i++) {
      hud(2, i, TRIALS);
      const incong = conds[i];
      const dir = Math.random() < 0.5 ? 'L' : 'R';
      const c = dir === 'L' ? '←' : '→';
      const f = incong ? (dir === 'L' ? '→' : '←') : c;
      arena.innerHTML = `<div class="flanker-wrap"><div class="fixation">+</div></div>`;
      await sleep(400 + Math.random() * 300);
      arena.innerHTML = `<div class="flanker-wrap"><div class="arrows">${f}${f}<span class="c">${c}</span>${f}${f}</div></div>`;
      const t0 = performance.now();
      const ans = await new Promise(res => {
        const to = setTimeout(() => { cleanup(); res(null); }, 2000);
        function onKey(e) {
          if (e.key === 'ArrowLeft') done('L');
          else if (e.key === 'ArrowRight') done('R');
        }
        function onBtn(e) {
          const b = e.target.closest('button[data-d]');
          if (b) done(b.dataset.d);
        }
        function done(d) { clearTimeout(to); cleanup(); res(d); }
        function cleanup() {
          document.removeEventListener('keydown', onKey);
          lr.removeEventListener('pointerdown', onBtn);
        }
        document.addEventListener('keydown', onKey);
        lr.addEventListener('pointerdown', onBtn);
      });
      const rt = performance.now() - t0;
      const correct = ans === dir;
      data.s3.push({ incong, rt: ans ? rt : 2000, correct });
      bumpStreak(correct);
      if (!ans) feedback(t('s3miss'), false);
      else if (!correct) feedback(t('s3bad'), false);
      else feedback(`<span class="ms">${Math.round(rt)} ms</span> · ${incong ? t('s3okHard') : t('s3ok')}`, true);
      hud(2, i + 1, TRIALS);
      await sleep(700);
    }
    hint.remove(); lr.remove();
    const s = scoreExecutive();
    await stamp(2, s);
  }

  /* ================= scoring (docs/SCIENCE.md) ================= */
  const median = a => {
    const s = [...a].sort((x, y) => x - y);
    return s.length ? (s[s.length >> 1] + s[(s.length - 1) >> 1]) / 2 : 0;
  };
  const logistic = (x, mid, k) => Math.round(100 / (1 + Math.exp((x - mid) / k)));
  const clamp100 = v => Math.max(1, Math.min(99, v));

  function scoreAlerting() {
    const rt = median(data.s1);
    return clamp100(logistic(rt, 350, 55) - data.s1false * 6);
  }
  function scoreOrienting() {
    const rt = median(data.s2);
    return clamp100(logistic(rt, 1500, 380));
  }
  function scoreExecutive() {
    const cong = data.s3.filter(x => !x.incong && x.correct).map(x => x.rt);
    const inc = data.s3.filter(x => x.incong && x.correct).map(x => x.rt);
    const cost = (inc.length && cong.length) ? Math.max(0, median(inc) - median(cong)) : 250;
    const errors = data.s3.filter(x => !x.correct).length;
    return clamp100(Math.round(logistic(cost, 115, 42) * Math.max(0.3, 1 - errors * 0.13)));
  }

  function analyze() {
    const a = scoreAlerting(), o = scoreOrienting(), e = scoreExecutive();
    const scores = [a, o, e];
    const overall = Math.round(a * 0.3 + o * 0.3 + e * 0.4);
    const mx = Math.max(...scores), mn = Math.min(...scores);
    let type;
    if (mn >= 75) type = 'commander';
    else if ((mx + mn) / 2 < 50 && mx < 60) type = 'wanderer';
    else if (mx - mn <= 12) type = 'balanced';
    else type = ['cheetah', 'hawkeye', 'fortress'][scores.indexOf(mx)];
    const cong = data.s3.filter(x => !x.incong && x.correct).map(x => x.rt);
    const inc = data.s3.filter(x => x.incong && x.correct).map(x => x.rt);
    return {
      scores, overall, type,
      weakest: scores.indexOf(mn),
      strongest: scores.indexOf(mx),
      s1rt: Math.round(median(data.s1)) || 0,
      s2rt: Math.round(median(data.s2)) || 0,
      s3cost: (inc.length && cong.length) ? Math.round(Math.max(0, median(inc) - median(cong))) : 0,
      s3acc: Math.round(100 * data.s3.filter(x => x.correct).length / Math.max(1, data.s3.length)),
    };
  }

  /* ================= results ================= */
  function radarSVG(scores, color, size = 220) {
    const cx = size / 2, cy = size / 2 + 8, R = size / 2 - 34;
    const ang = [-90, 150, 30].map(d => d * Math.PI / 180);
    const pt = (i, r) => `${cx + Math.cos(ang[i]) * r},${cy + Math.sin(ang[i]) * r}`;
    const ring = f => `<polygon points="${[0, 1, 2].map(i => pt(i, R * f)).join(' ')}"
      fill="none" stroke="#E7E6F0" stroke-width="1.5"/>`;
    const poly = `<polygon points="${scores.map((s, i) => pt(i, R * s / 100)).join(' ')}"
      fill="${color}2E" stroke="${color}" stroke-width="2.5" stroke-linejoin="round"/>`;
    const names = t('stageNames');
    const lbl = [0, 1, 2].map(i => {
      const x = cx + Math.cos(ang[i]) * (R + 18), y = cy + Math.sin(ang[i]) * (R + 18);
      return `<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="middle"
        font-family="inherit" font-size="11" font-weight="700" fill="${NET_COLORS[i]}">${names[i]}</text>`;
    }).join('');
    return `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">
      ${ring(1)}${ring(2 / 3)}${ring(1 / 3)}
      ${[0, 1, 2].map(i => `<line x1="${cx}" y1="${cy}" x2="${pt(i, R).split(',')[0]}"
        y2="${pt(i, R).split(',')[1]}" stroke="#E7E6F0" stroke-width="1.5"/>`).join('')}
      ${poly}${lbl}</svg>`;
  }

  function renderResults(an) {
    const [aName, aTag] = t('archetypes')[an.type];
    const tc = TYPE_COLOR[an.type];
    $('heroBanner').style.background = tc;
    $('typeBadge').innerHTML = BADGES[an.type];
    $('archetype').textContent = aName;
    $('archetypeTag').textContent = aTag;
    const subs = t('netSub');
    const subVals = [subs[0](an.s1rt), subs[1](an.s2rt), subs[2](an.s3cost, an.s3acc)];
    $('networks').innerHTML = an.scores.map((s, i) => `
      <div class="net-row" style="--nc:${NET_COLORS[i]};--ncbg:${NET_COLORS[i]}1F">
        <span class="net-ic">${ICONS[i]}</span>
        <div class="net-main">
          <div class="net-top">
            <span class="nm">${t('stageNames')[i]}${lang === 'zh' ? `<small>${STR[lang].stageEn[i].toUpperCase()}</small>` : ''}</span>
            <span class="sc">${s}</span>
          </div>
          <div class="net-bar"><i data-w="${s}"></i></div>
          <div class="net-sub">${subVals[i]} · ${t('beat')(s)}</div>
        </div>
      </div>`).join('');
    requestAnimationFrame(() => requestAnimationFrame(() =>
      document.querySelectorAll('.net-bar i').forEach(el => el.style.width = el.dataset.w + '%')));
    $('radarBox').innerHTML = radarSVG(an.scores, tc);

    const rx = t('rx');
    const weakKey = ['alerting', 'orienting', 'executive'][an.weakest];
    $('rxList').innerHTML = [
      rx[weakKey],
      rx.strength(t('stageNames')[an.strongest]),
      rx.universal,
    ].map(x => `<li><span>${x}</span></li>`).join('');
    applyLangStatics();
  }
  function applyLangStatics() {
    document.querySelectorAll('[data-i18n]').forEach(el => { el.innerHTML = t(el.dataset.i18n); });
    $('downloadBtn').textContent = t('dl');
    $('copyBtn').textContent = t('copy');
    $('retryBtn').textContent = t('retry');
    $('copiedNote').textContent = t('copied');
    $('sciBody').textContent = t('sci');
    $('starAsk').innerHTML = t('starAsk') + `<a href="https://${REPO}" target="_blank" rel="noopener">${REPO}</a>`;
  }

  /* ================= share card ================= */
  async function drawCard(an) {
    const zh = lang === 'zh';
    const latin = '"Plus Jakarta Sans"';
    const cjk = '"Noto Sans SC"';
    const fam = zh ? cjk : latin;
    const heavy = zh ? '700' : '800';
    await document.fonts.load(`${heavy} 100px ${fam}`).catch(() => {});
    await document.fonts.load(`800 100px ${latin}`).catch(() => {});
    await document.fonts.load(`600 40px ${latin}`).catch(() => {});
    const c = $('cardCanvas'), x = c.getContext('2d');
    const W = c.width, H = c.height;
    const BG = '#F7F7FB', INK = '#232043', SOFT = '#8B88A3', BRAND = '#564A96', TRACK = '#EDECF5';
    const tc = TYPE_COLOR[an.type];
    const rr = (px, py, w, h, r) => {
      r = Math.min(r, w / 2, h / 2);
      x.beginPath();
      x.moveTo(px + r, py);
      x.arcTo(px + w, py, px + w, py + h, r);
      x.arcTo(px + w, py + h, px, py + h, r);
      x.arcTo(px, py + h, px, py, r);
      x.arcTo(px, py, px + w, py, r);
      x.closePath();
    };
    x.clearRect(0, 0, W, H);
    x.textAlign = 'left';
    x.fillStyle = BG; x.fillRect(0, 0, W, H);

    // white rounded card with soft shadow
    x.save();
    x.shadowColor = 'rgba(35,32,67,0.12)';
    x.shadowBlur = 60;
    x.shadowOffsetY = 16;
    rr(48, 48, W - 96, H - 96, 48);
    x.fillStyle = '#ffffff'; x.fill();
    x.restore();

    const M = 132;
    // brand
    x.fillStyle = INK; x.font = `800 42px ${latin}`;
    x.fillText('Attention', M, 182);
    const w1 = x.measureText('Attention').width;
    x.fillStyle = BRAND; x.fillText('OS', M + w1, 182);
    x.fillStyle = SOFT;
    x.font = zh ? `500 28px ${cjk}` : `600 26px ${latin}`;
    if (!zh) x.letterSpacing = '4px';
    x.fillText(t('cardKicker'), M, 230);
    x.letterSpacing = '0px';

    // hero band tinted in archetype color
    const bandX = 96, bandW = W - 192, bandY = 274, bandH = 380;
    rr(bandX, bandY, bandW, bandH, 36);
    x.fillStyle = tc; x.fill();
    const bx = M;
    x.fillStyle = 'rgba(255,255,255,0.75)';
    x.font = zh ? `500 30px ${cjk}` : `600 26px ${latin}`;
    if (!zh) x.letterSpacing = '3px';
    x.fillText(zh ? '你的注意力类型' : 'YOUR ATTENTION TYPE', bx, bandY + 84);
    x.letterSpacing = '0px';
    const [aName, aTag] = t('archetypes')[an.type];
    let fs = zh ? 148 : 118;
    x.font = `${heavy} ${fs}px ${fam}`;
    while (x.measureText(aName).width > bandW - 2 * (M - bandX) && fs > 54) {
      fs -= 6; x.font = `${heavy} ${fs}px ${fam}`;
    }
    x.fillStyle = '#ffffff';
    x.fillText(aName, bx, bandY + 248);
    x.fillStyle = 'rgba(255,255,255,0.85)';
    x.font = zh ? `500 34px ${cjk}` : `600 32px ${latin}`;
    x.fillText(t('cardBeat')(an.overall), bx, bandY + 322);

    // the quotable line — wrap to width
    x.fillStyle = INK;
    x.font = zh ? `500 44px ${cjk}` : `600 42px ${latin}`;
    const words = zh ? [...aTag] : aTag.split(' ');
    const joiner = zh ? '' : ' ';
    let line = '', ty = bandY + bandH + 96;
    const maxW = W - 2 * M;
    for (const w of words) {
      const test = line ? line + joiner + w : w;
      if (x.measureText(test).width > maxW && line && !'。，！？；、）”'.includes(w)) {
        x.fillText(line, M, ty); ty += 62; line = w;
      } else line = test;
    }
    if (line) { x.fillText(line, M, ty); ty += 62; }

    // three network scores with colored rounded bars
    const rows = t('stageNames').map((nm, i) => [nm, an.scores[i], NET_COLORS[i]]);
    let y = 986;
    const bw = W - 2 * M;
    for (const [nm, v, col] of rows) {
      x.fillStyle = INK;
      x.font = zh ? `500 34px ${cjk}` : `600 32px ${latin}`;
      x.fillText(nm, M, y);
      x.fillStyle = col; x.font = `800 44px ${latin}`;
      x.textAlign = 'right';
      x.fillText(String(v), M + bw, y + 2);
      x.textAlign = 'left';
      rr(M, y + 24, bw, 20, 10); x.fillStyle = TRACK; x.fill();
      rr(M, y + 24, Math.max(20, bw * v / 100), 20, 10); x.fillStyle = col; x.fill();
      y += 106;
    }

    // footer
    x.strokeStyle = TRACK; x.lineWidth = 3;
    x.beginPath(); x.moveTo(M, H - 172); x.lineTo(W - M, H - 172); x.stroke();
    x.fillStyle = INK; x.font = `${heavy} 38px ${fam}`;
    x.fillText(t('cardFooter'), M, H - 112);
    x.fillStyle = SOFT; x.font = `600 26px ${latin}`;
    x.fillText(REPO, M, H - 70);
    return c;
  }

  $('downloadBtn').addEventListener('click', async () => {
    const c = await drawCard(analysis);
    const a = document.createElement('a');
    a.download = `attention-type-${analysis.overall}.png`;
    a.href = c.toDataURL('image/png');
    a.click();
  });
  $('copyBtn').addEventListener('click', async () => {
    const [aName] = t('archetypes')[analysis.type];
    try { await navigator.clipboard.writeText(t('share')(aName, analysis.scores, analysis.overall)); } catch {}
    $('copiedNote').classList.add('show');
    setTimeout(() => $('copiedNote').classList.remove('show'), 2200);
  });

  /* ================= flow ================= */
  async function run() {
    show('game');
    await stage1();
    await stage2();
    await stage3();
    analysis = analyze();
    renderResults(analysis);
    show('results');
  }
  $('startBtn').addEventListener('click', run);
  $('retryBtn').addEventListener('click', run);
  document.addEventListener('keydown', e => {
    if (e.code === 'Space' && screens.game.classList.contains('active')) e.preventDefault();
  });

  applyLang();

  /* debug hooks: ?debug&mock jumps to results; ?debug&pose=1|2|3 shows a frozen stage */
  if (qs.has('debug')) {
    window.__mock = (over = {}) => {
      analysis = Object.assign({
        scores: [78, 64, 88], overall: 78, type: 'fortress',
        weakest: 1, strongest: 2, s1rt: 287, s2rt: 1340, s3cost: 62, s3acc: 100,
      }, over);
      renderResults(analysis); show('results');
    };
    if (qs.has('mock')) window.__mock();
    const pose = +qs.get('pose');
    if (pose) {
      show('game');
      if (pose === 1) {
        hud(0, 2, 5);
        arena.innerHTML = `<div class="signal-ring go">${t('go')}</div>`;
        feedback(`<span class="ms">243 ms</span> · ${gradeOf(t('s1grades'), 243)}`, true);
        fb.style.opacity = 1; fb.classList.remove('pop');
      } else if (pose === 2) {
        hud(1, 1, 5);
        arena.innerHTML = `<div class="search-grid">` +
          Array.from({ length: 12 }, (_, k) => {
            const rot = [0, 90, 180, 270][k % 4];
            return `<div class="search-cell"><span style="transform:rotate(${rot}deg)">${k === 7 ? 'L' : 'T'}</span></div>`;
          }).join('') + `</div>`;
      } else if (pose === 3) {
        hud(2, 3, 8);
        arena.innerHTML = `<div class="flanker-wrap"><div class="arrows">→→<span class="c">←</span>→→</div></div>`;
        const lr = document.createElement('div');
        lr.className = 'lr-buttons';
        lr.innerHTML = `<button>←</button><button>→</button>`;
        const hint = document.createElement('div');
        hint.className = 'lr-hint'; hint.textContent = t('lrHint');
        $('game').append(hint, lr);
      }
    }
  }
})();
</script>
</body>
