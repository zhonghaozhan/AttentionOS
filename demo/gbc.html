<style>
  :root {
    --paper: #f8f8f0;   /* warm paper-white page */
    --ink: #302848;     /* dark navy — all text & borders */
    --white: #ffffff;   /* dialogue windows */
    --red: #e04838;     /* banner / danger */
    --blue: #3870c0;
    --gold: #f8b830;
    --hp-g: #48d068;
    --hp-y: #f8d030;
    --hp-r: #e04838;
    --panel: #e8e8e0;   /* light gray panel */
    --muted: #706890;
    --shadow: #d0d0c8;  /* hard offset shadow */
    --fs-xs: 8px;
    --fs-s: 9px;
    --fs-m: 10px;
    --fs-l: 14px;
    --fs-xl: 18px;
  }
  html[lang="zh"] {
    --fs-xs: 10px;
    --fs-s: 12px;
    --fs-m: 13px;
    --fs-l: 18px;
    --fs-xl: 22px;
  }
  @media (min-width: 900px) {
    :root { --fs-xs: 9px; --fs-s: 10px; --fs-m: 11px; --fs-l: 16px; --fs-xl: 22px; }
    html[lang="zh"] { --fs-xs: 11px; --fs-s: 13px; --fs-m: 14px; --fs-l: 20px; --fs-xl: 26px; }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { background: var(--paper); }
  body {
    font-family: "Press Start 2P", "DotGothic16", "Noto Sans SC", sans-serif;
    font-size: var(--fs-m);
    line-height: 1.8;
    color: var(--ink);
    min-height: 100svh;
    background: var(--paper);
    overscroll-behavior: none;
    -webkit-font-smoothing: none;
  }
  canvas { image-rendering: pixelated; }
  .screen { display: none; }
  .screen.active { display: block; }

  .sheet {
    max-width: 620px;
    margin: 0 auto;
    padding: 18px 16px 56px;
  }
  @media (min-width: 900px) { .sheet { padding-top: 36px; } }

  /* ---- classic dialogue window: white, chunky double border with 4px pixel
     notched corners (4px ink outer via offset shadows + 2px gap + 2px inner
     ink line via inset shadows), hard offset drop shadow ---- */
  .win {
    position: relative;
    background: var(--white);
    margin: 6px 14px 16px 6px;
    box-shadow:
      0 -4px 0 0 var(--ink),
      0 4px 0 0 var(--ink),
      -4px 0 0 0 var(--ink),
      4px 0 0 0 var(--ink),
      8px 8px 0 0 var(--shadow),
      inset 0 0 0 2px var(--white),
      inset 0 0 0 4px var(--ink);
  }
  .win .banner {
    background: var(--red);
    color: var(--white);
    margin: 6px 6px 0;
    padding: 8px 12px;
    font-size: var(--fs-s);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .masthead {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--ink);
    color: var(--white);
    padding: 10px 12px;
    box-shadow: 4px 4px 0 0 var(--shadow);
    margin-bottom: 22px;
  }
  .masthead .brand { font-size: var(--fs-m); letter-spacing: 1px; text-transform: uppercase; }
  .lang-toggle {
    font-family: inherit;
    font-size: var(--fs-xs);
    background: var(--gold);
    color: var(--ink);
    border: none;
    padding: 6px 10px;

    text-transform: uppercase;
  }
  .lang-toggle:active { background: var(--white); }

  /* ---------- intro ---------- */
  .hero { padding: 16px 14px 18px; }
  .hero-kicker {
    display: inline-block;
    background: var(--red);
    color: var(--white);
    font-size: var(--fs-xs);

    text-transform: uppercase;
    letter-spacing: 1px;
  }
  h1 {
    font-size: var(--fs-xl);
    line-height: 1.6;
    margin-top: 14px;

  h1 .accent { background: var(--red); color: var(--white); padding: 0 5px; }
  .lede { margin-top: 12px; font-size: var(--fs-s); line-height: 2; color: var(--muted); }
  .lede strong { color: var(--ink); font-weight: 400; }

  .stages-preview { padding: 10px 14px 6px; }
  .stage-line {

    align-items: baseline;

    border-bottom: 2px solid var(--panel);

  .stage-line:last-child { border-bottom: none; }
  .stage-line .no {
    background: var(--blue);
    color: var(--white);
    font-size: var(--fs-xs);

  .stage-line .nm { min-width: 8em; text-transform: uppercase; }
  .stage-line .nm small { color: var(--muted); font-size: var(--fs-xs); margin-left: 4px; }
  .stage-line .ds { color: var(--muted); font-size: var(--fs-xs); flex: 1; }

  .start-row {
    margin-top: 24px;
    display: flex;
    align-items: center;
    gap: 18px;
    flex-wrap: wrap;
  }
  .btn {
    font-family: inherit;
    font-size: var(--fs-m);
    text-transform: uppercase;
    letter-spacing: 1px;
    background: var(--ink);
    color: var(--white);
    border: none;
    padding: 15px 22px;
    cursor: pointer;
    box-shadow: 4px 4px 0 0 var(--shadow);
    touch-action: manipulation;
  }
  .btn:active { transform: translate(4px, 4px); box-shadow: none; }
  .btn.ghost {
    background: var(--white);
    color: var(--ink);
    box-shadow: inset 0 0 0 4px var(--ink), 4px 4px 0 0 var(--shadow);
  }
  .btn.ghost:active { box-shadow: inset 0 0 0 4px var(--ink); }
  .btn.start { background: var(--red); }
  .btn.start::before {
    content: "▶ ";
    animation: blink 1s steps(1, end) infinite;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  .fine { font-size: var(--fs-xs); color: var(--muted); line-height: 2; max-width: 30ch; }

  .footer-rule {
    margin-top: 44px;
    padding-top: 12px;
    border-top: 4px solid var(--ink);
    display: flex;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    font-size: var(--fs-xs);
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ---------- game ---------- */
  #game {
    position: fixed;
    inset: 0;
    background: var(--paper);
    z-index: 10;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .game-hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 44px;
    background: var(--ink);
    color: var(--white);
    padding: 0 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: var(--fs-xs);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .dots { display: flex; gap: 6px; }
  .dot { width: 10px; height: 10px; border: 2px solid var(--muted); }
  .dot.done { background: var(--gold); border-color: var(--gold); }
  .streak {
    background: var(--gold);
    color: var(--ink);
    padding: 3px 8px;
    opacity: 0;
    transition: opacity 0.2s steps(2, end), transform 0.15s steps(2, end);
  }
  .streak.show { opacity: 1; }

  #arena {
    position: absolute;
    inset: 44px 0 96px;
    display: grid;
    place-items: center;
  }
  .feedback {
    position: absolute;
    left: 0; right: 0;
    bottom: 30px;
    width: fit-content;
    margin: 0 auto;
    background: var(--white);
    color: var(--ink);
    padding: 10px 16px;
    font-size: var(--fs-s);
    text-transform: uppercase;
    box-shadow:
      0 -3px 0 0 var(--ink),
      0 3px 0 0 var(--ink),
      -3px 0 0 0 var(--ink),
      3px 0 0 0 var(--ink),
      5px 5px 0 0 var(--shadow);
    opacity: 0;
    pointer-events: none;
  }
  .feedback.pop { animation: fbpop 0.8s steps(6, end); }
  @keyframes fbpop {
    0% { opacity: 0; transform: translateY(8px); }
    15% { opacity: 1; transform: translateY(0); }
    80% { opacity: 1; }
    100% { opacity: 0; }
  }
  .feedback .ms { color: var(--blue); }

  /* stage intro = bottom-anchored encounter dialogue window */
  .stage-card {
    position: absolute;
    left: 0; right: 0;
    bottom: 14px;
    width: min(520px, calc(100% - 40px));
    margin: 0 auto;
    padding: 16px 18px 20px;
    text-align: left;
  }
  .stage-card .k {
    display: inline-block;
    background: var(--red);
    color: var(--white);
    font-size: var(--fs-xs);
    padding: 3px 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .stage-card h2 {
    font-size: var(--fs-l);
    font-weight: 400;
    line-height: 1.7;
    margin: 12px 0 6px;
    text-transform: uppercase;
  }
  .stage-card p { color: var(--muted); font-size: var(--fs-s); line-height: 2; }
  .stage-card .btn { margin-top: 16px; background: var(--red); }
  .dlg-typed { animation: typein 0.9s steps(24, end); }
  @keyframes typein {
    from { clip-path: inset(0 100% 0 0); }
    to { clip-path: inset(0 0 0 0); }
  }
  .cont-arrow {
    position: absolute;
    right: 16px;
    bottom: 12px;
    color: var(--red);
    font-size: var(--fs-m);
    animation: bob 0.6s steps(2, end) infinite;
  }
  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(4px); }
  }

  /* stage 1: signal target */
  .signal-ring {
    width: min(56vw, 230px);
    aspect-ratio: 1;
    background: var(--white);
    box-shadow:
      0 -4px 0 0 var(--ink),
      0 4px 0 0 var(--ink),
      -4px 0 0 0 var(--ink),
      4px 0 0 0 var(--ink),
      8px 8px 0 0 var(--shadow),
      inset 0 0 0 2px var(--white),
      inset 0 0 0 4px var(--ink);
    display: grid;
    place-items: center;
    font-size: var(--fs-m);
    color: var(--muted);
    text-transform: uppercase;
  }
  .signal-ring.go {
    background: var(--red);
    color: var(--white);
    font-size: calc(var(--fs-xl) + 4px);
    animation: sigpop 0.15s steps(2, end);
  }
  @keyframes sigpop { from { transform: scale(0.6); } to { transform: scale(1); } }
  .shake { animation: shake 0.35s steps(4, end); }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); } 50% { transform: translateX(8px); } 75% { transform: translateX(-4px); }
  }

  /* stage 2: search grid */
  .search-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: clamp(10px, 3vw, 16px);
    padding: 16px;
  }
  .search-cell {
    width: clamp(54px, 16vw, 80px);
    aspect-ratio: 1;
    background: var(--white);
    box-shadow: inset 0 0 0 3px var(--ink);
    display: grid;
    place-items: center;
    font-size: clamp(18px, 6vw, 26px);
    cursor: pointer;
  }
  .search-cell:active { background: var(--panel); }
  .search-cell.wrong {
    background: var(--red);
    color: var(--white);
    animation: shake 0.3s steps(4, end);
  }

  /* stage 3: flanker */
  .flanker-wrap { text-align: center; }
  .fixation { font-size: 26px; color: var(--muted); }
  .arrows {
    font-family: "DotGothic16", "Noto Sans SC", sans-serif;
    font-size: clamp(30px, 11vw, 48px);
    letter-spacing: 0;
  }
  .lr-buttons {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 96px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    border-top: 4px solid var(--ink);
  }
  .lr-buttons button {
    font-family: "DotGothic16", "Noto Sans SC", sans-serif;
    font-size: 34px;
    background: var(--white);
    border: none;
    border-right: 4px solid var(--ink);
    cursor: pointer;
    color: var(--ink);
    touch-action: manipulation;
  }
  .lr-buttons button:last-child { border-right: none; }
  .lr-buttons button:active { background: var(--blue); color: var(--white); }
  .lr-hint {
    position: absolute;
    bottom: 104px; left: 12px; right: 12px;
    text-align: center;
    font-size: var(--fs-xs);
    letter-spacing: 1px;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* stage clear window */
  .stamp-overlay {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    background: var(--panel);
  }
  .stamp {
    padding: 22px 30px 24px;
    text-align: center;
    animation: stampin 0.3s steps(3, end);
  }
  @keyframes stampin {
    from { transform: scale(1.4); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .stamp .s-title { font-size: var(--fs-xs); letter-spacing: 1px; text-transform: uppercase; color: var(--red); }
  .stamp .s-clear { font-size: var(--fs-l); margin-top: 10px; text-transform: uppercase; }
  .stamp .s-score { font-size: 32px; line-height: 1.6; margin-top: 8px; color: var(--blue); }
  .stamp .s-line { font-size: var(--fs-s); color: var(--muted); margin-top: 4px; }

  /* ---------- results: trainer card ---------- */
  .status-win { padding: 0 0 16px; }
  .status-body {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 14px 0;
  }
  .pedestal {
    flex: none;
    background: var(--panel);
    box-shadow: inset 0 0 0 2px var(--ink);
    padding: 10px;
    display: grid;
    place-items: center;
  }
  #spriteCanvas { width: clamp(88px, 25vw, 132px); height: auto; }
  .verdict-label {
    display: inline-block;
    background: var(--blue);
    color: var(--white);
    font-size: var(--fs-xs);
    padding: 2px 6px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .verdict-row { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; margin-top: 8px; }
  .verdict { font-size: var(--fs-xl); line-height: 1.5; text-transform: uppercase; }
  .lv {
    background: var(--gold);
    color: var(--ink);
    font-size: var(--fs-xs);
    padding: 2px 6px;
  }
  .verdict-tag { margin-top: 8px; font-size: var(--fs-s); line-height: 1.9; color: var(--muted); }

  .bars-win {
    position: relative;
    background: var(--white);
    margin: 6px 14px 16px 6px;
    padding: 14px 14px 12px;
    box-shadow:
      0 -4px 0 0 var(--ink),
      0 4px 0 0 var(--ink),
      -4px 0 0 0 var(--ink),
      4px 0 0 0 var(--ink),
      8px 8px 0 0 var(--shadow),
      inset 0 0 0 2px var(--white),
      inset 0 0 0 4px var(--ink);
  }
  .hp-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; }
  .hp-label { font-size: var(--fs-xs); width: 7ch; flex: none; text-transform: uppercase; }
  .hp-blocks { display: flex; gap: 3px; flex: 1; }
  .hp-blocks i { flex: 1; height: 16px; background: var(--panel); }
  .hp-blocks i.on.g { background: var(--hp-g); }
  .hp-blocks i.on.y { background: var(--hp-y); }
  .hp-blocks i.on.r { background: var(--hp-r); }
  .hp-num { font-size: var(--fs-m); min-width: 3ch; text-align: right; }

  .networks { margin: 4px 6px 10px; }
  .net-row { padding: 12px 2px; border-bottom: 4px solid var(--panel); }
  .net-row:last-child { border-bottom: none; }
  .net-top { display: flex; justify-content: space-between; align-items: baseline; }
  .net-top .nm { font-size: var(--fs-m); text-transform: uppercase; }
  .net-top .nm small { color: var(--muted); font-size: var(--fs-xs); margin-left: 6px; }
  .net-top .sc { font-size: var(--fs-l); color: var(--blue); }
  .net-sub { font-size: var(--fs-xs); color: var(--muted); margin-top: 6px; }
  .net-rank {
    display: inline-block;
    background: var(--gold);
    color: var(--ink);
    font-size: var(--fs-xs);
    padding: 2px 6px;
    margin-top: 8px;
    text-transform: uppercase;
  }

  .rx { padding: 22px 14px 12px; margin-top: 18px; }
  .rx-label {
    position: absolute;
    top: -12px; left: 12px;
    background: var(--red);
    color: var(--white);
    padding: 3px 8px;
    font-size: var(--fs-xs);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .rx ul { list-style: none; }
  .rx li {
    padding: 10px 0;
    border-bottom: 2px solid var(--panel);
    font-size: var(--fs-s);
    line-height: 2;
    display: flex;
    gap: 8px;

  .rx li:last-child { border-bottom: none; }
  .rx li::before { content: "►"; flex: none; color: var(--red); }
  .rx li strong { font-weight: 400; background: var(--gold); padding: 0 3px; }

  details.science {
    margin-top: 18px;
    font-size: var(--fs-xs);

  details.science summary { cursor: pointer; color: var(--ink); text-transform: uppercase; }

  .actions {
    margin-top: 24px;
    display: flex;
    gap: 14px;
    flex-wrap: wrap;

  .star-ask { margin-top: 20px; font-size: var(--fs-s); color: var(--muted); line-height: 2; }

  .style-nav {
    text-align: center;
    padding: 18px 0 6px;
    font-size: var(--fs-xs);
    color: var(--muted);
    text-transform: uppercase;

  .style-nav a { color: var(--blue); }

  /* ---------- fx: square particle bursts ---------- */
  #fxLayer {
    position: fixed;
    inset: 0;
    z-index: 60;
    pointer-events: none;
    overflow: hidden;
  }
  #fxLayer i { position: absolute; display: block; }
  @keyframes goldflash {
    from {
      box-shadow:
        0 -3px 0 0 var(--gold),
        0 3px 0 0 var(--gold),
        -3px 0 0 0 var(--gold),
        3px 0 0 0 var(--gold),
        5px 5px 0 0 var(--shadow);
    }
  }
  .feedback.pop.gold {
    animation: fbpop 0.8s steps(6, end), goldflash 0.15s steps(2, end);
  }

  /* ---------- juice: screen shake, combo pulse, sound toggle ---------- */
  .hitshake { animation: hitshake 0.1s steps(2, end); }
  @keyframes hitshake {
    50% { transform: translate(2px, -2px); }
  }
  .hitshake-big { animation: hitshakeBig 0.16s steps(3, end); }
  @keyframes hitshakeBig {
    33% { transform: translate(4px, -3px) rotate(0.3deg); }
    66% { transform: translate(-4px, 3px) rotate(-0.3deg); }
  }
  #edgePulse {
    position: fixed;
    inset: 0;
    z-index: 55;
    pointer-events: none;
    box-shadow: inset 0 0 0 6px var(--gold);
    opacity: 0;
  }
  #edgePulse.pulse { animation: edgepulse 0.45s steps(3, end); }
  @keyframes edgepulse { 0% { opacity: 1; } 100% { opacity: 0; } }
  .streak.wobble { animation: chipwob 0.25s steps(2, end); }
  @keyframes chipwob {
    25% { transform: scale(1.35) rotate(-4deg); }
    75% { transform: scale(1.25) rotate(4deg); }
  }
  .snd-toggle {
    font-family: inherit;
    font-size: var(--fs-xs);
    background: transparent;
    color: var(--white);
    border: 2px solid var(--muted);
    padding: 3px 8px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;

      if (!on) return;
      const c = ensure();
      if (!c) return;

        const o = c.createOscillator(), g = c.createGain();

        o.frequency.setValueAtTime(freq, t0);

        o.start(t0);
        o.stop(t0 + dur / 1000 + 0.02);
      } catch {}

  function drawSprite(ctx, grid, scale, ox = 0, oy = 0, pal = PAL.balanced) {
    const n = grid.length;
    for (let y = 0; y < n; y++) for (let x = 0; x < n; x++) {
      const v = grid[y][x];
      if (v === '0') continue;
      ctx.fillStyle = pal[+v] || pal[1];
      ctx.fillRect(ox + x * scale, oy + y * scale, scale, scale);
    }
  }
  function spriteScale(grid, base16) {
    return Math.max(1, Math.round(base16 * 16 / grid.length));
  }
  function paintSprite(cv, grid, scale, pal) {
    cv.width = cv.height = grid.length * scale;
    const g = cv.getContext('2d');
    g.clearRect(0, 0, cv.width, cv.height);
    drawSprite(g, grid, scale, 0, 0, pal);
  }

  /* ---------- fx: square particle bursts (game juice) ---------- */
  const REDUCED_MOTION = matchMedia('(prefers-reduced-motion: reduce)').matches;
  const FX_MAX = 30; // cap on live particle nodes
  const FX = {
    s1: ['#e04838'],
    s2: ['#3870c0'],
    s3: ['#f8b830'],
    mix: ['#e04838', '#f8b830', '#3870c0'],
  };
  const fxLayer = document.createElement('div');
  fxLayer.id = 'fxLayer';
  document.body.appendChild(fxLayer);
  function burst(el, palette) {
    if (REDUCED_MOTION || !el || !el.isConnected) return;
    const r = el.getBoundingClientRect();
    const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
    const n = 10 + Math.floor(Math.random() * 5); // 10-14 squares
    for (let i = 0; i < n; i++) {
      if (fxLayer.childElementCount >= FX_MAX) break;
      const p = document.createElement('i');
      const size = 4 + Math.floor(Math.random() * 4); // 4-7px
      p.style.left = `${cx - size / 2}px`;
      p.style.top = `${cy - size / 2}px`;
      p.style.width = `${size}px`;
      p.style.height = `${size}px`;
      p.style.background = palette[i % palette.length];
      fxLayer.appendChild(p);
      const ang = Math.random() * Math.PI * 2;
      const dist = 50 + Math.random() * 70; // 50-120px
      const dx = Math.cos(ang) * dist;
      const dy = Math.sin(ang) * dist + 18; // slight gravity
      const anim = p.animate(
        [
          { transform: 'translate(0, 0)', opacity: 1 },
          { transform: `translate(${dx}px, ${dy}px)`, opacity: 0 },
        ],
        { duration: 300 + Math.random() * 200, easing: 'steps(4, end)', fill: 'forwards' }
      );
      anim.onfinish = () => p.remove();
      anim.oncancel = () => p.remove();
    }
  }

  /* ---------- juice: hit-stop, screen shake, damage numbers, shockwave ---------- */
  const hitStop = () => REDUCED_MOTION ? Promise.resolve() : sleep(50); // impact pause
  function shakeGame(big) {
    if (REDUCED_MOTION) return;
    const g = screens.game;
    g.classList.remove('hitshake', 'hitshake-big');
    void g.offsetWidth;
    g.classList.add(big ? 'hitshake-big' : 'hitshake');
  }
  function floatNum(el, text, topTier) {
    if (REDUCED_MOTION || !el || !el.isConnected) return;
    if (fxLayer.childElementCount >= FX_MAX) return;
    const r = el.getBoundingClientRect();
    const s = document.createElement('span');
    s.textContent = text;
    s.style.cssText = `position:absolute;left:${r.left + r.width / 2}px;top:${r.top + r.height * 0.25}px;` +
      `font-family:"Press Start 2P",monospace;white-space:nowrap;pointer-events:none;` +
      (topTier
        ? `font-size:18px;color:var(--gold);text-shadow:2px 0 0 var(--ink),-2px 0 0 var(--ink),0 2px 0 var(--ink),0 -2px 0 var(--ink),2px 2px 0 var(--ink),-2px -2px 0 var(--ink),2px -2px 0 var(--ink),-2px 2px 0 var(--ink);`
        : `font-size:12px;color:var(--ink);text-shadow:1px 1px 0 var(--paper);`);
    fxLayer.appendChild(s);
    const a = s.animate(
      [
        { transform: 'translate(-50%, 0)', opacity: 1 },
        { transform: 'translate(-50%, -36px)', opacity: 0 },
      ],
      { duration: 500, easing: 'steps(6, end)', fill: 'forwards' }
    );
    a.onfinish = () => s.remove();
    a.oncancel = () => s.remove();
  }
  function shockwave(el, color) {
    if (REDUCED_MOTION || !el || !el.isConnected) return;
    if (fxLayer.childElementCount >= FX_MAX) return;
    const r = el.getBoundingClientRect();
    const d = document.createElement('div');
    d.style.cssText = `position:absolute;left:${r.left}px;top:${r.top}px;width:${r.width}px;` +
      `height:${r.height}px;border:4px solid ${color};pointer-events:none;`;
    fxLayer.appendChild(d);
    const a = d.animate(
      [
        { transform: 'scale(1)', opacity: 1 },
        { transform: 'scale(1.6)', opacity: 0 },
      ],
      { duration: 350, easing: 'steps(5, end)', fill: 'forwards' }
    );
    a.onfinish = () => d.remove();
    a.oncancel = () => d.remove();
  }
  const edgePulse = document.createElement('div');
  edgePulse.id = 'edgePulse';
  document.body.appendChild(edgePulse);
  function comboEdge() {
    if (REDUCED_MOTION) return;

  function bumpStreak(good) {
    streakN = good ? streakN + 1 : 0;
    const el = $('streak');
    if (streakN >= 2) {
      el.textContent = `${t('streakWord')} ×${streakN}`;
      el.style.transform = `scale(${(1 + 0.06 * Math.min(streakN, 6)).toFixed(2)})`;
      el.classList.remove('show', 'wobble'); void el.offsetWidth; el.classList.add('show');
      if (streakN === 3 || streakN === 5 || streakN === 8) { // milestone!
        if (!REDUCED_MOTION) el.classList.add('wobble');
        comboEdge();
        SND.combo();
      }
    } else {
      el.classList.remove('show', 'wobble');
      el.style.transform = '';
    }
  }
  function gradeOf(table, rt) {
    for (const [max, label] of table) if (rt < max) return label;
  }
  function stageCard(idx) {
    return new Promise(res => {
      const [k, h, p] = t('stageIntro')[idx];
      arena.innerHTML = `<div class="stage-card win">
        <div class="k">${k}</div>
        <div class="dlg-typed"><h2>${h}</h2><p>${p}</p></div>
        <button class="btn" id="stageGo">▶ ${t('press')}</button>
        <span class="cont-arrow">▼</span></div>`;
      // quiet typewriter ticks paced to the .dlg-typed clip animation (24 steps / 0.9s)
      for (let i = 0; i < 8; i++) setTimeout(() => SND.tick(), 60 + i * 112);
      const onSpace = e => {
        if (e.code !== 'Space' || e.repeat) return;
        e.preventDefault();
        $('stageGo').click();
      };
      document.addEventListener('keydown', onSpace);
      $('stageGo').addEventListener('click', () => {
        document.removeEventListener('keydown', onSpace);
        res();
      }, { once: true });
    });
  }
  async function stamp(idx, score) {
    const lines = t('stampLines')[idx];
    const line = score >= 75 ? lines[0] : score >= 55 ? lines[1] : lines[2];
    const el = document.createElement('div');
    el.className = 'stamp-overlay';
    el.innerHTML = `<div class="stamp win">

      <div class="s-clear">${t('clear')}</div>
      <div class="s-score">${score}</div>
      <div class="s-line">${line}</div></div>`;
    $('game').appendChild(el);
    buzz([20, 40, 20]);
    SND.clear();
    await sleep(1500);
    el.remove();
  }

  /* ---------- stage 1: alerting ---------- */
  async function stage1() {
    const TRIALS = 5;
    data.s1 = []; data.s1false = 0; streakN = 0;
    hud(0, 0, TRIALS);
    await stageCard(0);
    for (let i = 0; i < TRIALS; i++) {
      hud(0, i, TRIALS);
      arena.innerHTML = `<div class="signal-ring" id="ring">${t('waiting')}</div>`;
      const ring = $('ring');
      let fired = false, t0 = 0;
      const rt = await new Promise(res => {
        let timer = setTimeout(fire, 900 + Math.random() * 1600);
        function fire() {
          fired = true;
          ring.classList.add('go');
          ring.textContent = t('go');
          shockwave(ring, '#e04838');
          t0 = performance.now();
        }
        function onTap(e) {
          if (e.type === 'keydown' && (e.code !== 'Space' || e.repeat)) return;
          e.preventDefault();
          if (!fired) {                       // false start
            data.s1false++;
            clearTimeout(timer);
            ring.classList.add('shake');
            SND.falseStart();
            feedback(t('falseStart'), false);
            bumpStreak(false);
            setTimeout(() => {
              ring.classList.remove('shake');
              timer = setTimeout(fire, 1200 + Math.random() * 1600);
            }, 500);
            return;
          }
          cleanup();
          res(performance.now() - t0);
        }
        function cleanup() {
          arena.removeEventListener('pointerdown', onTap);
          document.removeEventListener('keydown', onTap);
        }
        arena.addEventListener('pointerdown', onTap);
        document.addEventListener('keydown', onTap);
      });
      data.s1.push(rt);
      const good = rt < 450;
      const top = rt < 250;
      if (good) {
        await hitStop();               // impact pause before the pop
        if (top) SND.top(); else SND.good();
        shakeGame(top);
        burst(ring, FX.s1);
        floatNum(ring, `${Math.round(rt)}ms`, top);
      } else SND.bad();
      bumpStreak(good);
      feedback(`<span class="ms">${Math.round(rt)}ms</span> ${gradeOf(t('s1grades'), rt)}`, good, top);
      hud(0, i + 1, TRIALS);
      await sleep(750);
    }
    const s = scoreAlerting();
    await stamp(0, s);
  }

  /* ---------- stage 2: orienting ---------- */
  async function stage2() {
    const TRIALS = 5, CELLS = 12;
    data.s2 = []; data.s2wrong = 0; streakN = 0;
    hud(1, 0, TRIALS);
    await stageCard(1);
    for (let i = 0; i < TRIALS; i++) {
      hud(1, i, TRIALS);
      const target = Math.floor(Math.random() * CELLS);
      arena.innerHTML = `<div class="search-grid">` +
        Array.from({ length: CELLS }, (_, k) => {
          const rot = [0, 90, 180, 270][Math.floor(Math.random() * 4)];
          const ch = k === target ? 'L' : 'T';
          return `<div class="search-cell" data-k="${k}">
            <span style="transform:rotate(${rot}deg)">${ch}</span></div>`;
        }).join('') + `</div>`;
      const t0 = performance.now();
      let wrongThis = 0, hitCell = null;
      const rt = await new Promise(res => {
        arena.querySelectorAll('.search-cell').forEach(cell => {
          cell.addEventListener('pointerdown', () => {
            if (+cell.dataset.k === target) { hitCell = cell; res(performance.now() - t0); }
            else {
              wrongThis++; data.s2wrong++;
              cell.classList.add('wrong');
              SND.bad();
              buzz(30);
            }
          });
        });
      });
      data.s2.push(rt + wrongThis * 300);   // wrong taps cost
      const good = rt < 2400 && wrongThis === 0;
      const top = good && rt < 1000;
      if (good) {
        await hitStop();
        if (top) SND.top(); else SND.good();
        shakeGame(top);
        burst(hitCell, FX.s2);
        floatNum(hitCell, `${(rt / 1000).toFixed(2)}s`, top);
      } else SND.beep(440, 60, 'square', 0.04); // found it, but slow / after misses
      bumpStreak(good);
      feedback(`<span class="ms">${(rt / 1000).toFixed(2)}s</span> ${gradeOf(t('s2grades'), rt)}`, good, top);
      hud(1, i + 1, TRIALS);
      await sleep(750);
    }
    const s = scoreOrienting();
    await stamp(1, s);
  }

  /* ---------- stage 3: executive (flanker) ---------- */
  async function stage3() {
    const TRIALS = 8;
    data.s3 = []; streakN = 0;
    hud(2, 0, TRIALS);
    await stageCard(2);
    const conds = [1, 1, 1, 1, 0, 0, 0, 0].sort(() => Math.random() - 0.5); // 1=incongruent
    const lr = document.createElement('div');
    lr.className = 'lr-buttons';
    lr.innerHTML = `<button data-d="L">←</button><button data-d="R">→</button>`;
    const hint = document.createElement('div');
    hint.className = 'lr-hint';
    hint.textContent = t('lrHint');
    $('game').append(hint, lr);
    for (let i = 0; i < TRIALS; i++) {
      hud(2, i, TRIALS);
      const incong = conds[i];
      const dir = Math.random() < 0.5 ? 'L' : 'R';
      const c = dir === 'L' ? '←' : '→';
      const f = incong ? (dir === 'L' ? '→' : '←') : c;
      arena.innerHTML = `<div class="flanker-wrap"><div class="fixation">+</div></div>`;
      await sleep(400 + Math.random() * 300);
      arena.innerHTML = `<div class="flanker-wrap"><div class="arrows">${f}${f}${c}${f}${f}</div></div>`;
      const t0 = performance.now();
      const ans = await new Promise(res => {
        const to = setTimeout(() => { cleanup(); res(null); }, 1600);
        function onKey(e) {
          if (e.key === 'ArrowLeft') done('L');
          else if (e.key === 'ArrowRight') done('R');
        }
        function onBtn(e) {
          const b = e.target.closest('button[data-d]');
          if (b) done(b.dataset.d);
        }
        function done(d) { clearTimeout(to); cleanup(); res(d); }
        function cleanup() {
          document.removeEventListener('keydown', onKey);
          lr.removeEventListener('pointerdown', onBtn);
        }
        document.addEventListener('keydown', onKey);
        lr.addEventListener('pointerdown', onBtn);
      });
      const rt = performance.now() - t0;
      const correct = ans === dir;
      data.s3.push({ incong, rt: ans ? rt : 1600, correct });
      if (!ans) { SND.bad(); bumpStreak(false); feedback(t('s3miss'), false); }
      else if (!correct) { SND.bad(); bumpStreak(false); feedback(t('s3bad'), false); }
      else {
        await hitStop();
        if (incong) SND.top(); else SND.good();
        shakeGame(!!incong);
        const arrowsEl = arena.querySelector('.arrows');
        burst(arrowsEl, FX.s3);
        floatNum(arrowsEl, `${Math.round(rt)}ms`, !!incong);
        bumpStreak(true);
        feedback(`<span class="ms">${Math.round(rt)}ms</span> ${incong ? t('s3okHard') : t('s3ok')}`, true, !!incong);
      }
      hud(2, i + 1, TRIALS);
      await sleep(700);
    }
    hint.remove(); lr.remove();
    const s = scoreExecutive();
    await stamp(2, s);
  }

  /* ================= scoring (docs/SCIENCE.md) ================= */
  const median = a => {
    const s = [...a].sort((x, y) => x - y);
    return s.length ? (s[s.length >> 1] + s[(s.length - 1) >> 1]) / 2 : 0;
  };
  const logistic = (x, mid, k) => Math.round(100 / (1 + Math.exp((x - mid) / k)));
  const clamp100 = v => Math.max(1, Math.min(99, v));

  function scoreAlerting() {
    const rt = median(data.s1);
    return clamp100(logistic(rt, 350, 55) - data.s1false * 6);
  }
  function scoreOrienting() {
    const rt = median(data.s2);
    return clamp100(logistic(rt, 1500, 380));
  }
  function scoreExecutive() {
    const cong = data.s3.filter(x => !x.incong && x.correct).map(x => x.rt);
    const inc = data.s3.filter(x => x.incong && x.correct).map(x => x.rt);
    const cost = (inc.length && cong.length) ? Math.max(0, median(inc) - median(cong)) : 250;
    const errors = data.s3.filter(x => !x.correct).length;
    return clamp100(Math.round(logistic(cost, 115, 42) * Math.max(0.3, 1 - errors * 0.13)));
  }

  function analyze() {
    const a = scoreAlerting(), o = scoreOrienting(), e = scoreExecutive();
    const scores = [a, o, e];
    const overall = Math.round(a * 0.3 + o * 0.3 + e * 0.4);
    const mx = Math.max(...scores), mn = Math.min(...scores);
    let type;
    if (mn >= 75) type = 'commander';
    else if ((mx + mn) / 2 < 50 && mx < 60) type = 'wanderer';
    else if (mx - mn <= 12) type = 'balanced';
    else type = ['cheetah', 'hawkeye', 'fortress'][scores.indexOf(mx)];
    const cong = data.s3.filter(x => !x.incong && x.correct).map(x => x.rt);
    const inc = data.s3.filter(x => x.incong && x.correct).map(x => x.rt);
    return {
      scores, overall, type,
      weakest: scores.indexOf(mn),
      strongest: scores.indexOf(mx),
      s1rt: Math.round(median(data.s1)) || 0,
      s2rt: Math.round(median(data.s2)) || 0,
      s3cost: (inc.length && cong.length) ? Math.round(Math.max(0, median(inc) - median(cong))) : 0,
      s3acc: Math.round(100 * data.s3.filter(x => x.correct).length / Math.max(1, data.s3.length)),
    };
  }

  /* ================= results ================= */
  /* HP color rule: >50 green · >25 yellow · else red */
  const hpClass = s => s > 50 ? 'g' : s > 25 ? 'y' : 'r';
  const hpHex = s => s > 50 ? '#48d068' : s > 25 ? '#f8d030' : '#e04838';

  /* HP status window: segmented bars, colored by value
     (name kept so call sites stay identical) */
  function radarSVG(scores, size = 220) {
    const labels = STR[lang].stageEn;
    return `<div class="bars-win">` + scores.map((s, i) => {
      const filled = Math.round(s / 5);
      const cls = hpClass(s);
      return `<div class="hp-row">
        <span class="hp-label">${labels[i]}</span>
        <span class="hp-blocks">${Array.from({ length: 20 },
          (_, k) => `<i${k < filled ? ` class="on ${cls}"` : ''}></i>`).join('')}</span>
        <span class="hp-num">${s}</span>
      </div>`;
    }).join('') + `</div>`;
  }

  function renderResults(an) {
    const [aName, aTag] = t('archetypes')[an.type];
    $('archetype').textContent = aName;
    $('archetypeTag').textContent = aTag;
    paintSprite($('spriteCanvas'), SPRITES[an.type], spriteScale(SPRITES[an.type], 9), PAL[an.type]);
    const subs = t('netSub');
    const subVals = [subs[0](an.s1rt), subs[1](an.s2rt), subs[2](an.s3cost, an.s3acc)];
    $('networks').innerHTML = an.scores.map((s, i) => `
      <div class="net-row">
        <div class="net-top">
          <span class="nm">${t('stageNames')[i]}${lang === 'zh' ? `<small>${STR[lang].stageEn[i]}</small>` : ''}</span>
          <span class="sc">${s}</span>
        </div>
        <div class="net-sub">${subVals[i]}</div>
        <div class="net-rank">${t('beat')(s)}</div>
      </div>`).join('');
    $('radarBox').innerHTML = radarSVG(an.scores);

    const rx = t('rx');
    const weakKey = ['alerting', 'orienting', 'executive'][an.weakest];
    $('rxList').innerHTML = [
      rx[weakKey],
      rx.strength(t('stageNames')[an.strongest]),
      rx.universal,
    ].map(x => `<li><span>${x}</span></li>`).join('');
    applyLangStatics();
  }
  function applyLangStatics() {
    document.querySelectorAll('[data-i18n]').forEach(el => { el.innerHTML = t(el.dataset.i18n); });
    $('downloadBtn').textContent = t('dl');
    $('copyBtn').textContent = t('copy');
    $('saveCodeBtn').textContent = t('saveCode');
    $('retryBtn').textContent = t('retry');
    $('copiedNote').textContent = t('copied');
    $('sciBody').textContent = t('sci');
    $('starAsk').innerHTML = t('starAsk') + `<a href="https://${REPO}" target="_blank" rel="noopener">${REPO}</a>`;
  }

  /* ---------- orchestrated results reveal (game path only; ?debug&mock and the
     lang toggle call renderResults directly and stay instant) ---------- */
  async function revealResults(an) {
    renderResults(an);
    show('results');
    if (REDUCED_MOTION) { SND.fanfare(); return; }
    const sprite = $('spriteCanvas');
    const nameEls = [$('archetype'), $('archetypeTag'), document.querySelector('.lv')];
    const rankEls = [...document.querySelectorAll('#networks .net-rank')];
    const barData = [...document.querySelectorAll('#radarBox .hp-row')].map((row, i) => ({
      blocks: [...row.querySelectorAll('.hp-blocks i')],
      num: row.querySelector('.hp-num'),
      score: an.scores[i],
    }));
    // blank the pieces before first paint, then reveal in sequence (< 2.5s total)
    nameEls.forEach(el => { if (el) el.style.visibility = 'hidden'; });
    rankEls.forEach(el => { el.style.visibility = 'hidden'; });
    barData.forEach(b => {
      b.blocks.forEach(bl => { bl.className = ''; });
      b.num.textContent = '0';
    });
    // (a) sprite hatches with a steps-scale bounce
    sprite.animate(
      [
        { transform: 'scale(0)' },
        { transform: 'scale(1.25)' },
        { transform: 'scale(0.9)' },
        { transform: 'scale(1)' },
      ],
      { duration: 380, easing: 'steps(4, end)' }
    );
    SND.beep(660, 50);
    SND.beep(990, 70, 'square', 0.05, 0.08);
    await sleep(420);
    // (b) HP bars fill with rising ticks, numbers counting up, 250ms stagger
    await Promise.all(barData.map((b, i) => (async () => {
      await sleep(i * 250);
      const filled = Math.round(b.score / 5);
      const cls = hpClass(b.score);
      for (let k = 0; k < filled; k++) {
        if (!b.blocks[k]) break;
        b.blocks[k].className = `on ${cls}`;
        b.num.textContent = String(Math.round(b.score * (k + 1) / filled));
        if (k % 3 === 0) SND.beep(500 + i * 120 + k * 45, 25, 'square', 0.03);
        await sleep(20);
      }
      b.num.textContent = String(b.score);
    })()));
    // (c) rank chips stamp in with a thud
    await sleep(120);
    SND.thud();
    rankEls.forEach(el => {
      el.style.visibility = '';
      el.animate(
        [{ transform: 'scale(1.6)', opacity: 0 }, { transform: 'scale(1)', opacity: 1 }],
        { duration: 200, easing: 'steps(3, end)' }
      );
    });
    // (d) archetype name + tagline land last, with the fanfare
    await sleep(250);
    nameEls.forEach(el => {
      if (!el) return;
      el.style.visibility = '';
      el.animate([{ opacity: 0 }, { opacity: 1 }], { duration: 220, easing: 'steps(3, end)' });
    });
    SND.fanfare();
  }

  /* ================= share card: collectible trainer card ================= */
  async function drawCard(an) {
    await document.fonts.load('20px "Press Start 2P"').catch(() => {});
    await document.fonts.load('20px "DotGothic16"').catch(() => {});
    if (lang === 'zh') await document.fonts.load('700 20px "Noto Sans SC"').catch(() => {});
    const c = $('cardCanvas'), x = c.getContext('2d');
    const W = c.width, H = c.height;
    const PAPER = '#f8f8f0', WHITE = '#ffffff', RED = '#e04838',
          GOLD = '#f8b830', PANEL = '#e8e8e0', MUTED = '#706890';
    const LATIN = s => `${s}px "Press Start 2P"`;
    const PX = s => lang === 'zh' ? `${s}px "DotGothic16","Noto Sans SC","Press Start 2P"` : LATIN(s);

    x.fillStyle = PAPER; x.fillRect(0, 0, W, H);
    // white card with double navy frame
    x.fillStyle = INK; x.fillRect(24, 24, W - 48, H - 48);
    x.fillStyle = WHITE; x.fillRect(36, 36, W - 72, H - 72);
    x.fillStyle = INK; x.fillRect(48, 48, W - 96, H - 96);
    x.fillStyle = WHITE; x.fillRect(52, 52, W - 104, H - 104);

    x.textAlign = 'center';
    // header
    x.fillStyle = INK; x.font = LATIN(34);
    x.fillText('ATTENTION-OS', W / 2, 150);
    x.fillStyle = MUTED; x.font = PX(lang === 'zh' ? 32 : 22);
    x.fillText(t('cardKicker'), W / 2, 206);

    // red banner with archetype name in white
    const [aName, aTag] = t('archetypes')[an.type];
    x.fillStyle = RED; x.fillRect(84, 244, W - 168, 112);
    x.fillStyle = WHITE;
    x.font = lang === 'zh' ? '700 64px "Noto Sans SC","DotGothic16"' : LATIN(42);
    x.fillText(aName, W / 2, lang === 'zh' ? 324 : 318);

    // big colored sprite on a square gray pedestal
    x.fillStyle = INK; x.fillRect(W / 2 - 172, 396, 344, 344);
    x.fillStyle = PANEL; x.fillRect(W / 2 - 164, 404, 328, 328);
    const grid = SPRITES[an.type];
    const S = spriteScale(grid, 17), sw = grid.length * S;
    drawSprite(x, grid, S, (W - sw) / 2, 404 + (328 - sw) / 2, PAL[an.type]);

    // rank chip in gold
    x.font = PX(lang === 'zh' ? 30 : 24);
    const rankTxt = t('cardBeat')(an.overall);
    const tw = x.measureText(rankTxt).width;
    x.fillStyle = GOLD; x.fillRect(W / 2 - tw / 2 - 24, 748, tw + 48, 60);
    x.fillStyle = INK; x.fillText(rankTxt, W / 2, 790);

    // three HP bars, colored by value rule
    const labels = STR[lang].stageEn;
    const bx = 130, bw = W - 260;
    const cellW = 33, cellGap = Math.floor((bw - 20 * cellW) / 19); // 20 blocks
    let y = 890;
    for (let i = 0; i < 3; i++) {
      const s = an.scores[i];
      const filled = Math.round(s / 5);
      const col = hpHex(s);
      x.fillStyle = INK; x.font = LATIN(24); x.textAlign = 'left';
      x.fillText(labels[i], bx, y);
      x.textAlign = 'right';
      x.fillText(String(s), W - bx, y);
      for (let k = 0; k < 20; k++) {
        x.fillStyle = k < filled ? col : PANEL;
        x.fillRect(bx + k * (cellW + cellGap), y + 20, cellW, 36);
      }
      y += 112;
    }
    x.textAlign = 'center';

    // tagline — wrap to width
    x.fillStyle = INK;
    x.font = lang === 'zh' ? '40px "DotGothic16","Noto Sans SC"' : LATIN(20);
    const lh = lang === 'zh' ? 56 : 40;
    const maxW = W - 240;
    const words = lang === 'zh' ? [...aTag] : aTag.split(' ');
    const joiner = lang === 'zh' ? '' : ' ';
    let line = '', ty = 1226;
    for (const w of words) {
      const test = line ? line + joiner + w : w;
      if (x.measureText(test).width > maxW && line && !'。，！？；、）”'.includes(w)) {
        x.fillText(line, W / 2, ty); ty += lh; line = w;
      } else line = test;
    }
    if (line) { x.fillText(line, W / 2, ty); ty += lh; }

    // footer
    x.fillStyle = INK; x.fillRect(120, 1300, W - 240, 6);
    x.font = PX(lang === 'zh' ? 32 : 22); x.fillStyle = INK;
    x.fillText(t('cardFooter'), W / 2, 1352);
    x.font = LATIN(16); x.fillStyle = MUTED;
    x.fillText(REPO, W / 2, 1386);
    x.textAlign = 'left';
    return c;
  }

  $('downloadBtn').addEventListener('click', async () => {
    const c = await drawCard(analysis);
    const a = document.createElement('a');
    a.download = `attention-type-${analysis.overall}.png`;
    a.href = c.toDataURL('image/png');
    a.click();
  });
  $('copyBtn').addEventListener('click', async () => {
    const [aName] = t('archetypes')[analysis.type];
    try { await navigator.clipboard.writeText(t('share')(aName, analysis.scores, analysis.overall)); } catch {}
    $('copiedNote').classList.add('show');
    setTimeout(() => $('copiedNote').classList.remove('show'), 2200);
  });
  // Attention Profile v1 save code (docs/TIERS.md) — the desktop pet imports this
  function makeSaveCode(an) {
    const p = { v: 1, ts: new Date().toISOString(), type: an.type,
      scores: { alerting: an.scores[0], orienting: an.scores[1], executive: an.scores[2] },
      raw: { s1rt: an.s1rt, s2rt: an.s2rt, s3cost: an.s3cost, s3acc: an.s3acc }, lang };
    return 'attn1.' + btoa(JSON.stringify(p)).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  }
  $('saveCodeBtn').addEventListener('click', async () => {
    try { await navigator.clipboard.writeText(makeSaveCode(analysis)); } catch {}
    $('copiedNote').classList.add('show');
    setTimeout(() => $('copiedNote').classList.remove('show'), 2200);
  });

  /* ================= flow ================= */
  async function run() {
    show('game');
    await stage1();
    await stage2();
    await stage3();
    analysis = analyze();
    await revealResults(analysis);
  }
  $('startBtn').addEventListener('click', run);
  $('retryBtn').addEventListener('click', run);
  document.addEventListener('keydown', e => {
    if (e.code === 'Space' && screens.game.classList.contains('active')) e.preventDefault();
  });

  applyLang();

  /* debug hooks: ?debug&mock jumps to results; ?debug&pose=1|2|3 shows a frozen stage */
  if (qs.has('debug')) {
    window.__mock = (over = {}) => {
      analysis = Object.assign({
        scores: [78, 64, 88], overall: 78, type: 'fortress',
        weakest: 1, strongest: 2, s1rt: 287, s2rt: 1340, s3cost: 62, s3acc: 100,
      }, over);
      renderResults(analysis); show('results');
    };
    if (qs.has('mock')) window.__mock();
    const pose = +qs.get('pose');
    if (pose) {
      show('game');
      if (pose === 1) {
        hud(0, 2, 5);
        arena.innerHTML = `<div class="signal-ring go">${t('go')}</div>`;
        feedback(`<span class="ms">243ms</span> ${gradeOf(t('s1grades'), 243)}`, false);
        fb.style.opacity = 1; fb.classList.remove('pop');
      } else if (pose === 2) {
        hud(1, 1, 5);
        arena.innerHTML = `<div class="search-grid">` +
          Array.from({ length: 12 }, (_, k) => {
            const rot = [0, 90, 180, 270][k % 4];
            return `<div class="search-cell"><span style="transform:rotate(${rot}deg)">${k === 7 ? 'L' : 'T'}</span></div>`;
          }).join('') + `</div>`;
      } else if (pose === 3) {
        hud(2, 3, 8);
        arena.innerHTML = `<div class="flanker-wrap"><div class="arrows">→→←→→</div></div>`;
        const lr = document.createElement('div');
        lr.className = 'lr-buttons';
        lr.innerHTML = `<button>←</button><button>→</button>`;
        const hint = document.createElement('div');
        hint.className = 'lr-hint'; hint.textContent = t('lrHint');
        $('game').append(hint, lr);
      }
    }
  }
})();
</script>
