<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>AttentionOS</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: transparent; overflow: hidden; height: 100%; }
  body {
    font-family: "Courier New", monospace;
    user-select: none;
    -webkit-user-select: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    height: 100%;
    padding-bottom: 6px;
  }
  #petCanvas {
    image-rendering: pixelated;
    cursor: grab;
    filter: drop-shadow(2px 3px 0 rgba(48,40,72,0.25));
    transition: opacity 0.6s;
  }
  #petCanvas:active { cursor: grabbing; }
  #nameTag {
    position: fixed;
    left: 50%; top: 128px;
    transform: translateX(-50%);
    font-size: 9px; font-weight: bold; letter-spacing: 1px;
    color: rgba(48, 40, 72, 0.75);
    background: rgba(248, 248, 240, 0.7);
    border-radius: 6px;
    padding: 1px 7px;
    opacity: 0;
    transition: opacity 0.3s;
    user-select: none;
    pointer-events: none;
  }
  /* the "be right back" sign: a translucent plaque hanging off the RIGHT
     screen edge — bordered on the desktop-facing side, flush on the edge side */
  #dockTab {
    position: fixed;
    left: 0; top: 50%;
    transform: translateY(-50%);
    width: 26px; height: 74px;
    background: rgba(248, 248, 240, 0.55);
    border: 1.5px solid rgba(48, 40, 72, 0.55);
    border-right: none;
    border-radius: 4px 0 0 4px;
    display: none;
    cursor: grab;
    align-items: center;
    justify-content: flex-start;
    flex-direction: column;
    gap: 3px;
    padding-top: 3px;
    transition: background 0.2s, border-color 0.2s;
    backdrop-filter: blur(1.5px);
    touch-action: none;
  }
  #dockTab:active { cursor: grabbing; }
  #dockTab.show { display: flex; }
  #dockTab:hover { background: rgba(248, 248, 240, 0.9); border-color: #302848; }
  #dockTab::before {                       /* hanging strap */
    content: "";
    width: 2px; height: 6px;
    background: rgba(48, 40, 72, 0.5);
  }
  #tabIcon { image-rendering: pixelated; opacity: 0.8; }
  #dockTab span {
    font-size: 7px; font-weight: bold; letter-spacing: 1px;
    color: rgba(48, 40, 72, 0.7);
    writing-mode: vertical-rl;
  }

  /* radial action ring — game-style hover menu around the pet */
  #ring { position: fixed; inset: 0; pointer-events: none; }
  .ring-btn {
    position: absolute;
    width: 32px; height: 32px;
    background: rgba(255, 255, 255, 0.92);
    border: 1px solid rgba(48, 40, 72, 0.22);
    border-radius: 50%;
    box-shadow: 0 2px 10px rgba(48, 40, 72, 0.20);
    backdrop-filter: blur(4px);
    color: #302848;
    font-size: 13px; line-height: 1;
    display: grid; place-items: center;
    cursor: pointer;
    pointer-events: none;                 /* invisible buttons must not eat hover */
    opacity: 0;
    transform: scale(0.4);
    transition: opacity 0.22s cubic-bezier(0.22,1,0.36,1), transform 0.22s cubic-bezier(0.22,1,0.36,1);
    user-select: none;
  }
  #ring.show .ring-btn { opacity: 1; transform: scale(1); pointer-events: auto; }
  #ring.show .ring-btn:nth-child(2) { transition-delay: 0.035s; }
  #ring.show .ring-btn:nth-child(3) { transition-delay: 0.07s; }
  #ring.show .ring-btn:nth-child(4) { transition-delay: 0.105s; }
  .ring-btn:hover {
    background: #fff;
    border-color: rgba(48, 40, 72, 0.5);
    box-shadow: 0 3px 14px rgba(48, 40, 72, 0.3);
    transform: scale(1.12);
  }
  .ring-btn:active { transform: scale(0.95); }
  .ring-ico { width: 16px; height: 16px; image-rendering: pixelated; }
  #bubble {
    background: rgba(255, 255, 255, 0.94);
    border: 1px solid rgba(48, 40, 72, 0.22);
    border-radius: 10px;
    box-shadow: 0 2px 10px rgba(48, 40, 72, 0.18);
    backdrop-filter: blur(4px);
    color: #302848;
    font-size: 10px;
    font-weight: bold;
    padding: 6px 9px;
    margin-bottom: 6px;
    max-width: 170px;
    text-align: center;
    display: none;
  }
  #bubble.show { display: block; }
  #panel {
    position: fixed; inset: 0;
    background: #fff;
    border: 3px solid #302848;
    box-shadow: inset 0 0 0 2px #fff, inset 0 0 0 4px #302848;
    padding: 12px;
    display: none;
    flex-direction: column;
    gap: 6px;
    font-size: 10px;
    color: #302848;
  }
  #panel.show { display: flex; }
  #panel h3 {
    font-size: 10px; letter-spacing: 1px;
    background: #e04838; color: #fff;
    padding: 2px 6px; align-self: flex-start;
  }
  #panel .row { display: flex; justify-content: space-between; }
  #panel input {
    width: 100%; font-family: inherit; font-size: 9px;
    border: 2px solid #302848; padding: 3px;
  }
  #panel button {
    font-family: inherit; font-size: 10px; font-weight: bold;
    background: #e04838; color: #fff; border: 2px solid #302848;
    padding: 4px; cursor: pointer;
  }
  #panel .close { background: #f8f8f0; color: #302848; }
  #err { color: #e04838; font-size: 9px; min-height: 11px; }
</style>

      ctx.fillRect(ox + x * PS + shear, base - (N - y) * h + dy, PS, h + 0.5);

      const ty = base - N * PS / 2 + dy;

    if (t < 16) { px(zx, zy, INK, 2); px(zx + S, zy + S, INK); px(zx, zy + 2 * S, INK, 2); }
  }
  function fxSparkle(ox, top) {         // flow-state stars
    const spots = [[-3, 4], [17, 2], [-2, 12]];
    spots.forEach(([gx, gy], i) => {
      if ((frame + i * 4) % 12 < 6) {
        const cx = ox + gx * S, cy = top + gy * S;
        px(cx, cy - S, '#f8b830'); px(cx - S, cy, '#f8b830'); px(cx + S, cy, '#f8b830'); px(cx, cy + S, '#f8b830'); px(cx, cy, '#fff');
      }
    });
  }
  function fxSweat(ox, top) {           // sick sweat drop sliding down
    const t = (frame % 16) / 16;
    px(ox + 14 * S, top + 2 * S + t * 3 * S, '#3870c0');
  }
  function fxBang(ox, top) {            // frazzled "!"
    if (frame % 8 < 5) {
      const bx = ox + 7.5 * S, by = top - 4 * S;
      ctx.fillStyle = '#e04838';
      ctx.fillRect(bx, by, S, 2 * S);
      ctx.fillRect(bx, by + 2.6 * S, S, S);
    }
  }
  function fxHourglass(ox, top) {       // an agent is waiting on you
    const hx = ox - 4 * S, hy = top + 2 * S;
    const flip = frame % 16 < 8;        // sand up / sand down
    const P = (x, y, c) => { ctx.fillStyle = c; ctx.fillRect(hx + x * 3, hy + y * 3, 3, 3); };
    for (let x = 0; x < 5; x++) { P(x, 0, INK); P(x, 6, INK); }
    P(0, 1, INK); P(4, 1, INK); P(1, 2, INK); P(3, 2, INK); P(2, 3, INK);
    P(1, 4, INK); P(3, 4, INK); P(0, 5, INK); P(4, 5, INK);
    const sand = '#f8b830';
    if (flip) { P(1, 1, sand); P(2, 1, sand); P(3, 1, sand); P(2, 2, sand); }
    else { P(2, 4, sand); P(1, 5, sand); P(2, 5, sand); P(3, 5, sand); }
  }

  /* pixel glyphs for the ring buttons — crisp 12x12, drawn once */
  const ICONS = {
    menu: ['000000000000','000000000000','011111111110','011111111110','000000000000','011111111110','011111111110','000000000000','011111111110','011111111110','000000000000','000000000000'],
    moon: ['000000000000','000111110000','001110000000','011100000000','011000000000','011000000000','011000000000','011100000000','001110000000','000111110000','000000000000','000000000000'],
    persona: ['000011110000','000111111000','000111111000','000111111000','000011110000','000000000000','001111111100','011111111110','011111111110','011111111110','000000000000','000000000000'],
    dock: ['000000000110','000000000110','000001000110','000001100110','011111110110','011111110110','000001100110','000001000110','000000000110','000000000110','000000000000','000000000000'],
  };
  document.querySelectorAll('.ring-ico').forEach(el => {
    const grid = ICONS[el.dataset.ico];
    const c = el.getContext('2d');
    c.fillStyle = '#302848';
    for (let y = 0; y < 12; y++) for (let x = 0; x < 12; x++)
      if (grid[y][x] === '1') c.fillRect(x, y, 1, 1);
  });

  let sick = false;      // recovery-debt thermal throttling (Pro)
  let grabbed = 0;       // timestamp while the user is holding/dragging the pet
  let danceEnd = 0;      // frame until which the break choreography runs
  let quietUntil = 0;    // "知道了" — acknowledged, suppress the fuss for a while
  let agentWaiting = false, agentWaitSec = 0, agentAckUntil = 0, lastAgentNudge = 0;
  function breakDance() { danceEnd = frame + 26; }
  function tick() {
    frame++;
    const pal = PAL[species] || PAL.balanced;
    const grid = SPRITES[species] || SPRITES.balanced;
    let dy = 0, blink = false, sy = 1;
    let m = (sick && mood !== 'sleeping') ? 'sick' : mood;
    if (m === 'frazzled' && Date.now() < quietUntil) m = 'calm';   // acknowledged — stay quiet
    let burst = false;
    if (m === 'focused') {                                  // flow: joyful bounce w/ squash-stretch
      const b = Math.abs(Math.sin(frame / 4));
      dy = -b * 7;
      sy = 1 + (b - 0.5) * 0.1;
    } else if (m === 'frazzled') {
      // periodic short bursts, not a permanent tantrum — non-invasive even when alarmed
      burst = frame % 44 < 6;
      dy = burst ? (frame % 2 ? 1 : -1) * 2 : 1;
      if (!burst) blink = frame % 24 < 2;
    } else if (m === 'sleeping') {
      dy = 2; blink = true;
      sy = 1 + Math.sin(frame / 8) * 0.02;                  // slow breathing
    } else if (m === 'sick') {
      dy = 4; blink = frame % 10 < 5; sy = 0.96;            // droop
    } else if (FLOATERS.has(species)) {                     // calm ghost: it flies, it never lands
      blink = frame % 24 < 2;
      dy = Math.sin(frame / 6) * 3.5 - 3;
      sy = 1 + Math.sin(frame / 9) * 0.02;
    } else {                                                // calm: idle blink + occasional hop
      blink = frame % 24 < 2;
      const h = frame % 68;
      if (h < 3) sy = 0.9;                                  // wind-up squash
      else if (h < 8) { dy = -Math.sin((h - 3) / 5 * Math.PI) * 9; sy = 1.06; }
      else if (h < 10) sy = 0.94;                           // landing squash
      sy += Math.sin(frame / 10) * 0.015;                   // breathing
    }
    if (FLOATERS.has(species) && (m === 'focused' || m === 'frazzled')) dy -= 3; // never grounded
    // grabbed: squash, wide eyes, nervous little sway while being carried
    if (grabbed) {
      if (Date.now() - grabbed > 3000) { grabbed = 0; leanDir = 0; }
      else { sy = 0.9; blink = false; dy = -2; leanDir = Math.sin(frame / 1.5) * 0.5; }
    } else if (frame < danceEnd) {
      // break-time choreography: designed to catch the eye, not to shout
      const ph = 26 - (danceEnd - frame);
      if (ph < 8) { dy = -Math.abs(Math.sin(ph / 7 * Math.PI * 2)) * 11; sy = 1.06; }
      else if (ph < 20) { leanDir = Math.sin((ph - 8) / 2) * 0.9; dy = -2; }
      else leanDir = 0;
    }
    const { ox, top } = drawSprite(grid, pal, dy, blink, sy);
    if (frame < danceEnd && danceEnd - frame <= 6) fxSparkle(ox, top);   // finale sparkles
    if (m === 'sleeping') fxSleep(ox, top);
    else if (m === 'focused') fxSparkle(ox, top);
    else if (m === 'sick') fxSweat(ox, top);
    else if (m === 'frazzled' && burst) fxBang(ox, top);
    if (agentWaiting && Date.now() > agentAckUntil && m !== 'sleeping') fxHourglass(ox, top);
    // visibility follows engagement: full presence while you interact,
    // fading toward the desktop when left alone — unless it has something to say
    const ghosty = FLOATERS.has(species) ? 0.12 : 0;
    let op = (m === 'calm' || m === 'sleeping') ? 0.85 - ghosty : 1 - ghosty / 2;
    const engaged = grabbed || Date.now() - lastMove < 8000
      || panel.classList.contains('show') || ring.classList.contains('show')
      || bubble.classList.contains('show') || breakInvited || frame < danceEnd
      || m === 'frazzled' || m === 'sick'
      || (agentWaiting && Date.now() > agentAckUntil);   // a waiting agent is worth seeing
    if (!engaged) op *= 0.5;
    canvas.style.transition = engaged ? 'opacity 0.25s' : 'opacity 1.8s ease';
    canvas.style.opacity = op;
    // nameplate over the head: only while engaging, never under the ring/panel
    nameTag.style.opacity =
      (engaged && !ring.classList.contains('show') && !panel.classList.contains('show')) ? op : 0;
  }
  setInterval(tick, 140);

  /* ---- state loop ---- */
  const MOOD_ZH = { sleeping: '睡着了', calm: '平静', focused: '心流中', frazzled: '被切碎了!' };
  const bubble = document.getElementById('bubble');
  let lastMood = '';

  async function refresh() {
    try {
      const s = await invoke('get_state');
      mood = s.mood;
      document.getElementById('pMood').textContent = MOOD_ZH[s.mood] || s.mood;
      document.getElementById('pSwitch').textContent = s.switches_per_hr + ' 次';
      document.getElementById('pDeep').textContent = s.deep_focus_min + ' 分钟';
      if (s.mood !== lastMood) {
        lastMood = s.mood;
        if (s.mood === 'frazzled') say('切换太多了，我头晕…');
        else if (s.mood === 'focused') say('嘘——心流中');
      }
      // agent-wait messenger: the one interruption worth making —
      // but never inside your flow unless the agent has waited 10min+
      agentWaitSec = s.agent_wait_secs || 0;
      agentWaiting = (s.agents_waiting || 0) > 0 && agentWaitSec > 120;
      if (agentWaiting && Date.now() > agentAckUntil) {
        const protectFlow = s.mood === 'focused' && agentWaitSec < 600;
        if (!protectFlow && Date.now() - lastAgentNudge > 5 * 60 * 1000) {
          lastAgentNudge = Date.now();
          if (docked) peekOut();
          breakDance();
          const n = s.agents_waiting;
          say(n > 1 ? `${n} 个 agent 在等你，最久 ${Math.round(agentWaitSec / 60)} 分钟了`
                    : `Claude 等你 ${Math.round(agentWaitSec / 60)} 分钟了——去看看？`, 8000);
        }
      }
    } catch (e) { /* backend not ready yet */ }
  }
  function say(text, ms = 3500) {
    bubble.textContent = text;
    bubble.classList.add('show');
    setTimeout(() => bubble.classList.remove('show'), ms);
  }
  refresh();
  setInterval(refresh, 10000);

  // thermal check (recovery debt) — cheap cadence, expensive query
  async function thermal() {
    try {
      const r = await invoke('get_report', { offsetDays: 0 });
      const wasSick = sick;
      sick = r.recovery_debt >= 1.5;
      if (sick && !wasSick) say('过热保护中… 连续透支了，今天降频运行');
    } catch (e) {}
  }
  thermal();
  setInterval(thermal, 30 * 60 * 1000);

  /* ---- panel & import ---- */
  const panel = document.getElementById('panel');
  canvas.addEventListener('dblclick', () => panel.classList.add('show'));
  document.getElementById('closeBtn').addEventListener('click', () => panel.classList.remove('show'));
  document.getElementById('importBtn').addEventListener('click', async () => {
    const code = document.getElementById('codeInput').value;
    try {
      const p = await invoke('import_profile', { code });
      species = p.type || 'balanced';
      document.getElementById('err').textContent = '';
      panel.classList.remove('show');
      say(`领养成功！${species} 已上岗`);
    } catch (e) {
      document.getElementById('err').textContent = String(e);
    }
  });
  /* ---- radial action ring: hover the pet, actions appear around it ---- */
  const ring = document.getElementById('ring');
  let ringTimer = null;
  function showRing() {
    if (docked || panel.classList.contains('show')) return;
    clearTimeout(ringTimer);
    ring.classList.add('show');
  }
  function hideRing(delay = 250) {
    clearTimeout(ringTimer);
    ringTimer = setTimeout(() => ring.classList.remove('show'), delay);
  }
  canvas.addEventListener('mouseenter', showRing);
  ring.addEventListener('mouseenter', showRing);
  ring.addEventListener('mouseleave', () => hideRing(300));
  document.addEventListener('mouseleave', () => hideRing(100));
  canvas.addEventListener('mouseleave', () => hideRing(600));
  window.addEventListener('blur', () => hideRing(0));
  // watchdog: no cursor movement over the window for a while -> fold the ring
  let lastMove = Date.now();
  document.addEventListener('mousemove', () => { lastMove = Date.now(); });
  setInterval(() => {
    if (ring.classList.contains('show') && Date.now() - lastMove > 2500) ring.classList.remove('show');
  }, 800);

  document.getElementById('rbDash').addEventListener('click', () => {
    invoke('open_dashboard').catch(() => {});
    hideRing(0);
  });
  document.getElementById('rbCard').addEventListener('click', () => {
    panel.classList.add('show');
    hideRing(0);
  });

  // naming: default "Boo", editable in the panel, persisted locally
  const nameInput = document.getElementById('nameInput');
  nameInput.value = petName;
  nameInput.addEventListener('change', () => {
    const v = nameInput.value.trim();
    petName = v || 'Boo';
    nameInput.value = petName;
    localStorage.setItem('attn_pet_name', petName);
    applyName();
    say(`我叫 ${petName}！`, 2200);
  });

  /* ---- edge docking: the pet's default is to NOT steal your attention ----
     docked = only a 22px tab peeks from the screen edge; hover slides it out;
     flow auto-docks it (quiet guarding), frazzle undocks it (the mirror moment) */
  const TW = window.__TAURI__;
  const win = TW?.window?.getCurrentWindow ? TW.window.getCurrentWindow() : null;
  const dockTab = document.getElementById('dockTab');
  let docked = false, peeked = false, homePos = null, sliding = false;

  function drawTabIcon() {   // 1px-scale mini sprite on the hanging sign
    const el = document.getElementById('tabIcon');
    const grid = SPRITES[species] || SPRITES.ghost;
    const pal = PAL[species] || PAL.ghost;
    const N = grid.length;
    el.width = N; el.height = N;
    el.style.width = '16px'; el.style.height = '16px';
    const tc = el.getContext('2d');
    tc.clearRect(0, 0, N, N);
    for (let y = 0; y < N; y++) for (let x = 0; x < N; x++) {
      const v = +grid[y][x];
      if (!v) continue;
      tc.fillStyle = pal[v] || pal[1];
      tc.fillRect(x, y, 1, 1);
    }
  }

  async function geo() {
    const mon = await TW.window.currentMonitor();
    const sf = mon.scaleFactor || 1;
    const pos = await win.outerPosition();
    return {
      monX: mon.position.x / sf, monW: mon.size.width / sf,
      x: pos.x / sf, y: pos.y / sf, sf,
    };
  }
  const LPos = TW?.dpi?.LogicalPosition || TW?.window?.LogicalPosition || null;
  async function slideTo(tx, ty, steps = 16) {
    if (sliding || !win || !LPos) return false;      // caller must not change state on skip
    sliding = true;
    let ok = true;
    try {
      const g = await geo();
      leanDir = Math.sign(tx - g.x);                 // ghost leans into the flight
      for (let i = 1; i <= steps; i++) {
        const t = 1 - Math.pow(1 - i / steps, 3);    // ease-out cubic — a glide, not a jump
        const x = g.x + (tx - g.x) * t;
        const y = g.y + (ty - g.y) * t;
        await win.setPosition(new LPos(x, y));
        await new Promise(r => setTimeout(r, 18));
      }
    } catch (e) { ok = false; }
    setTimeout(() => { leanDir = 0; }, 150);
    sliding = false;
    return ok;
  }
  async function dockEdge(manual = false) {
    if (!win || docked) return;
    try {
      const g = await geo();
      homePos = { x: g.x, y: g.y };
      ring.classList.remove('show');               // never let the ring cover the sign
      const ok = await slideTo(g.monX + g.monW - 26, g.y);
      if (!ok) return;
      docked = true; peeked = false;
      drawTabIcon();
      dockTab.classList.add('show');
      if (manual) panel.classList.remove('show');
    } catch (e) {}
  }
  async function undock() {
    if (!win || !docked || sliding) return;
    try {
      const g = await geo();
      const ok = await slideTo(homePos ? homePos.x : g.monX + g.monW - 200, homePos ? homePos.y : g.y);
      if (!ok) return;
      docked = false; peeked = false;
      dockTab.classList.remove('show');
    } catch (e) {}
  }
  async function peekOut() {          // slide out but stay logically docked
    if (!win || !docked || peeked || sliding) return;
    dockTab.classList.remove('show');
    const g = await geo();
    const ok = await slideTo(g.monX + g.monW - 190, g.y);
    if (ok) peeked = true;                       // state follows reality, never precedes it
    else dockTab.classList.add('show');
  }
  async function peekBack() {
    if (!win || !docked || !peeked || sliding) return;
    const g = await geo();
    const ok = await slideTo(g.monX + g.monW - 26, g.y);
    if (ok) { peeked = false; dockTab.classList.add('show'); }
  }
  // the sign: CLICK reveals (hover was too easy to trigger by accident);
  // drag vertically to slide it along the screen edge; drag LEFT to pull
  // the ghost out where you dropped it
  let backTimer = null;
  let tabDrag = null, tabMoveBusy = false;
  dockTab.addEventListener('pointerdown', async e => {
    e.preventDefault();
    dockTab.setPointerCapture(e.pointerId);
    const g = await geo();
    tabDrag = { sx: e.screenX, sy: e.screenY, y0: g.y, g, moved: false };
  });
  dockTab.addEventListener('pointermove', e => {
    if (!tabDrag || !win || !LPos) return;
    const dx = e.screenX - tabDrag.sx;
    const dy = e.screenY - tabDrag.sy;
    if (Math.abs(dx) > 4 || Math.abs(dy) > 4) tabDrag.moved = true;
    if (dx < -40) {                                   // pulled left: release the ghost here
      const t = tabDrag; tabDrag = null;
      docked = false; peeked = false;
      dockTab.classList.remove('show');
      slideTo(t.g.monX + t.g.monW - 200, t.y0 + dy);
      return;
    }
    if (tabDrag.moved && !tabMoveBusy) {              // ride along the edge
      tabMoveBusy = true;
      win.setPosition(new LPos(tabDrag.g.monX + tabDrag.g.monW - 26, tabDrag.y0 + dy))
        .catch(() => {})
        .finally(() => { tabMoveBusy = false; });
    }
  });
  dockTab.addEventListener('pointerup', () => {
    if (tabDrag && !tabDrag.moved) peekOut();         // a plain click opens it
    tabDrag = null;
  });
  dockTab.addEventListener('pointercancel', () => { tabDrag = null; });
  document.addEventListener('mouseenter', () => clearTimeout(backTimer));
  document.addEventListener('mouseleave', () => {
    if (docked && peeked && !panel.classList.contains('show')) {
      clearTimeout(backTimer);
      backTimer = setTimeout(peekBack, 1500);
    }
  });
  // clicking the pet while peeked = pull it out for good; holding it = grabbed animation
  canvas.addEventListener('pointerdown', () => {
    if (docked && peeked) { docked = false; peeked = false; dockTab.classList.remove('show'); }
    grabbed = Date.now();
    // acknowledge: a tap answers whatever the pet is fussing about
    // (must live on pointerdown — the drag region swallows click events)
    if (breakInvited) {
      breakInvited = false; workSec = 0;
      say('好，重新计时。去吧。', 2000);
    } else if (agentWaiting && Date.now() > agentAckUntil) {
      agentAckUntil = Date.now() + 5 * 60 * 1000;
      say('知道了，这就去。', 1800);
    } else if (mood === 'frazzled' && Date.now() >= quietUntil) {
      quietUntil = Date.now() + 10 * 60 * 1000;
      say('知道了，我安静 10 分钟。', 2200);
    }
  });
  document.addEventListener('pointerup', () => { grabbed = 0; leanDir = 0; });
  window.addEventListener('blur', () => { setTimeout(() => { grabbed = 0; leanDir = 0; }, 400); });
  document.getElementById('rbDock').addEventListener('click', () => {
    hideRing(0);
    dockEdge(true);
  });
  document.getElementById('rbFlow').addEventListener('click', () => {
    hideRing(0);
    say('心流模式：2 小时后见。我在后台守着。', 2500);
    setTimeout(() => invoke('focus_mode', { hours: 2 }).catch(() => {}), 2600);
  });

  /* ---- auto behavior: visibility inversely proportional to your focus ---- */
  let focusedSec = 0, workSec = 0, breakInvited = false;
  const BREAK_MIN = 25;
  setInterval(() => {
    const m = (sick && mood !== 'sleeping') ? 'sick' : mood;
    focusedSec = m === 'focused' ? focusedSec + 10 : 0;
    workSec = (m === 'sleeping') ? 0 : workSec + 10;
    if (m === 'sleeping') breakInvited = false;
    if (focusedSec >= 120 && !docked) dockEdge();                    // guard quietly in flow
    if ((m === 'frazzled' || m === 'sick') && docked) undock();      // show up when needed
    if (workSec >= BREAK_MIN * 60 && !breakInvited) {                // healthy distraction, on schedule
      breakInvited = true;
      if (docked) peekOut();
      breakDance();                                                  // catch the eye by design, not by shouting
      say(`连续 ${BREAK_MIN} 分钟了——站起来伸个腰？点我一下重新计时`, 9000);
    }
  }, 10000);
  invoke('get_profile').then(p => { if (p && p.type) species = p.type; }).catch(() => {});

  // preview/QA hooks: ?species=cheetah&mood=focused
  const qs = new URLSearchParams(location.search);
  if (qs.get('species')) species = qs.get('species');
  if (qs.get('mood')) { mood = qs.get('mood'); setInterval(() => { mood = qs.get('mood'); }, 5000); }
</script>
</body>
